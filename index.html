tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Before discussing signals, Carver forces the reader to decide what should actually be traded and which instruments are structurally suitable.</p>"], ["Why this chapter matters", "<p>Instrument choice quietly determines liquidity, leverage, cost structure, and implementation feasibility.</p>"], ["Section map from contents", "<ul>\n<li>Necessities</li>\n<li>Instrument choice and trading style</li>\n<li>Access</li>\n<li>Summary of instrument choice</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Some instruments are simply poor choices for systematic trading.</li>\n<li>Trading style should influence which markets and wrappers you use.</li>\n<li>Access method matters: the same exposure via futures, ETFs, CFDs, or cash products can behave very differently operationally.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Encode instrument metadata and trading constraints alongside price data.</li>\n<li>Avoid testing strategies on instruments you cannot realistically access or execute.</li>\n<li>Model lot size, leverage, and route-specific frictions early.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 05](carver-st-05-framework-overview.md)</li>\n<li>Next: [Chapter 07](carver-st-07-forecasts.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 06 — Instruments chapter systematic-trading carver chapter-note Chapter 06 — Instruments Core idea Before discussing signals, Carver forces the reader to decide what should actually be traded and which instruments are structurally suitable. Why this chapter matters Instrument choice quietly determines liquidity, leverage, cost structure, and implementation feasibility. Section map from contents Necessities Instrument choice and trading style Access Summary of instrument choice Key takeaways Some instruments are simply poor choices for systematic trading. Trading style should influence which markets and wrappers you use. Access method matters: the same exposure via futures, ETFs, CFDs, or cash products can behave very differently operationally. Project implications Encode instrument metadata and trading constraints alongside price data. Avoid testing strategies on instruments you cannot realistically access or execute. Model lot size, leverage, and route specific frictions early. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 05 (carver st 05 framework overview.md) Next: Chapter 07 (carver st 07 forecasts.md) Related pages execution realism position sizing drawdown risk Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "118-125", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-07-forecasts", "title": "Systematic Trading chapter 07 — Forecasts", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Forecasts are the layer that says how much you like a trade, whether that comes from discretion, a no-rule allocation assumption, or systematic rules.</p>"], ["Why this chapter matters", "<p>This chapter formalizes signal generation as a distinct object that feeds the rest of the framework.</p>"], ["Section map from contents", "<ul>\n<li>What makes a good forecast</li>\n<li>Discretionary trading with stop losses</li>\n<li>The asset allocating investor’s no-rule rule</li>\n<li>Two example systematic rules</li>\n<li>Adapting and creating trading rules</li>\n<li>Selecting trading rules and variations</li>\n<li>Summary of trading rules and forecasts</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Forecast quality matters more than indicator ornamentation.</li>\n<li>Different user archetypes can share the same downstream risk framework even with different forecast sources.</li>\n<li>Rule variation and adaptation should stay disciplined rather than becoming endless customization.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Represent forecasts in your research stack as normalized outputs, not just raw signals.</li>\n<li>Support discretionary and systematic forecast inputs through the same downstream sizing pipeline.</li>\n<li>Keep a registry of rule families and variations with rationale notes.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 06](carver-st-06-instruments.md)</li>\n<li>Next: [Chapter 08](carver-st-08-combined-forecasts.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 07 — Forecasts chapter systematic-trading carver chapter-note Chapter 07 — Forecasts Core idea Forecasts are the layer that says how much you like a trade, whether that comes from discretion, a no rule allocation assumption, or systematic rules. Why this chapter matters This chapter formalizes signal generation as a distinct object that feeds the rest of the framework. Section map from contents What makes a good forecast Discretionary trading with stop losses The asset allocating investor’s no rule rule Two example systematic rules Adapting and creating trading rules Selecting trading rules and variations Summary of trading rules and forecasts Key takeaways Forecast quality matters more than indicator ornamentation. Different user archetypes can share the same downstream risk framework even with different forecast sources. Rule variation and adaptation should stay disciplined rather than becoming endless customization. Project implications Represent forecasts in your research stack as normalized outputs, not just raw signals. Support discretionary and systematic forecast inputs through the same downstream sizing pipeline. Keep a registry of rule families and variations with rationale notes. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 06 (carver st 06 instruments.md) Next: Chapter 08 (carver st 08 combined forecasts.md) Related pages momentum trend following mean reversion Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "126-141", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-08-combined-forecasts", "title": "Systematic Trading chapter 08 — Combined Forecasts", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Once multiple rules exist, the problem shifts from “is this signal good?” to “how should competing signals be blended?”</p>"], ["Why this chapter matters", "<p>Many quant workflows fail here by summing signals naively or letting one noisy rule dominate.</p>"], ["Section map from contents", "<ul>\n<li>Combining with forecast weights</li>\n<li>Choosing the forecast weights</li>\n<li>Getting to 10</li>\n<li>Capped at 20</li>\n<li>Summary for combining forecasts</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Signal combination needs explicit weighting logic.</li>\n<li>Scale normalization matters so no single rule overwhelms the combined forecast accidentally.</li>\n<li>Capping combined strength is part of keeping the system behaved under disagreement and extremes.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Normalize forecast outputs before combining them.</li>\n<li>Log component forecasts, weights, and capped final forecast values for every backtest run.</li>\n<li>Treat signal blending as its own tested layer, not a one-line sum hidden in notebook code.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 07](carver-st-07-forecasts.md)</li>\n<li>Next: [Chapter 09](carver-st-09-volatility-targeting.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 08 — Combined Forecasts chapter systematic-trading carver chapter-note Chapter 08 — Combined Forecasts Core idea Once multiple rules exist, the problem shifts from “is this signal good?” to “how should competing signals be blended?” Why this chapter matters Many quant workflows fail here by summing signals naively or letting one noisy rule dominate. Section map from contents Combining with forecast weights Choosing the forecast weights Getting to 10 Capped at 20 Summary for combining forecasts Key takeaways Signal combination needs explicit weighting logic. Scale normalization matters so no single rule overwhelms the combined forecast accidentally. Capping combined strength is part of keeping the system behaved under disagreement and extremes. Project implications Normalize forecast outputs before combining them. Log component forecasts, weights, and capped final forecast values for every backtest run. Treat signal blending as its own tested layer, not a one line sum hidden in notebook code. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 07 (carver st 07 forecasts.md) Next: Chapter 09 (carver st 09 volatility targeting.md) Related pages volatility targeting position sizing backtesting Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "142-151", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-09-volatility-targeting", "title": "Systematic Trading chapter 09 — Volatility Targeting", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver treats target volatility as the core budget that translates “I like this trade” into “how much risk can I carry?”</p>"], ["Why this chapter matters", "<p>This is one of the most implementation-relevant chapters in the entire book.</p>"], ["Section map from contents", "<ul>\n<li>The importance of risk targeting</li>\n<li>Setting a volatility target</li>\n<li>Rolling up profits and losses</li>\n<li>What percentage of capital per trade?</li>\n<li>Summary of volatility targeting</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Risk targeting is central, not optional polish.</li>\n<li>Volatility budgets give a common language across instruments and strategies.</li>\n<li>Profit-and-loss aggregation should be interpreted through risk taken, not just absolute money made.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Every local strategy test should expose annualized realized volatility versus target.</li>\n<li>Use target-vol-based normalization to compare NIFTY ideas fairly across regimes.</li>\n<li>Make risk budget changes explicit in experiment logs instead of silently changing leverage.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 08](carver-st-08-combined-forecasts.md)</li>\n<li>Next: [Chapter 10](carver-st-10-position-sizing.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 09 — Volatility Targeting chapter systematic-trading carver chapter-note Chapter 09 — Volatility Targeting Core idea Carver treats target volatility as the core budget that translates “I like this trade” into “how much risk can I carry?” Why this chapter matters This is one of the most implementation relevant chapters in the entire book. Section map from contents The importance of risk targeting Setting a volatility target Rolling up profits and losses What percentage of capital per trade? Summary of volatility targeting Key takeaways Risk targeting is central, not optional polish. Volatility budgets give a common language across instruments and strategies. Profit and loss aggregation should be interpreted through risk taken, not just absolute money made. Project implications Every local strategy test should expose annualized realized volatility versus target. Use target vol based normalization to compare NIFTY ideas fairly across regimes. Make risk budget changes explicit in experiment logs instead of silently changing leverage. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 08 (carver st 08 combined forecasts.md) Next: Chapter 10 (carver st 10 position sizing.md) Related pages volatility targeting position sizing drawdown risk Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "152-169", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-10-position-sizing", "title": "Systematic Trading chapter 10 — Position Sizing", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>This chapter converts forecast strength and risk budget into actual trade size across shares, futures, or other instruments.</p>"], ["Why this chapter matters", "<p>It is where abstract strategy logic becomes executable quantity.</p>"], ["Section map from contents", "<ul>\n<li>How risky is it?</li>\n<li>Volatility target and position risk</li>\n<li>From forecast to position</li>\n<li>Summary for position sizing</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>A forecast alone is incomplete until it becomes a sized position.</li>\n<li>Sizing must respect instrument risk characteristics and the chosen volatility target.</li>\n<li>The same forecast can imply radically different position counts across products.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Keep sizing formulas explicit and testable in reusable code, not hidden in charts or spreadsheet cells.</li>\n<li>For every trade simulation, record forecast, estimated vol, cash risk, and final quantity.</li>\n<li>Stress-test how sizing changes when volatility spikes or account size changes.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 09](carver-st-09-volatility-targeting.md)</li>\n<li>Next: [Chapter 11](carver-st-11-portfolios.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 10 — Position Sizing chapter systematic-trading carver chapter-note Chapter 10 — Position Sizing Core idea This chapter converts forecast strength and risk budget into actual trade size across shares, futures, or other instruments. Why this chapter matters It is where abstract strategy logic becomes executable quantity. Section map from contents How risky is it? Volatility target and position risk From forecast to position Summary for position sizing Key takeaways A forecast alone is incomplete until it becomes a sized position. Sizing must respect instrument risk characteristics and the chosen volatility target. The same forecast can imply radically different position counts across products. Project implications Keep sizing formulas explicit and testable in reusable code, not hidden in charts or spreadsheet cells. For every trade simulation, record forecast, estimated vol, cash risk, and final quantity. Stress test how sizing changes when volatility spikes or account size changes. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 09 (carver st 09 volatility targeting.md) Next: Chapter 11 (carver st 11 portfolios.md) Related pages position sizing volatility targeting execution realism Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "170-181", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-11-portfolios", "title": "Systematic Trading chapter 11 — Portfolios", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>After sizing individual positions, Carver zooms out again to show how whole portfolios should be assembled and diversified.</p>"], ["Why this chapter matters", "<p>This chapter stops the reader from treating a collection of trades as a portfolio just because there are several of them.</p>"], ["Section map from contents", "<ul>\n<li>Portfolios and instrument weights</li>\n<li>Instrument weights – asset allocators and systems traders</li>\n<li>Instrument weights – semi-automatic trading</li>\n<li>Instrument diversification multiplier</li>\n<li>A portfolio of positions and trades</li>\n<li>Summary for creating a portfolio of trading subsystems</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Too few assets means hidden concentration risk.</li>\n<li>Instrument weights should reflect more than personal familiarity or convenience.</li>\n<li>Diversification deserves an explicit multiplier or adjustment rather than being hand-waved.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Report effective concentration, not just count of symbols.</li>\n<li>Add cross-strategy and cross-instrument diversification diagnostics to the research stack.</li>\n<li>Think in terms of portfolio-of-subsystems, especially if multiple signal families are used.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 10](carver-st-10-position-sizing.md)</li>\n<li>Next: [Chapter 12](carver-st-12-speed-and-size.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 11 — Portfolios chapter systematic-trading carver chapter-note Chapter 11 — Portfolios Core idea After sizing individual positions, Carver zooms out again to show how whole portfolios should be assembled and diversified. Why this chapter matters This chapter stops the reader from treating a collection of trades as a portfolio just because there are several of them. Section map from contents Portfolios and instrument weights Instrument weights – asset allocators and systems traders Instrument weights – semi automatic trading Instrument diversification multiplier A portfolio of positions and trades Summary for creating a portfolio of trading subsystems Key takeaways Too few assets means hidden concentration risk. Instrument weights should reflect more than personal familiarity or convenience. Diversification deserves an explicit multiplier or adjustment rather than being hand waved. Project implications Report effective concentration, not just count of symbols. Add cross strategy and cross instrument diversification diagnostics to the research stack. Think in terms of portfolio of subsystems, especially if multiple signal families are used. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 10 (carver st 10 position sizing.md) Next: Chapter 12 (carver st 12 speed and size.md) Related pages drawdown risk position sizing volatility targeting Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "182-193", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-12-speed-and-size", "title": "Systematic Trading chapter 12 — Speed and Size", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver ties system design to practical realities: how fast you trade, how much it costs, and how account size changes feasible behavior.</p>"], ["Why this chapter matters", "<p>Probably the clearest bridge from research fantasy to execution reality.</p>"], ["Section map from contents", "<ul>\n<li>Speed of trading</li>\n<li>Calculating the cost of trading</li>\n<li>Using trading costs to make design decisions</li>\n<li>Trading with more or less capital</li>\n<li>Determining overall portfolio size</li>\n<li>Summary of tailoring systems for costs and capital</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Trading cost is a design input, not a cleanup item.</li>\n<li>Strategy frequency and account size interact with liquidity and slippage constraints.</li>\n<li>Portfolio size should be chosen in light of market impact and tradability, not just ambition.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Cost models must be first-class citizens in backtests.</li>\n<li>Expect intraday or faster ideas to face a much higher realism burden than slower systems.</li>\n<li>Flag strategy variants whose edge disappears after plausible cost assumptions.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 11](carver-st-11-portfolios.md)</li>\n<li>Next: [Chapter 13](carver-st-13-semi-automatic-trader.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 12 — Speed and Size chapter systematic-trading carver chapter-note Chapter 12 — Speed and Size Core idea Carver ties system design to practical realities: how fast you trade, how much it costs, and how account size changes feasible behavior. Why this chapter matters Probably the clearest bridge from research fantasy to execution reality. Section map from contents Speed of trading Calculating the cost of trading Using trading costs to make design decisions Trading with more or less capital Determining overall portfolio size Summary of tailoring systems for costs and capital Key takeaways Trading cost is a design input, not a cleanup item. Strategy frequency and account size interact with liquidity and slippage constraints. Portfolio size should be chosen in light of market impact and tradability, not just ambition. Project implications Cost models must be first class citizens in backtests. Expect intraday or faster ideas to face a much higher realism burden than slower systems. Flag strategy variants whose edge disappears after plausible cost assumptions. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 11 (carver st 11 portfolios.md) Next: Chapter 13 (carver st 13 semi automatic trader.md) Related pages execution realism backtesting drawdown risk Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "194-225", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-13-semi-automatic-trader", "title": "Systematic Trading chapter 13 — Semi-automatic Trader", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver shows how a trader can keep discretionary market views while outsourcing risk control, stops, and sizing to a system.</p>"], ["Why this chapter matters", "<p>Useful if you want judgment in entries but discipline in exposure.</p>"], ["Section map from contents", "<ul>\n<li>Who are you?</li>\n<li>Using the framework</li>\n<li>Process</li>\n<li>Trading diary</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Discretion and systematization are not all-or-nothing opposites.</li>\n<li>A repeatable daily process matters as much as the signal source.</li>\n<li>The framework can be used to constrain human impulse rather than replace human interpretation entirely.</li>\n</ul>"], ["Project implications", "<ul>\n<li>If you ever do discretionary overlays, keep them downstream-compatible with the same risk framework.</li>\n<li>Use diaries or logs for discretionary calls so performance can be audited by regime and behavior.</li>\n<li>Do not let discretionary conviction bypass sizing and risk rules.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 12](carver-st-12-speed-and-size.md)</li>\n<li>Next: [Chapter 14](carver-st-14-asset-allocating-investor.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 13 — Semi-automatic Trader chapter systematic-trading carver chapter-note Chapter 13 — Semi automatic Trader Core idea Carver shows how a trader can keep discretionary market views while outsourcing risk control, stops, and sizing to a system. Why this chapter matters Useful if you want judgment in entries but discipline in exposure. Section map from contents Who are you? Using the framework Process Trading diary Key takeaways Discretion and systematization are not all or nothing opposites. A repeatable daily process matters as much as the signal source. The framework can be used to constrain human impulse rather than replace human interpretation entirely. Project implications If you ever do discretionary overlays, keep them downstream compatible with the same risk framework. Use diaries or logs for discretionary calls so performance can be audited by regime and behavior. Do not let discretionary conviction bypass sizing and risk rules. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 12 (carver st 12 speed and size.md) Next: Chapter 14 (carver st 14 asset allocating investor.md) Related pages position sizing drawdown risk execution realism Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Practice", "pages": "226-241", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-14-asset-allocating-investor", "title": "Systematic Trading chapter 14 — Asset Allocating Investor", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>This archetype assumes returns are hard to forecast and uses the framework mainly to allocate capital systematically across assets.</p>"], ["Why this chapter matters", "<p>Important because it shows the framework is broader than alpha-hunting signal systems.</p>"], ["Section map from contents", "<ul>\n<li>Who are you?</li>\n<li>Using the framework</li>\n<li>Weekly process</li>\n<li>Trading diary</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>A “no-rule” forecast can still live inside a disciplined allocation framework.</li>\n<li>Systematic process can add value even when predictive confidence is low.</li>\n<li>Cheap broad access vehicles such as ETFs make this style operationally accessible.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Useful template if you want a portfolio sleeve that is diversified and disciplined but not signal-heavy.</li>\n<li>Separate allocation logic from market-timing logic in research design.</li>\n<li>Track whether simple diversified baselines outperform more complex active ideas after costs.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md) Practice", "pages": "262-275", "book": "systematic-trading-carver"}, "author": ""}, {"id": "backtesting", "title": "Backtesting", "type": "concept", "group": "concepts", "tags": ["backtesting", "validation", "research-process"], "sections": [["Summary", "<p>Backtesting is not merely a way to advertise historical returns. Across these books it serves three jobs:</p>\n<p class=\"numbered\">1. verify that you truly understand the strategy</p>\n<p class=\"numbered\">2. debug implementation details before capital is at risk</p>\n<p class=\"numbered\">3. estimate whether the edge is robust enough to survive costs and out-of-sample stress</p>"], ["Shared lessons across books", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a> stresses replication and common pitfalls.</li>\n<li><a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a> reminds us that signal behavior is frequency-dependent and context-sensitive.</li>\n<li><a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a> adds the discipline of fitting restraint and portfolio-aware evaluation.</li>\n</ul>"], ["What future local backtests should include", "<ul>\n<li>explicit data assumptions</li>\n<li>transaction costs and slippage estimates</li>\n<li>out-of-sample or walk-forward sections</li>\n<li>risk-normalized metrics</li>\n<li>a note on what could break live</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n</ul>"]], "search_text": "Backtesting concept backtesting validation research-process Backtesting Backtesting is not merely a way to advertise historical returns. Across these books it serves three jobs: 1. verify that you truly understand the strategy 2. debug implementation details before capital is at risk 3. estimate whether the edge is robust enough to survive costs and out of sample stress Shared lessons across books quantitative trading chan stresses replication and common pitfalls. algorithmic trading chan reminds us that signal behavior is frequency dependent and context sensitive. systematic trading carver adds the discipline of fitting restraint and portfolio aware evaluation. What future local backtests should include explicit data assumptions transaction costs and slippage estimates out of sample or walk forward sections risk normalized metrics a note on what could break live Related pages walk forward analysis execution realism position sizing", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "drawdown-risk", "title": "Drawdown Risk", "type": "concept", "group": "concepts", "tags": ["drawdown", "survival", "skew", "risk"], "sections": [["Summary", "<p>These books repeatedly imply the same truth: strategies fail in practice less often because they lack a chart pattern and more often because the trader cannot survive the inevitable losing period.</p>"], ["Core ideas", "<ul>\n<li>Trend systems can look wrong for long stretches before paying off.</li>\n<li>Sizing and leverage determine whether a temporary bad period is survivable.</li>\n<li>Risk management is partly psychological: systems should be designed so the operator can keep following them.</li>\n</ul>"], ["Local implication", "<p>Any strategy note should contain at least a short statement on likely drawdown behavior, not just CAGR or Sharpe.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n</ul>"]], "search_text": "Drawdown Risk concept drawdown survival skew risk Drawdown Risk These books repeatedly imply the same truth: strategies fail in practice less often because they lack a chart pattern and more often because the trader cannot survive the inevitable losing period. Core ideas Trend systems can look wrong for long stretches before paying off. Sizing and leverage determine whether a temporary bad period is survivable. Risk management is partly psychological: systems should be designed so the operator can keep following them. Local implication Any strategy note should contain at least a short statement on likely drawdown behavior, not just CAGR or Sharpe. Related pages position sizing volatility targeting trend following", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "execution-realism", "title": "Execution Realism", "type": "concept", "group": "concepts", "tags": ["execution", "slippage", "costs", "implementation"], "sections": [["Summary", "<p>Execution realism means acknowledging that the path from signal to filled order is where many apparently good ideas fail.</p>"], ["What these books emphasize", "<ul>\n<li>Backtests and live systems diverge because of bugs, cost assumptions, market impact, and regime changes.</li>\n<li>Intraday and short-horizon strategies are especially sensitive to assumptions about fills and liquidity.</li>\n<li>A strategy report that ignores costs is incomplete.</li>\n</ul>"], ["What this means for the project", "<p>Every serious result should eventually answer:</p>\n<ul>\n<li>What spread/slippage assumption was used?</li>\n<li>Is the instrument liquid enough for the strategy style?</li>\n<li>How sensitive is edge to worse fills?</li>\n<li>Is the execution model appropriate for bar frequency?</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n<li><a href=\"#page=testing-and-execution-checklist\" class=\"inline-link\">testing-and-execution-checklist</a></li>\n</ul>"]], "search_text": "Execution Realism concept execution slippage costs implementation Execution Realism Execution realism means acknowledging that the path from signal to filled order is where many apparently good ideas fail. What these books emphasize Backtests and live systems diverge because of bugs, cost assumptions, market impact, and regime changes. Intraday and short horizon strategies are especially sensitive to assumptions about fills and liquidity. A strategy report that ignores costs is incomplete. What this means for the project Every serious result should eventually answer: What spread/slippage assumption was used? Is the instrument liquid enough for the strategy style? How sensitive is edge to worse fills? Is the execution model appropriate for bar frequency? Related pages backtesting mean reversion testing and execution checklist", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "mean-reversion", "title": "Mean Reversion", "type": "concept", "group": "concepts", "tags": ["mean-reversion", "intraday", "seasonality"], "sections": [["Summary", "<p>The strongest lesson surfaced from the Chan material is that mean reversion is context-dependent. A series can look non-reverting on daily bars and still show exploitable intraday or seasonal mean reversion under specific conditions.</p>"], ["Why this matters", "<p>This is directly relevant to local market-data work: bar frequency, time-of-day effects, and market regime can matter as much as the high-level strategy label.</p>"], ["Caveat", "<p>Mean reversion tends to be more fragile to <a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a> than slower momentum/trend systems because the edge per trade is often smaller and more cost-sensitive.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n</ul>"]], "search_text": "Mean Reversion concept mean-reversion intraday seasonality Mean Reversion The strongest lesson surfaced from the Chan material is that mean reversion is context dependent. A series can look non reverting on daily bars and still show exploitable intraday or seasonal mean reversion under specific conditions. Why this matters This is directly relevant to local market data work: bar frequency, time of day effects, and market regime can matter as much as the high level strategy label. Caveat Mean reversion tends to be more fragile to execution realism than slower momentum/trend systems because the edge per trade is often smaller and more cost sensitive. Related pages backtesting execution realism momentum", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "momentum", "title": "Momentum", "type": "concept", "group": "concepts", "tags": ["momentum", "trend", "ranking"], "sections": [["Summary", "<p>Momentum appears in multiple forms across these books:</p>\n<ul>\n<li>time-series momentum / trend following in <a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></li>\n<li>broader strategy-category treatment in <a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a></li>\n<li>cross-sectional equity momentum in <a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></li>\n</ul>"], ["Practical lesson", "<p>Momentum is less about one magic indicator and more about consistent selection, holding, rebalancing, and risk control. The books collectively suggest that simple momentum ideas often have better durability than overfit exotic models.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"]], "search_text": "Momentum concept momentum trend ranking Momentum Momentum appears in multiple forms across these books: time series momentum / trend following in following the trend clenow broader strategy category treatment in algorithmic trading chan cross sectional equity momentum in stocks on the move clenow Practical lesson Momentum is less about one magic indicator and more about consistent selection, holding, rebalancing, and risk control. The books collectively suggest that simple momentum ideas often have better durability than overfit exotic models. Related pages trend following position sizing drawdown risk", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "position-sizing", "title": "Position Sizing", "type": "concept", "group": "concepts", "tags": ["risk", "leverage", "sizing", "capital-allocation"], "sections": [["Summary", "<p>Position sizing is where strategy ideas become survivable or fragile.</p>"], ["Shared lessons", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a> connects leverage and capital allocation to growth vs drawdown trade-offs.</li>\n<li><a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a> treats sizing as a disciplined portfolio problem, often normalized through <a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a>.</li>\n</ul>"], ["Working rule for future research", "<p>Any promising signal should be evaluated twice:</p>\n<p class=\"numbered\">1. raw signal quality</p>\n<p class=\"numbered\">2. signal quality after realistic sizing logic</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a></li>\n</ul>"]], "search_text": "Position Sizing concept risk leverage sizing capital-allocation Position Sizing Position sizing is where strategy ideas become survivable or fragile. Shared lessons quantitative trading chan connects leverage and capital allocation to growth vs drawdown trade offs. systematic trading carver treats sizing as a disciplined portfolio problem, often normalized through volatility targeting . Working rule for future research Any promising signal should be evaluated twice: 1. raw signal quality 2. signal quality after realistic sizing logic Related pages volatility targeting drawdown risk strategy research pipeline", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "trend-following", "title": "Trend Following", "type": "concept", "group": "concepts", "tags": ["trend-following", "futures", "diversification"], "sections": [["Summary", "<p>Trend following is the most explicit “simple but hard” strategy family in this set. It tends to be conceptually easy, operationally demanding, and psychologically uncomfortable during flat or hostile periods.</p>"], ["What these books suggest", "<ul>\n<li>Diversification across assets matters.</li>\n<li>Risk normalization matters.</li>\n<li>Simple trend logic can be more durable than overparameterized systems.</li>\n<li>Trend following and <a href=\"#page=momentum\" class=\"inline-link\">momentum</a> are closely related, but implementation details differ by asset class.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n</ul>"]], "search_text": "Trend Following concept trend-following futures diversification Trend Following Trend following is the most explicit “simple but hard” strategy family in this set. It tends to be conceptually easy, operationally demanding, and psychologically uncomfortable during flat or hostile periods. What these books suggest Diversification across assets matters. Risk normalization matters. Simple trend logic can be more durable than overparameterized systems. Trend following and momentum are closely related, but implementation details differ by asset class. Related pages momentum drawdown risk position sizing", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "volatility-targeting", "title": "Volatility Targeting", "type": "concept", "group": "concepts", "tags": ["volatility-targeting", "sizing", "portfolio"], "sections": [["Summary", "<p>Volatility targeting is central in Carver’s framework. It aims to scale positions so that risk is more stable across time and across instruments, rather than allowing nominal exposure to determine realized risk.</p>"], ["Why it matters", "<ul>\n<li>Makes strategy comparisons fairer.</li>\n<li>Helps avoid accidental overbetting when volatility changes.</li>\n<li>Provides a natural bridge between single-strategy research and portfolio construction.</li>\n</ul>"], ["Local implication", "<p>Future research code should treat volatility targeting as a reusable module rather than a per-notebook afterthought.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n</ul>"]], "search_text": "Volatility Targeting concept volatility-targeting sizing portfolio Volatility Targeting Volatility targeting is central in Carver’s framework. It aims to scale positions so that risk is more stable across time and across instruments, rather than allowing nominal exposure to determine realized risk. Why it matters Makes strategy comparisons fairer. Helps avoid accidental overbetting when volatility changes. Provides a natural bridge between single strategy research and portfolio construction. Local implication Future research code should treat volatility targeting as a reusable module rather than a per notebook afterthought. Related pages position sizing drawdown risk backtesting", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "walk-forward-analysis", "title": "Walk-Forward Analysis", "type": "concept", "group": "concepts", "tags": ["walk-forward", "out-of-sample", "fitting", "robustness"], "sections": [["Summary", "<p>Walk-forward analysis is the habit of judging a strategy by repeated out-of-sample performance rather than by one clean in-sample curve.</p>"], ["Why it belongs here", "<p>Chan emphasizes replication and due diligence; Carver emphasizes fitting restraint. Put together, they imply that research should constantly ask whether the result survives after parameters are chosen.</p>"], ["Local implication", "<p>For serious experiments, use at least one of:</p>\n<ul>\n<li>train / validation / test splits</li>\n<li>rolling walk-forward windows</li>\n<li>regime-based robustness checks</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a></li>\n</ul>"]], "search_text": "Walk-Forward Analysis concept walk-forward out-of-sample fitting robustness Walk Forward Analysis Walk forward analysis is the habit of judging a strategy by repeated out of sample performance rather than by one clean in sample curve. Why it belongs here Chan emphasizes replication and due diligence; Carver emphasizes fitting restraint. Put together, they imply that research should constantly ask whether the result survives after parameters are chosen. Local implication For serious experiments, use at least one of: train / validation / test splits rolling walk forward windows regime based robustness checks Related pages backtesting drawdown risk strategy research pipeline", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "reading-path", "title": "Reading Path", "type": "synthesis", "group": "syntheses", "tags": ["reading-order", "learning-path"], "sections": [["Recommended sequence", "<p class=\"numbered\">1. <a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a></p>\n<ul>\n<li>Goal: learn the overall independent-quant workflow.</li>\n</ul>\n<p class=\"numbered\">2. <a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a></p>\n<ul>\n<li>Goal: learn sizing, fitting restraint, and portfolio process.</li>\n</ul>\n<p class=\"numbered\">3. <a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></p>\n<ul>\n<li>Goal: understand robust simple trend systems.</li>\n</ul>\n<p class=\"numbered\">4. <a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a></p>\n<ul>\n<li>Goal: expand strategy archetypes and implementation nuance.</li>\n</ul>\n<p class=\"numbered\">5. <a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></p>\n<ul>\n<li>Goal: see how simplicity translates into a focused momentum portfolio method.</li>\n</ul>"], ["Reading rule", "<p>For each book, create or update at least one practical artifact:</p>\n<ul>\n<li>a backtest idea</li>\n<li>a risk-control module</li>\n<li>an execution caveat</li>\n<li>a research checklist item</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a></li>\n<li><a href=\"#page=testing-and-execution-checklist\" class=\"inline-link\">testing-and-execution-checklist</a></li>\n</ul>"]], "search_text": "Reading Path synthesis reading-order learning-path Reading Path Recommended sequence 1. quantitative trading chan Goal: learn the overall independent quant workflow. 2. systematic trading carver Goal: learn sizing, fitting restraint, and portfolio process. 3. following the trend clenow Goal: understand robust simple trend systems. 4. algorithmic trading chan Goal: expand strategy archetypes and implementation nuance. 5. stocks on the move clenow Goal: see how simplicity translates into a focused momentum portfolio method. Reading rule For each book, create or update at least one practical artifact: a backtest idea a risk control module an execution caveat a research checklist item Related pages strategy research pipeline testing and execution checklist", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "strategy-research-pipeline", "title": "Strategy Research Pipeline", "type": "synthesis", "group": "syntheses", "tags": ["research-pipeline", "implementation", "workflow"], "sections": [["What these books imply the local pipeline should contain", "<h3>1. Data layer</h3>\n<ul>\n<li>clean market data</li>\n<li>explicit bar-frequency choices</li>\n<li>awareness of missing bars / timestamp conventions</li>\n</ul>\n<h3>2. Signal layer</h3>\n<ul>\n<li>simple, explainable strategy rules first</li>\n<li>clear separation of momentum, trend, and mean-reversion hypotheses</li>\n</ul>\n<h3>3. Validation layer</h3>\n<ul>\n<li>proper <a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li>out-of-sample or <a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li>sensitivity to parameters and regime changes</li>\n</ul>\n<h3>4. Cost layer</h3>\n<ul>\n<li>spread/slippage assumptions</li>\n<li>liquidity realism</li>\n<li>notes on expected live-vs-backtest divergence</li>\n</ul>\n<h3>5. Risk layer</h3>\n<ul>\n<li>reusable <a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a> where appropriate</li>\n<li>drawdown-aware reporting</li>\n</ul>\n<h3>6. Review layer</h3>\n<ul>\n<li>why the strategy might fail</li>\n<li>what conditions it probably needs</li>\n<li>whether the result is still good after implementation realism</li>\n</ul>"], ["Local priority", "<p>The immediate value for <code>trading-vy</code> is to harden the validation, cost, and sizing layers before chasing more complex signals.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n</ul>"]], "search_text": "Strategy Research Pipeline synthesis research-pipeline implementation workflow Strategy Research Pipeline What these books imply the local pipeline should contain 1. Data layer clean market data explicit bar frequency choices awareness of missing bars / timestamp conventions 2. Signal layer simple, explainable strategy rules first clear separation of momentum, trend, and mean reversion hypotheses 3. Validation layer proper backtesting out of sample or walk forward analysis sensitivity to parameters and regime changes 4. Cost layer spread/slippage assumptions liquidity realism notes on expected live vs backtest divergence 5. Risk layer reusable position sizing volatility targeting where appropriate drawdown aware reporting 6. Review layer why the strategy might fail what conditions it probably needs whether the result is still good after implementation realism Local priority The immediate value for trading vy is to harden the validation, cost, and sizing layers before chasing more complex signals. Related pages backtesting execution realism position sizing", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "testing-and-execution-checklist", "title": "Testing and Execution Checklist", "type": "synthesis", "group": "syntheses", "tags": ["checklist", "testing", "execution"], "sections": [["Summary", "<p>Use this before treating any local backtest as decision-worthy.</p>"], ["Data and setup", "<ul>\n<li>Is the dataset clearly defined and reproducible?</li>\n<li>Are timestamps, missing bars, splits, and other adjustments understood?</li>\n<li>Is the bar frequency appropriate for the hypothesis?</li>\n</ul>"], ["Backtest quality", "<ul>\n<li>Can the result be reproduced from scratch?</li>\n<li>Is there a clear train / test or walk-forward split?</li>\n<li>Were parameters kept simple enough to avoid obvious overfitting?</li>\n</ul>"], ["Execution realism", "<ul>\n<li>What spread/slippage assumption was used?</li>\n<li>Would edge survive worse fills?</li>\n<li>Is liquidity compatible with the strategy horizon?</li>\n</ul>"], ["Risk and sizing", "<ul>\n<li>Is there an explicit <a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a> rule?</li>\n<li>Is <a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a> needed?</li>\n<li>What does drawdown look like, and is it survivable?</li>\n</ul>"], ["Final judgment", "<ul>\n<li>Would I still trade this after degrading assumptions slightly?</li>\n<li>Does the idea add anything new relative to simpler baselines?</li>\n<li>What is the most likely failure mode?</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"]], "search_text": "Testing and Execution Checklist synthesis checklist testing execution Testing and Execution Checklist Use this before treating any local backtest as decision worthy. Data and setup Is the dataset clearly defined and reproducible? Are timestamps, missing bars, splits, and other adjustments understood? Is the bar frequency appropriate for the hypothesis? Backtest quality Can the result be reproduced from scratch? Is there a clear train / test or walk forward split? Were parameters kept simple enough to avoid obvious overfitting? Execution realism What spread/slippage assumption was used? Would edge survive worse fills? Is liquidity compatible with the strategy horizon? Risk and sizing Is there an explicit position sizing rule? Is volatility targeting needed? What does drawdown look like, and is it survivable? Final judgment Would I still trade this after degrading assumptions slightly? Does the idea add anything new relative to simpler baselines? What is the most likely failure mode? Related pages strategy research pipeline execution realism drawdown risk", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}];

function copyPageLink(id){const url=location.origin+location.pathname+'#page='+encodeURIComponent(id); navigator.clipboard.writeText(url).then(()=>{const btn=document.getElementById('copy-link-btn'); if(btn){const old=btn.textContent; btn.textContent='Copied'; setTimeout(()=>btn.textContent=old,900);}});}
function renderFilters(){document.getElementById('filters').innerHTML=filterDefs.map(([key,label])=>`<button class="filter-pill ${currentFilter===key?'active':''}" onclick="setFilter('${key}')">${label}</button>`).join('');}
function setFilter(key){currentFilter=key; renderFilters(); renderSidebar(); renderMain();}
function renderSidebar(){const root=document.getElementById('sidebarNav'); const current=currentPageId(); const groups={start:[],books:[],concepts:[],syntheses:[],carver:[]}; visiblePages().forEach(p=>{if(groups[p.group])groups[p.group].push(p);}); root.innerHTML=Object.entries(groups).map(([group,items])=>{if(!items.length)return ''; const sorted=items.slice().sort((a,b)=>a.title.localeCompare(b.title)); return `<div class="nav-group"><div class="section-title">${groupLabels[group]}</div><div class="nav-list">${sorted.map(p=>`<div class="nav-item ${current===p.id?'active':''}" onclick="setRoute('${p.id}')"><div class="name">${escapeHtml(p.title)}</div><div class="meta">${escapeHtml(p.type.replace('-',' '))}</div></div>`).join('')}</div></div>`;}).join('');}
function iconForType(type){return ({book:'📘',concept:'🧠',synthesis:'🧭',chapter:'📑','chapter-map':'🗺️',home:'🏠'})[type]||'📄';}
function labelForType(type){return ({book:'Book',concept:'Concept',synthesis:'Synthesis',chapter:'Chapter','chapter-map':'Map',home:'Home'})[type]||type;}
function cardForPage(id,tagClass){const p=findPage(id); if(!p)return ''; const rawSummary=stripTags((p.sections[0]&&p.sections[0][1])||'').trim(); let summary=rawSummary; if(summary.length>165){summary=summary.slice(0,165); const lastSpace=summary.lastIndexOf(' '); if(lastSpace>100) summary=summary.slice(0,lastSpace); summary+='…';} return `<div class="card clickable" onclick="setRoute('${p.id}')"><div class="card-top"><div class="card-icon">${iconForType(p.type)}</div><span class="tag ${tagClass}">${escapeHtml(labelForType(p.type))}</span></div><div class="card-title">${escapeHtml(p.title)}</div><div class="card-copy">${escapeHtml(summary||'Open this note in the workspace.')}</div></div>`;}
function renderHome(){const overview=findPage('overview'); const overviewLead=overview&&overview.sections[0]?stripTags(overview.sections[0][1]).trim():'A compact workspace built from your trading book notes.'; const startRows=homeData.start_here.map(id=>{const p=findPage(id); if(!p)return ''; return `<div class="mini-item" onclick="setRoute('${p.id}')"><strong>${escapeHtml(p.title)}</strong><span>${escapeHtml(labelForType(p.type))} · Open this first when orienting to the library.</span></div>`;}).join(''); const priorityRows=homeData.carver_priority.map(id=>{const p=findPage(id); if(!p)return ''; const meta=((p.meta.pages||'')+(p.meta.pages?' · ':'')+'Carver deep dive'); return `<div class="mini-item" onclick="setRoute('${p.id}')"><strong>${escapeHtml(p.title)}</strong><span>${escapeHtml(meta)}</span></div>`;}).join(''); return `<div class="page-shell"><div class="hero"><div class="main"><div class="label">Workspace</div><div class="amount">Trading Knowledge Reference</div><div class="note">${escapeHtml(overviewLead)} Browse books, concepts, syntheses, and Carver chapter notes in a single local HTML workspace.</div></div><div class="hero-splits"><div class="split"><div class="s-label">Books</div><div class="s-amount">5</div></div><div class="split blue"><div class="s-label">Concepts</div><div class="s-amount">9</div></div><div class="split warn"><div class="s-label">Syntheses</div><div class="s-amount">3</div></div><div class="split inr"><div class="s-label">Carver chapters</div><div class="s-amount">15</div></div></div></div><div class="section home-subgrid"><div class="panel"><div class="section-title">Start here</div><div class="mini-list">${startRows}</div></div><div class="panel"><div class="section-title">Best next reading for implementation</div><div class="mini-list">${priorityRows}</div></div></div><div class="section"><div class="section-head"><div class="section-title">Books</div></div><div class="grid books">${homeData.books.map(id=>cardForPage(id,'book')).join('')}</div></div><div class="section"><div class="section-head"><div class="section-title">Key concepts</div></div><div class="grid cards">${homeData.concepts.map(id=>cardForPage(id,'concept')).join('')}</div></div><div class="section"><div class="section-head"><div class="section-title">Syntheses for actual research work</div></div><div class="grid cards">${homeData.syntheses.map(id=>cardForPage(id,'synthesis')).join('')}</div></div></div>`;}
function renderChapterNav(id){const chapters=pages.filter(p=>p.type==='chapter').sort((a,b)=>a.id.localeCompare(b.id)); const idx=chapters.findIndex(c=>c.id===id); const prev=idx>0?chapters[idx-1]:null; const next=idx<chapters.length-1?chapters[idx+1]:null; return `<div class="chapter-nav">${prev?`<a href="#page=${encodeURIComponent(prev.id)}">← ${escapeHtml(prev.title)}</a>`:''}${next?`<a href="#page=${encodeURIComponent(next.id)}">${escapeHtml(next.title)} →</a>`:''}</div>`;}
function renderPage(page){const metaBits=[page.type!=='home'?labelForType(page.type):'Home']; if(page.author)metaBits.push(page.author); if(page.meta.part)metaBits.push(page.meta.part); if(page.meta.pages)metaBits.push('pp. '+page.meta.pages); const chips=(page.tags||[]).map(tag=>`<span class="chip">${escapeHtml(tag)}</span>`).join(''); const article=page.sections.map(([title,content])=>`<h2>${escapeHtml(title)}</h2>${content}`).join(''); const searchScopeCount=visiblePages().length; const statPages=page.meta.pages?`<div class="stat"><div class="label">Pages</div><div class="value">${escapeHtml(page.meta.pages)}</div></div>`:''; const statPart=page.meta.part?`<div class="stat"><div class="label">Part</div><div class="value">${escapeHtml(page.meta.part)}</div></div>`:''; const chapterNav=page.type==='chapter'?renderChapterNav(page.id):''; return `<div class="page-shell"><div class="breadcrumbs"><span>Workspace</span><span>›</span><a href="#page=overview" class="inline-link">Home</a><span>›</span><span>${escapeHtml(page.title)}</span></div><div class="page-head"><div class="page-title">${escapeHtml(page.title)}</div><div class="page-sub">${metaBits.map(escapeHtml).join(' · ')}</div><div class="toolbar"><button class="button" onclick="goHome()">Back to home</button><button class="button" id="copy-link-btn" onclick="copyPageLink('${page.id}')">Copy link</button></div>${chips?`<div class="chips">${chips}</div>`:''}</div><div class="content-grid"><article class="article">${article}${chapterNav}</article><aside class="aside"><div class="stat"><div class="label">Type</div><div class="value">${escapeHtml(labelForType(page.type))}</div></div><div class="stat"><div class="label">Current filter scope</div><div class="value">${searchScopeCount}</div></div>${statPages}${statPart}</aside></div></div>`;}
function renderSearchResults(){const hits=visiblePages(); if(!hits.length){return `<div class="empty"><strong>No results.</strong> Try clearing the filter or using a broader search term like <code>risk</code>, <code>Carver</code>, or <code>momentum</code>.</div>`;} return `<div class="page-shell"><div class="page-head"><div class="page-title">Search & filter results</div><div class="page-sub">${hits.length} visible pages · filter ${escapeHtml(currentFilter)}${currentSearch?` · search “${escapeHtml(currentSearch)}”`:''}</div></div><div class="result-list">${hits.map(p=>cardForPage(p.id,p.type==='book'?'book':p.type==='concept'?'concept':p.type==='synthesis'?'synthesis':'chapter')).join('')}</div></div>`;}
function renderMain(){const root=document.getElementById('app'); const page=findPage(currentPageId()); if((currentSearch||currentFilter!=='all')&&(!page||currentPageId()==='overview')){root.innerHTML=renderSearchResults(); return;} if(!page){root.innerHTML=renderHome(); return;} if(page.type==='home'){root.innerHTML=renderHome(); return;} root.innerHTML=renderPage(page);}
function syncSearch(){currentSearch=document.getElementById('searchInput').value.trim().toLowerCase(); renderSidebar(); renderMain();}
document.getElementById('searchInput').addEventListener('input',syncSearch);
window.addEventListener('hashchange',()=>{renderSidebar(); renderMain();});
renderFilters(); renderSidebar(); renderMain();
</script>
</body>
</html>
