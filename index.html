<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Knowledge Workspace</title>
  <style>
    :root {
      --bg:#f7f6f3; --surface:#ffffff; --surface-2:#faf9f6; --border:#e8e5df; --text:#1a1917; --muted:#7a7670;
      --accent:#2d6a4f; --accent-lt:#d8f0e4; --warn:#b45309; --warn-lt:#fef3c7; --blue:#3730a3; --blue-lt:#eef2ff;
      --inr:#5b2d8c; --inr-lt:#ede9fe; --danger:#991b1b; --danger-lt:#fee2e2;
      --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04); --shadow-md:0 4px 12px rgba(0,0,0,.07);
      --sidebar:320px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
    a{color:inherit;text-decoration:none}
    code{background:#f3f1ed;border:1px solid var(--border);padding:1px 5px;border-radius:6px;font-size:12px}
    .app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
    .sidebar{position:sticky;top:0;height:100vh;padding:24px 18px 28px;border-right:1px solid var(--border);background:rgba(247,246,243,.92);backdrop-filter:saturate(120%) blur(12px);overflow:auto}
    .content{padding:32px 28px 56px;max-width:1100px;width:100%;margin:0 auto}
    .workspace-title{font-size:22px;font-weight:650;letter-spacing:-.3px;cursor:pointer}
    .subtitle{color:var(--muted);font-size:13px;margin-top:6px}
    .fx-pill{display:inline-block;background:#f0f0ee;color:var(--muted);font-size:11px;padding:3px 10px;border-radius:20px;margin-top:10px}
    .search{margin-top:18px}
    .search input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;background:#fff;font:inherit;color:var(--text)}
    .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
    .filter-pill{font-size:11px;font-weight:600;letter-spacing:.3px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:.15s}
    .filter-pill.active{background:var(--accent-lt);color:var(--accent);border-color:transparent}
    .nav-group{margin-top:20px}
    .section-title{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .nav-list{display:flex;flex-direction:column;gap:4px}
    .nav-item{padding:9px 10px;border-radius:10px;cursor:pointer;transition:.15s;border:1px solid transparent}
    .nav-item:hover{background:#fbfaf7;border-color:var(--border)}
    .nav-item.active{background:var(--surface);border-color:var(--border);box-shadow:var(--shadow)}
    .nav-item .name{font-size:13px;font-weight:550;color:var(--text)}
    .nav-item .meta{font-size:11px;color:var(--muted);margin-top:2px}
    .hero{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 28px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;box-shadow:var(--shadow-md);flex-wrap:wrap}
    .hero .main{flex:1;min-width:240px}
    .hero .label{font-size:12px;color:var(--muted);margin-bottom:4px}
    .hero .amount{font-size:32px;font-weight:700;letter-spacing:-1px}
    .hero .note{font-size:12px;color:var(--muted);margin-top:6px;max-width:72ch}
    .hero-splits{display:flex;gap:10px;flex-wrap:wrap}
    .split{text-align:center;padding:10px 16px;border-radius:10px;background:var(--accent-lt);min-width:110px}
    .split.warn{background:var(--warn-lt)} .split.blue{background:var(--blue-lt)} .split.inr{background:var(--inr-lt)}
    .split .s-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);margin-bottom:2px;text-transform:uppercase}
    .split .s-amount{font-size:18px;font-weight:700}
    .grid{display:grid;gap:12px}
    .grid.books{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
    .grid.cards{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
    .card,.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow)}
    .card.clickable{cursor:pointer;transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease}
    .card.clickable:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);border-color:#ded8cf}
    .card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
    .card-title{font-size:14px;font-weight:650;letter-spacing:-.1px}
    .card-copy{font-size:12px;color:var(--muted)}
    .card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;background:#f0f0ee}
    .tag{font-size:10px;font-weight:600;letter-spacing:.4px;padding:3px 8px;border-radius:20px;text-transform:uppercase}
    .tag.book{background:var(--blue-lt);color:var(--blue)} .tag.concept{background:var(--accent-lt);color:var(--accent)} .tag.synthesis{background:var(--warn-lt);color:var(--warn)} .tag.chapter{background:var(--inr-lt);color:var(--inr)}
    .section{margin-top:28px}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .section-head .section-title{margin-bottom:0}
    .page-shell{display:flex;flex-direction:column;gap:16px}
    .page-head{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 28px;box-shadow:var(--shadow-md)}
    .page-title{font-size:28px;font-weight:700;letter-spacing:-.8px}
    .page-sub{font-size:13px;color:var(--muted);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
    .chip{font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;background:#f0f0ee;color:#555}
    .content-grid{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:14px;align-items:start}
    .article{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px;box-shadow:var(--shadow)}
    .article h2{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:22px 0 10px}
    .article h3{font-size:15px;font-weight:650;margin:18px 0 8px}
    .article p{margin:0 0 10px;font-size:14px}
    .article p.numbered{padding-left:2px;font-weight:500}
    .article ul{margin:0 0 14px 18px}
    .article li{margin:0 0 8px}
    .inline-link{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(45,106,79,.28)}
    .aside{display:flex;flex-direction:column;gap:12px;position:sticky;top:24px}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
    .stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:6px}
    .stat .value{font-size:20px;font-weight:700;letter-spacing:-.5px}
    .result-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
    .empty{background:#fffdf7;border:1px solid #e8e0c8;border-radius:12px;padding:18px 20px;font-size:13px;color:#5a5040;line-height:1.7}
    .breadcrumbs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--muted)}
    .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
    .button{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 12px;font:inherit;font-size:12px;color:var(--text);cursor:pointer}
    .button:hover{background:#fbfaf7}
    .chapter-nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
    .chapter-nav a{display:inline-flex;padding:8px 10px;border-radius:10px;background:#fbfaf7;border:1px solid var(--border)}
    .home-subgrid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
    .mini-list{display:flex;flex-direction:column;gap:10px}
    .mini-item{padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
    .mini-item:last-child{border-bottom:0}
    .mini-item strong{display:block;font-size:13px}
    .mini-item span{font-size:12px;color:var(--muted)}
    .footer-note{margin-top:36px;text-align:center;font-size:12px;color:#b8b2aa}
    @media (max-width:980px){
      .app{grid-template-columns:1fr}
      .sidebar{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--border)}
      .content{padding:22px 14px 40px}
      .content-grid,.home-subgrid{grid-template-columns:1fr}
      .aside{position:relative;top:auto}
      .hero{padding:20px}
      .hero .amount{font-size:28px}
      .page-head{padding:20px}
      .page-title{font-size:24px}
    }
  </style>
</head>

<script>
const pages = [{"id": "overview", "title": "Trading Books Overview", "type": "home", "group": "start", "tags": ["systematic-trading", "backtesting", "execution", "risk"], "sections": [["Summary", "<p>This wiki is meant to answer a practical question: how should a personal quant researcher use a small set of good trading books without getting lost in theory or building too much tooling too early?</p>"], ["Core takeaway", "<p>These books collectively argue for a simple sequence:</p>\n<p class=\"numbered\">1. Learn how to form testable ideas.</p>\n<p class=\"numbered\">2. Learn how to avoid fooling yourself in backtests.</p>\n<p class=\"numbered\">3. Learn how to size and diversify risk.</p>\n<p class=\"numbered\">4. Learn why execution assumptions break simulated performance.</p>\n<p class=\"numbered\">5. Only then add complexity.</p>"], ["What each author mainly contributes", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a> and <a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a> give the practical independent-quant mindset: strategy archetypes, data issues, backtest pitfalls, and execution systems.</li>\n<li><a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a> gives the strongest framework for portfolio construction, fitting restraint, leverage, and volatility-based risk normalization.</li>\n<li><a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a> shows how simple diversified trend following can be robust when implemented consistently across futures.</li>\n<li><a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a> translates similar simplicity into an equities momentum portfolio process.</li>\n</ul>"], ["The big pattern across books", "<p>The best ideas are usually not the most complicated ones. The edge comes from robust process, realistic costs, survivable sizing, and sticking with rules through drawdowns. That theme links <a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a>, <a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a>, <a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a>, and <a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a>.</p>"], ["How this helps the project", "<p>For <code>trading-vy</code>, the most useful output is not a generic “chat with PDFs” assistant. It is a set of durable pages that sharpen local research decisions:</p>\n<ul>\n<li>what backtests must include</li>\n<li>what execution assumptions need to be modeled</li>\n<li>what risk controls belong in strategy experiments</li>\n<li>what simple strategy families are worth testing first</li>\n</ul>"], ["Recommended next use of this wiki", "<p>Start with <a href=\"#page=reading-path\" class=\"inline-link\">reading-path</a>, then use <a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a> and <a href=\"#page=testing-and-execution-checklist\" class=\"inline-link\">testing-and-execution-checklist</a> when designing or reviewing local signal research.</p>"]], "search_text": "Trading Books Overview home systematic-trading backtesting execution risk Overview This wiki is meant to answer a practical question: how should a personal quant researcher use a small set of good trading books without getting lost in theory or building too much tooling too early? Core takeaway These books collectively argue for a simple sequence: 1. Learn how to form testable ideas. 2. Learn how to avoid fooling yourself in backtests. 3. Learn how to size and diversify risk. 4. Learn why execution assumptions break simulated performance. 5. Only then add complexity. What each author mainly contributes quantitative trading chan and algorithmic trading chan give the practical independent quant mindset: strategy archetypes, data issues, backtest pitfalls, and execution systems. systematic trading carver gives the strongest framework for portfolio construction, fitting restraint, leverage, and volatility based risk normalization. following the trend clenow shows how simple diversified trend following can be robust when implemented consistently across futures. stocks on the move clenow translates similar simplicity into an equities momentum portfolio process. The big pattern across books The best ideas are usually not the most complicated ones. The edge comes from robust process, realistic costs, survivable sizing, and sticking with rules through drawdowns. That theme links backtesting , execution realism , position sizing , and drawdown risk . How this helps the project For trading vy , the most useful output is not a generic “chat with PDFs” assistant. It is a set of durable pages that sharpen local research decisions: what backtests must include what execution assumptions need to be modeled what risk controls belong in strategy experiments what simple strategy families are worth testing first Recommended next use of this wiki Start with reading path , then use strategy research pipeline and testing and execution checklist when designing or reviewing local signal research.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "algorithmic-trading-chan-chapter-map", "title": "Algorithmic Trading chapter map", "type": "chapter-map", "group": "chapters", "tags": ["algorithmic-trading", "chapter-map", "ernest-chan"], "sections": [["Scope", "<ul>\n<li>Deepened from the PDF contents page plus chapter-opening extraction.</li>\n<li>This map exists to make the book navigable inside the local workspace.</li>\n</ul>"], ["Chapters", "<ul>\n<li>Chapter 01 — <a href=\"#page=algo-chan-01-backtesting-and-automated-execution\" class=\"inline-link\">algo-chan-01-backtesting-and-automated-execution</a> (<code>pp. 1-38</code>)</li>\n<li>Chapter 02 — <a href=\"#page=algo-chan-02-the-basics-of-mean-reversion\" class=\"inline-link\">algo-chan-02-the-basics-of-mean-reversion</a> (<code>pp. 39-62</code>)</li>\n<li>Chapter 03 — <a href=\"#page=algo-chan-03-implementing-mean-reversion-strategies\" class=\"inline-link\">algo-chan-03-implementing-mean-reversion-strategies</a> (<code>pp. 63-86</code>)</li>\n<li>Chapter 04 — <a href=\"#page=algo-chan-04-mean-reversion-of-stocks-and-etfs\" class=\"inline-link\">algo-chan-04-mean-reversion-of-stocks-and-etfs</a> (<code>pp. 87-106</code>)</li>\n<li>Chapter 05 — <a href=\"#page=algo-chan-05-mean-reversion-of-currencies-and-futures\" class=\"inline-link\">algo-chan-05-mean-reversion-of-currencies-and-futures</a> (<code>pp. 107-132</code>)</li>\n<li>Chapter 06 — <a href=\"#page=algo-chan-06-interday-momentum-strategies\" class=\"inline-link\">algo-chan-06-interday-momentum-strategies</a> (<code>pp. 133-154</code>)</li>\n<li>Chapter 07 — <a href=\"#page=algo-chan-07-intraday-momentum-strategies\" class=\"inline-link\">algo-chan-07-intraday-momentum-strategies</a> (<code>pp. 155-168</code>)</li>\n<li>Chapter 08 — <a href=\"#page=algo-chan-08-risk-management\" class=\"inline-link\">algo-chan-08-risk-management</a> (<code>pp. 169-186</code>)</li>\n</ul>"]], "search_text": "Algorithmic Trading chapter map chapter-map algorithmic-trading chapter-map ernest-chan Algorithmic Trading chapter map Scope Deepened from the PDF contents page plus chapter opening extraction. This map exists to make the book navigable inside the local workspace. Chapters Chapter 01 — algo chan 01 backtesting and automated execution ( pp. 1 38 ) Chapter 02 — algo chan 02 the basics of mean reversion ( pp. 39 62 ) Chapter 03 — algo chan 03 implementing mean reversion strategies ( pp. 63 86 ) Chapter 04 — algo chan 04 mean reversion of stocks and etfs ( pp. 87 106 ) Chapter 05 — algo chan 05 mean reversion of currencies and futures ( pp. 107 132 ) Chapter 06 — algo chan 06 interday momentum strategies ( pp. 133 154 ) Chapter 07 — algo chan 07 intraday momentum strategies ( pp. 155 168 ) Chapter 08 — algo chan 08 risk management ( pp. 169 186 )", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "", "pages": "", "book": "Algorithmic Trading"}, "author": ""}, {"id": "algorithmic-trading-chan", "title": "Algorithmic Trading", "type": "book", "group": "books", "tags": ["mean-reversion", "momentum", "intraday", "execution", "backtesting"], "sections": [["Why this matters here", "<ul>\n<li>Good bridge from abstract quant ideas to concrete strategy archetypes.</li>\n<li>Emphasizes that different effects appear at different sampling frequencies.</li>\n<li>Useful for reminding future agents that live divergence often comes from costs, bugs, or regime shifts rather than from “markets becoming impossible.”</li>\n</ul>"], ["What it seems to contribute most", "<p>This book is practical and strategy-oriented. The recovered contents page plus chapter openings emphasize:</p>\n<ul>\n<li>backtesting and automated execution as a unified engineering problem</li>\n<li>multiple mean-reversion implementations across equities, ETFs, currencies, and futures</li>\n<li>both interday and intraday momentum, not just slow moving trend logic</li>\n<li>explicit risk management as part of the strategy stack, not a separate appendix</li>\n</ul>"], ["Deepened structure now available", "<ul>\n<li>Chapter map: [algorithmic-trading-chan-chapter-map](algorithmic-trading-chan-chapter-map.md)</li>\n<li>Chapter notes directory: <code>wiki/sources/algorithmic-trading-chan-chapters/</code></li>\n<li>The book now has 8 chapter-level notes built from the contents page and chapter-opening extraction.</li>\n</ul>"], ["Strongest ideas to retain", "<p class=\"numbered\">1. A price series can fail to mean-revert at one timescale and still mean-revert at another.</p>\n<p class=\"numbered\">2. Strategy categories matter less than implementation discipline.</p>\n<p class=\"numbered\">3. Well-known edges decay; robustness comes from process and adaptation rather than blind attachment to a textbook trade.</p>\n<p class=\"numbered\">4. <a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a> and realistic transaction costs are central, not afterthoughts.</p>"], ["Project implications", "<ul>\n<li>For local research, do not dismiss intraday seasonality or conditional mean reversion just because daily bars look weak.</li>\n<li>Separate “signal logic” from “bar frequency / market microstructure assumptions.”</li>\n<li>When a strategy underperforms live, check engineering mismatches and cost assumptions before assuming the thesis is dead.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n</ul>"]], "search_text": "Algorithmic Trading book mean-reversion momentum intraday execution backtesting Algorithmic Trading — Ernest P. Chan Why this matters here Good bridge from abstract quant ideas to concrete strategy archetypes. Emphasizes that different effects appear at different sampling frequencies. Useful for reminding future agents that live divergence often comes from costs, bugs, or regime shifts rather than from “markets becoming impossible.” What it seems to contribute most This book is practical and strategy oriented. The recovered contents page plus chapter openings emphasize: backtesting and automated execution as a unified engineering problem multiple mean reversion implementations across equities, ETFs, currencies, and futures both interday and intraday momentum, not just slow moving trend logic explicit risk management as part of the strategy stack, not a separate appendix Deepened structure now available Chapter map: algorithmic trading chan chapter map (algorithmic trading chan chapter map.md) Chapter notes directory: wiki/sources/algorithmic trading chan chapters/ The book now has 8 chapter level notes built from the contents page and chapter opening extraction. Strongest ideas to retain 1. A price series can fail to mean revert at one timescale and still mean revert at another. 2. Strategy categories matter less than implementation discipline. 3. Well known edges decay; robustness comes from process and adaptation rather than blind attachment to a textbook trade. 4. execution realism and realistic transaction costs are central, not afterthoughts. Project implications For local research, do not dismiss intraday seasonality or conditional mean reversion just because daily bars look weak. Separate “signal logic” from “bar frequency / market microstructure assumptions.” When a strategy underperforms live, check engineering mismatches and cost assumptions before assuming the thesis is dead. Related pages mean reversion momentum execution realism backtesting", "meta": {"created": "2026-05-27", "updated": "2026-05-29", "part": "", "pages": "", "book": ""}, "author": "Ernest P. Chan"}, {"id": "following-the-trend-clenow-chapter-map", "title": "Following the Trend chapter map", "type": "chapter-map", "group": "chapters", "tags": ["following-the-trend", "chapter-map", "andreas-clenow"], "sections": [["Scope", "<ul>\n<li>Deepened from the embedded PDF table of contents plus chapter-opening extraction.</li>\n<li>Intended as a navigation layer for managed-futures ideas inside the workspace.</li>\n</ul>"], ["Chapters", "<ul>\n<li>Chapter 01 — <a href=\"#page=ft-clenow-01-cross-asset-trend-following-with-futures\" class=\"inline-link\">ft-clenow-01-cross-asset-trend-following-with-futures</a> (<code>pp. 23-42</code>)</li>\n<li>Chapter 02 — <a href=\"#page=ft-clenow-02-futures-data\" class=\"inline-link\">ft-clenow-02-futures-data</a> (<code>pp. 43-66</code>)</li>\n<li>Chapter 03 — <a href=\"#page=ft-clenow-03-construc pter 14 — <a href=\"#page=ft-clenow-14-final-words-of-caution\" class=\"inline-link\">ft-clenow-14-final-words-of-caution</a> (<code>pp. 319-339</code>)</li>\n</ul>"]], "search_text": "Following the Trend chapter map chapter-map following-the-trend chapter-map andreas-clenow Following the Trend chapter map Scope Deepened from the embedded PDF table of contents plus chapter opening extraction. Intended as a navigation layer for managed futures ideas inside the workspace. Chapters Chapter 01 — ft clenow 01 cross asset trend following with futures ( pp. 23 42 ) Chapter 02 — ft clenow 02 futures data ( pp. 43 66 ) Chapter 03 — ft clenow 03 constructing diversified futures trading strategies ( pp. 67 80 ) Chapter 04 — ft clenow 04 two basic trend following strategies ( pp. 81 106 ) Chapter 05 — ft clenow 05 in depth analysis of trend following performance ( pp. 107 128 ) Chapter 06 — ft clenow 06 a year by year review ( pp. 129 256 ) Chapter 07 — ft clenow 07 counter trend trading ( pp. 257 264 ) Chapter 08 — ft clenow 08 systematic trading without time series ( pp. 265 274 ) Chapter 09 — ft clenow 09 tweaks and improvements ( pp. 275 286 ) Chapter 10 — ft clenow 10 practicalities of futures trading ( pp. 287 296 ) Chapter 11 — ft clenow 11 modelling futures strategies ( pp. 297 304 ) Chapter 12 — ft clenow 12 does trend following work on stocks ( pp. 305 308 ) Chapter 13 — ft clenow 13 trading for a living ( pp. 309 318 ) Chapter 14 — ft clenow 14 final words of caution ( pp. 319 339 )", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "", "pages": "", "book": "Following the Trend"}, "author": ""}, {"id": "following-the-trend-clenow", "title": "Following the Trend", "type": "book", "group": "books", "tags": ["trend-following", "futures", "diversification", "robustness"], "sections": [["Why this matters here", "<ul>\n<li>Very useful antidote to overcomplication.</li>\n<li>Presents managed futures <a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a> as a diversified, rules-based business rather than a bag of clever indicators.</li>\n<li>Helpful for thinking about robustness, persistence, and cross-asset diversification.</li>\n</ul>"], ["Key themes visible from contents and sample pages", "<p>The table of contents centers on cross-asset trend following with futures, data construction, diversified strategy assembly, crisis behavior, year-by-year reviews, term structure, practical live trading, and modelling your own futures strategies.</p>"], ["Deepened structure now available", "<ul>\n<li>Chapter map: [following-the-trend-clenow-chapter-map](following-the-trend-clenow-chapter-map.md)</li>\n<li>Chapter notes directory: <code>wiki/sources/following-the-trend-clenow-chapters/</code></li>\n<li>The book now has 14 chapter-level notes built from the embedded PDF TOC plus chapter-opening extraction.</li>\n</ul>"], ["Strongest ideas to retain", "<ul>\n<li>Simple trend logic can remain useful when diversified properly across assets.</li>\n<li>Managed futures should be evaluated across regimes, including years when equities dominate and years when crisis diversification matters.</li>\n<li>The strategy is as much about construction discipline and staying power as about signal cleverness.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Local futures/spot research can borrow the principle of broad diversification even if the current focus is narrower than a full managed-futures portfolio.</li>\n<li>When evaluating strategy quality, include bad-year behavior and crisis behavior, not just average return.</li>\n<li>Use this book alongside <a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a> to separate signal simplicity from risk sophistication.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n</ul>"]], "search_text": "Following the Trend book trend-following futures diversification robustness Following the Trend — Andreas Clenow Why this matters here Very useful antidote to overcomplication. Presents managed futures trend following as a diversified, rules based business rather than a bag of clever indicators. Helpful for thinking about robustness, persistence, and cross asset diversification. Key themes visible from contents and sample pages The table of contents centers on cross asset trend following with futures, data construction, diversified strategy assembly, crisis behavior, year by year reviews, term structure, practical live trading, and modelling your own futures strategies. Deepened structure now available Chapter map: following the trend clenow chapter map (following the trend clenow chapter map.md) Chapter notes directory: wiki/sources/following the trend clenow chapters/ The book now has 14 chapter level notes built from the embedded PDF TOC plus chapter opening extraction. Strongest ideas to retain Simple trend logic can remain useful when diversified properly across assets. Managed futures should be evaluated across regimes, including years when equities dominate and years when crisis diversification matters. The strategy is as much about construction discipline and staying power as about signal cleverness. Project implications Local futures/spot research can borrow the principle of broad diversification even if the current focus is narrower than a full managed futures portfolio. When evaluating strategy quality, include bad year behavior and crisis behavior, not just average return. Use this book alongside systematic trading carver to separate signal simplicity from risk sophistication. Related pages trend following momentum drawdown risk position sizing", "meta": {"created": "2026-05-27", "update nest-chan Quantitative Trading chapter map Scope Deepened from the embedded PDF table of contents plus chapter opening extraction. Intended as a practical navigation layer for the HTML workspace. Chapters Chapter 01 — qt chan 01 the whats whos and whys of quantitative trading ( pp. 25 34 ) Chapter 02 — qt chan 02 fishing for ideas ( pp. 35 56 ) Chapter 03 — qt chan 03 backtesting ( pp. 57 104 ) Chapter 04 — qt chan 04 setting up your business ( pp. 105 116 ) Chapter 05 — qt chan 05 executionsystems ( pp. 117 132 ) Chapter 06 — qt chan 06 money and risk management ( pp. 133 156 ) Chapter 07 — qt chan 07 special topics in quantitative trading ( pp. 157 216 ) Chapter 08 — qt chan 08 conclusion can independent traders succeed ( pp. 217 256 )", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "", "pages": "", "book": "Quantitative Trading"}, "author": ""}, {"id": "quantitative-trading-chan", "title": "Quantitative Trading", "type": "book", "group": "books", "tags": ["backtesting", "execution", "risk-management", "research-process"], "sections": [["Why this matters here", "<ul>\n<li>Probably the best “independent quant” operating manual in this set.</li>\n<li>Explicitly covers <a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a>, execution systems, and money/risk management in one workflow.</li>\n<li>Closest book to the question: how do I actually build, test, and run a strategy business sensibly?</li>\n</ul>"], ["Key themes observed from extracted chapters", "<p>The embedded table of contents and sampled pages highlight a coherent pipeline:</p>\n<p class=\"numbered\">1. understand what quant trading is and who can do it</p>\n<p class=\"numbered\">2. acquire data and design rules</p>\n<p class=\"numbered\">3. perform serious <a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></p>\n<p class=\"numbered\">4. compare expected vs live performance inside execution systems</p>\n<p class=\"numbered\">5. handle <a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a>, leverage, and drawdowns via disciplined risk management</p>"], ["Deepened structure now available", "<ul>\n<li>Chapter map: [quantitative-trading-chan-chapter-map](quantitative-trading-chan-chapter-map.md)</li>\n<li>Chapter notes directory: <code>wiki/sources/quantitative-trading-chan-chapters/</code></li>\n<li>The book now has 8 chapter-level notes from the embedded PDF TOC plus chapter-opening extraction.</li>\n</ul>"], ["Strongest ideas to retain", "<ul>\n<li>Always replicate and inspect a strategy yourself, even if the source gives historical results.</li>\n<li>The backtest is not only validation; it is also a debugging and understanding tool.</li>\n<li>Live underperformance should trigger a diagnosis ladder: software bugs, backtest mismatch, excessive costs, illiquidity, data-snooping bias, and regime shift.</li>\n<li>Risk management is not separate from alpha; it determines whether alpha is survivable.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Any local research notebook should make room for both performance statistics and implementation diagnostics.</li>\n<li>A strategy result without cost assumptions and a post-backtest “live divergence checklist” is incomplete.</li>\n<li>Future agents should connect execution problems directly to strategy review rather than treating them as separate operational issues.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n</ul>"]], "search_text": "Quantitative Trading book backtesting execution risk-management research-process Quantitative Trading — Ernest P. Chan Why this matters here Probably the best “independent quant” operating manual in this set. Explicitly covers backtesting , execution systems, and money/risk management in one workflow. Closest book to the question: how do I actually build, test, and run a strategy business sensibly? Key themes observed from extracted chapters The embedded table of contents and sampled pages highlight a coherent pipeline: 1. understand what quant trading is and who can do it 2. acquire data and design rules 3. perform serious backtesting 4. compare expected vs live performance inside execution systems 5. handle position sizing , leverage, and drawdowns via disciplined risk management Deepened structure now available Chapter map: quantitative trading chan chapter map (quantitative trading chan chapter map.md) Chapter notes directory: wiki/sources/quantitative trading chan chapters/ The book now has 8 chapter level notes from the embedded PDF TOC plus chapter opening extraction. Strongest ideas to retain Always replicate and inspect a strategy yourself, even if the source gives historical results. The backtest is not only validation; it is also a debugging and understanding tool. Live underperformance should trigger a diagnosis ladder: software bugs, backtest mismatch, excessive costs, illiquidity, data snooping bias, and regime shift. Risk management is not separate from alpha; it determines whether alpha is survivable. Project implications Any local research notebook should make room for both performance statistics and implementation diagnostics. A strategy result without cost assumptions and a post backtest “live divergence checklist” is incomplete. Future agents should connect execution problems directly to strategy review rather than treating them as separate operational issues. Related pages backtesting execution realism position sizing walk forward analysis", "meta": {"created": "2026-05-27", "updated": "2026-05-29", "part": "", "pages": "", "book": ""}, "author": "Ernest P. Chan"}, {"id": "stocks-on-the-move-clenow-chapter-map", "title": "Sto ve-clenow", "title": "Stocks on the Move", "type": "book", "group": "books", "tags": ["equities-momentum", "ranking", "portfolio-construction", "simplicity"], "sections": [["Why this matters here", "<ul>\n<li>Gives an implementation-focused equities momentum framework.</li>\n<li>Useful for seeing how a very simple statement (“buy stocks that move up”) becomes a systematic portfolio process.</li>\n<li>Good complement to <a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a> because it narrows from multi-asset futures to stock selection and portfolio management.</li>\n</ul>"], ["Key themes visible from EPUB structure", "<p>The EPUB navigation shows a coherent progression from why benchmark-style investing underperforms, to why equities are structurally hard, to stock-specific trend and momentum logic, then market regime filtering, ranking, sizing, selling, full strategy assembly, trading workflow, and performance review.</p>"], ["Deepened structure now available", "<ul>\n<li>Chapter map: [stocks-on-the-move-clenow-chapter-map](stocks-on-the-move-clenow-chapter-map.md)</li>\n<li>Chapter notes directory: <code>wiki/sources/stocks-on-the-move-clenow-chapters/</code></li>\n<li>The book now has top-level EPUB section notes built from the navigation tree plus section-opening extraction.</li>\n</ul>"], ["Strongest ideas to retain", "<ul>\n<li>Simple concepts can be powerful if the portfolio process is clear.</li>\n<li>The hard part is not inventing a novel insight; it is implementing the ranking, filtering, and portfolio management cleanly.</li>\n<li>Good systematic equity momentum should resist the temptation to add unnecessary complexity.</li>\n</ul>"], ["Project implications", "<ul>\n<li>If local research expands into cross-sectional equity or instrument ranking, this book is a strong model for keeping the process comprehensible.</li>\n<li>It can also act as a useful contrast with <a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a>: one book is broader and strategy-archetype focused, the other is narrower and portfolio-process focused.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n</ul>"]], "search_text": "Stocks on the Move book equities-momentum ranking portfolio-construction simplicity Stocks on the Move — Andreas Clenow Why this matters here Gives an implementation focused equities momentum framework. Useful for seeing how a very simple statement (“buy stocks that move up”) becomes a systematic portfolio process. Good complement to following the trend clenow because it narrows from multi asset futures to stock selection and portfolio management. Key themes visible from EPUB structure The EPUB navigation shows a coherent progression from why benchmark style investing underperforms, to why equities are structurally hard, to stock specific trend and momentum logic, then market regime filtering, ranking, sizing, selling, full strategy assembly, trading workflow, and performance review. Deepened structure now available Chapter map: stocks on the move clenow chapter map (stocks on the move clenow chapter map.md) Chapter notes directory: wiki/sources/stocks on the move clenow chapters/ The book now has top level EPUB section notes built from the navigation tree plus section opening extraction. Strongest ideas to retain Simple concepts can be powerful if the portfolio process is clear. The hard part is not inventing a novel insight; it is implementing the ranking, filtering, and portfolio management cleanly. Good systematic equity momentum should resist the temptation to add unnecessary complexity. Project implications If local research expands into cross sectional equity or instrument ranking, this book is a strong model for keeping the process comprehensible. It can also act as a useful contrast with algorithmic trading chan : one book is broader and strategy archetype focused, the other is narrower and portfolio process focused. Related pages momentum position sizing backtesting trend following", "meta": {"created": "2026-05-27", "updated": "2026-05-29", "part": "", "pages": "", "book": ""}, "author": "Andreas F. Clenow"}, {"id": "systematic-trading-carver-chapter-map", "title": "Systematic Trading chapter map", "type": "chapter-map", "group": "chapters", "tags": ["systematic-trading", "chapter-map", "carver"], "sections": [["Summary", "<p>This note breaks Robert Carver’s Systematic Trading into navigable chunks for future research work. It is based on the PDF table of contents plus chapter-opening page extraction, so it is stronger than the first-pass source summary but still not a full line-by-line digest.</p>"], ["Parts", "<ul>\n<li>Theory: chapters 1–2</li>\n<li>Toolbox: chapters 3–4</li>\n<li>Framework: chapters 5–12</li>\n<li>Practice: chapters 13–15</li>\n</ul>"], ["Reading priority for this project", "<p class=\"numbered\">1. Chapter 3 — Fitting</p>\n<p class=\"numbered\">2. Chapter 9 — Volatility Targeting</p>\n<p class=\"numbered\">3. Chapter 10 — Position Sizing</p>\n<p class=\"numbered\">4. Chapter 11 — Portfolios</p>\n<p class=\"numbered\">5. Chapter 12 — Speed and Size</p>\n<p class=\"numbered\">6. Chapters 7–8 — Forecasts and Combined Forecasts</p>"], ["Chapter links", "<ul>\n<li>[01 — The Flawed Human Brain](systematic-trading-carver-chapters/carver-st-01-flawed-human-brain.md)</li>\n<li>[02 — Systematic Trading Rules](systematic-trading-carver-chapters/carver-st-02-systematic-trading-rules.md)</li>\n<li>[03 — Fitting](systematic-trading-carver-chapters/carver-st-03-fitting.md)</li>\n<li>[04 — Portfolio Allocation](systematic-trading-carver-chapters/carver-st-04-portfolio-allocation.md)</li>\n<li>[05 — Framework Overview](systematic-trading-carver-chapters/carver-st-05-framework-overview.md)</li>\n<li>[06 — Instruments](systematic-trading-carver-chapters/carver-st-06-instruments.md)</li>\n<li>[07 — Forecasts](systematic-trading-carver-chapters/carver-st-07-forecasts.md)</li>\n<li>[08 — Combined Forecasts](systematic-trading-carver-chapters/carver-st-08-combined-forecasts.md)</li>\n<li>[09 — Volatility Targeting](systematic-trading-carver-chapters/carver-st-09-volatility-targeting.md)</li>\n<li>[10 — Position Sizing](systematic-trading-carver-chapters/carver-st-10-position-sizing.md)</li>\n<li>[11 — Portfolios](systematic-trading-carver-chapters/carver-st-11-portfolios.md)</li>\n<li>[12 — Speed and Size](systematic-trading-carver-chapters/carver-st-12-speed-and-size.md)</li>\n<li>[13 — Semi-automatic Trader](systematic-trading-carver-chapters/carver-st-13-semi-automatic-trader.md)</li>\n<li>[14 — Asset Allocating Investor](systematic-trading-carver-chapters/carver-st-14-asset-allocating-investor.md)</li>\n<li>[15 — Staunch Systems Trader](systematic-trading-carver-chapters/carver-st-15-staunch-systems-trader.md)</li>\n</ul>"], ["How to use this set", "<ul>\n<li>Use chapters 3, 4, 9, 10, 11, and 12 when translating book ideas into actual backtest architecture.</li>\n<li>Use chapters 1 and 2 when sanity-checking whether an idea is real or just emotionally appealing.</li>\n<li>Use chapters 13–15 to decide which Carver archetype best fits the actual workflow you want to run locally.</li>\n</ul>"]], "search_text": "Systematic Trading chapter map chapter-map systematic-trading chapter-map carver Systematic Trading — chapter map This note breaks Robert Carver’s Systematic Trading into navigable chunks for future research work. It is based on the PDF table of contents plus chapter opening page extraction, so it is stronger than the first pass source summary but still not a full line by line digest. Parts Theory: chapters 1–2 Toolbox: chapters 3–4 Framework: chapters 5–12 Practice: chapters 13–15 Reading priority for this project 1. Chapter 3 — Fitting 2. Chapter 9 — Volatility Targeting 3. Chapter 10 — Position Sizing 4. Chapter 11 — Portfolios 5. Chapter 12 — Speed and Size 6. Chapters 7–8 — Forecasts and Combined Forecasts Chapter links 01 — The Flawed Human Brain (systematic trading carver chapters/carver st 01 flawed human brain.md) 02 — Systematic Trading Rules (systematic trading carver chapters/carver st 02 systematic trading rules.md) 03 — Fitting (systematic trading carver chapters/carver st 03 fitting.md) 04 — Portfolio Allocation (systematic trading carver chapters/carver st 04 portfolio allocation.md) 05 — Framework Overview (systematic trading carver chapters/carver st 05 framework overview.md) 06 — Instruments (systematic trading carver chapters/carver st 06 instruments.md) 07 — Forecasts (systematic trading carver chapters/carver st 07 forecasts.md) 08 — Combined Forecasts (systematic trading carver chapters/carver st 08 combined forecasts.md) 09 — Volatility Targeting (systematic trading carver chapters/carver st 09 volatility targeting.md) 10 — Position Sizing (systematic trading carver chapters/carver st 10 position sizing.md) 11 — Portfolios (systematic trading carver chapters/carver st 11 portfolios.md) 12 — Speed and Size (systematic trading carver chapters/carver st 12 speed and size.md) 13 — Semi automatic Trader (systematic trading carver chapters/carver st 13 semi automatic trader.md) 14 — Asset Allocating Investor (systematic trading carver chapters/carver st 14 asset allocating investor.md) 15 — Staunch Systems Trader (systematic trading carver chapters/carver st 15 staunch systems trader.md) How to use this set Use chapters 3, 4, 9, 10, 11, and 12 when translating book ideas into actual backtest architecture. Use chapters 1 and 2 when sanity checking whether an idea is real or just emotionally appealing. Use chapters 13–15 to decide which Carver archetype best fits the actual workflow you want to run locally.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "systematic-trading-carver", "title": "Systematic Trading", "type": "book", "group": "books", "tags": ["portfolio-construction", "volatility-targeting", "fitting", "systematic-process"], "sections": [["Why this matters here", "<ul>\n<li>Best source in this set for robust portfolio process.</li>\n<li>Particularly strong on fitting limits, diversification, <a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a>, and portfolio-level thinking.</li>\n<li>Most useful if the goal is to run strategies that survive bad periods instead of merely looking impressive in sample.</li>\n</ul>"], ["What this deeper pass adds", "<ul>\n<li>A chapter-by-chapter map grounded in the PDF table of contents and chapter-opening pages.</li>\n<li>Separate notes for each of the 15 main chapters, so future agents can navigate Carver by topic instead of treating the book as one blob.</li>\n<li>Better links from book structure to this project’s research pipeline, sizing logic, and execution realism work.</li>\n</ul>"], ["Book structure at a glance", "<ul>\n<li>Introduction: why discretionary decision-making breaks under stress and why a systematic framework helps.</li>\n<li>Part One / Theory: why humans make poor trading decisions and what makes trading rules plausible.</li>\n<li>Part Two / Toolbox: how fitting and portfolio allocation go wrong, and how to restrain them.</li>\n<li>Part Three / Framework: the modular components of a systematic process, from instruments through forecasts, volatility, sizing, and portfolios.</li>\n<li>Part Four / Practice: three user archetypes — semi-automatic trader, asset allocator, and staunch systems trader.</li>\n</ul>"], ["Chapter map", "<ul>\n<li>[Carver chapter map](systematic-trading-carver-chapter-map.md)</li>\n<li>[Chapter 1 — The Flawed Human Brain](systematic-trading-carver-chapters/carver-st-01-flawed-human-brain.md)</li>\n<li>[Chapter 2 — Systematic Trading Rules](systematic-trading-carver-chapters/carver-st-02-systematic-trading-rules.md)</li>\n<li>[Chapter 3 — Fitting](systematic-trading-carver-chapters/carver-st-03-fitting.md)</li>\n<li>[Chapter 4 — Portfolio Allocation](systematic-trading-carver-chapters/carver-st-04-portfolio-allocation.md)</li>\n<li>[Chapter 5 — Framework Overview](systematic-trading-carver-chapters/carver-st-05-framework-overview.md)</li>\n<li>[Chapter 6 — Instruments](systematic-trading-carver-chapters/carver-st-06-instruments.md)</li>\n<li>[Chapter 7 — Forecasts](systematic-trading-carver-chapters/carver-st-07-forecasts.md)</li>\n<li>[Chapter 8 — Combined Forecasts](systematic-trading-carver-chapters/carver-st-08-combined-forecasts.md)</li>\n<li>[Chapter 9 — Volatility Targeting](systematic-trading-carver-chapters/carver-st-09-volatility-targeting.md)</li>\n<li>[Chapter 10 — Position Sizing](systematic-trading-carver-chapters/carver-st-10-position-sizing.md)</li>\n<li>[Chapter 11 — Portfolios](systematic-trading-carver-chapters/carver-st-11-portfolios.md)</li>\n<li>[Chapter 12 — Speed and Size](systematic-trading-carver-chapters/carver-st-12-speed-and-size.md)</li>\n<li>[Chapter 13 — Semi-automatic Trader](systematic-trading-carver-chapters/carver-st-13-semi-automatic-trader.md)</li>\n<li>[Chapter 14 — Asset Allocating Investor](systematic-trading-carver-chapters/carver-st-14-asset-allocating-investor.md)</li>\n<li>[Chapter 15 — Staunch Systems Trader](systematic-trading-carver-chapters/carver-st-15-staunch-systems-trader.md)</li>\n</ul>"], ["Strongest ideas to retain", "<p class=\"numbered\">1. Systems are partly a defense against the flawed human brain.</p>\n<p class=\"numbered\">2. Fitting and parameter choice should be constrained and justified.</p>\n<p class=\"numbered\">3. The portfolio is the real unit of decision, not a single strategy in isolation.</p>\n<p class=\"numbered\">4. Use <a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a> and conservative leverage logic so returns are normalized to risk and drawdowns remain survivable.</p>\n<p class=\"numbered\">5. Trading speed, cost, instrument choice, and account size must shape design from the start rather than being added after a pretty backtest.</p>"], ["Project implications", "<ul>\n<li>Local research should report volatility-normalized metrics, not just raw returns.</li>\n<li>Position sizing logic deserves its own module rather than being embedded ad hoc in notebooks.</li>\n<li>Portfolio concentration and cross-strategy correlation should be considered early, even in personal research.</li>\n<li>Research notebooks should separate forecast generation, volatility estimation, sizing, and portfolio construction into explicit steps.</li>\n</ul>"], ["Related pages", "<ul>\n<li>[Carver chapter map](systematic-trading-carver-chapter-map.md)</li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n</ul>"]], "search_text": "Systematic Trading book portfolio-construction volatility-targeting fitting systematic-process Systematic Trading — Robert Carver Why this matters here Best source in this set for robust portfolio process. Particularly strong on fitting limits, diversification, volatility targeting , and portfolio level thinking. Most useful if the goal is to run strategies that survive bad periods instead of merely looking impressive in sample. What this deeper pass adds A chapter by chapter map grounded in the PDF table of contents and chapter opening pages. Separate notes for each of the 15 main chapters, so future agents can navigate Carver by topic instead of treating the book as one blob. Better links from book structure to this project’s research pipeline, sizing logic, and execution realism work. Book structure at a glance Introduction: why discretionary decision making breaks under stress and why a systematic framework helps. Part One / Theory: why humans make poor trading decisions and what makes trading rules plausible. Part Two / Toolbox: how fitting and portfolio allocation go wrong, and how to restrain them. Part Three / Framework: the modular components of a systematic process, from instruments through forecasts, volatility, sizing, and portfolios. Part Four / Practice: three user archetypes — semi automatic trader, asset allocator, and staunch systems trader. Chapter map Carver chapter map (systematic trading carver chapter map.md) Chapter 1 — The Flawed Human Brain (systematic trading carver chapters/carver st 01 flawed human brain.md) Chapter 2 — Systematic Trading Rules (systematic trading carver chapters/carver st 02 systematic trading rules.md) Chapter 3 — Fitting (systematic trading carver chapters/carver st 03 fitting.md) Chapter 4 — Portfolio Allocation (systematic trading carver chapters/carver st 04 portfolio allocation.md) Chapter 5 — Framework Overview (systematic trading carver chapters/carver st 05 framework overview.md) Chapter 6 — Instruments (systematic trading carver chapters/carver st 06 instruments.md) Chapter 7 — Forecasts (systematic trading carver chapters/carver st 07 forecasts.md) Chapter 8 — Combined Forecasts (systematic trading carver chapters/carver st 08 combined forecasts.md) Chapter 9 — Volatility Targeting (systematic trading carver chapters/carver st 09 volatility targeting.md) Chapter 10 — Position Sizing (systematic trading carver chapters/carver st 10 position sizing.md) Chapter 11 — Portfolios (systematic trading carver chapters/carver st 11 portfolios.md) Chapter 12 — Speed and Size (systematic trading carver chapters/carver st 12 speed and size.md) Chapter 13 — Semi automatic Trader (systematic trading carver chapters/carver st 13 semi automatic trader.md) Chapter 14 — Asset Allocating Investor (systematic trading carver chapters/carver st 14 asset allocating investor.md) Chapter 15 — Staunch Systems Trader (systematic trading carver chapters/carver st 15 staunch systems trader.md) Strongest ideas to retain 1. Systems are partly a defense against the flawed human brain. 2. Fitting and parameter choice should be constrained and justified. 3. The portfolio is the real unit of decision, not a single strategy in isolation. 4. Use volatility targeting and conservative leverage logic so returns are normalized to risk and drawdowns remain survivable. 5. Trading speed, cost, instrument choice, and account size must shape design from the start rather than being added after a pretty backtest. Project implications Local research should report volatility normalized metrics, not just raw returns. Position sizing logic deserves its own module rather than being embedded ad hoc in notebooks. Portfolio concentration and cross strategy correlation should be considered early, even in personal research. Research notebooks should separate forecast generation, volatility estimation, sizing, and portfolio construction into explicit steps. Related pages Carver chapter map (systematic trading carver chapter map.md) volatility targeting position sizing drawdown risk walk forward analysis", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": "Robert Carver"}, {"id": "algo-chan-01-backtesting-and-automated-execution", "title": "Algorithmic Trading chapter 01 — Backtesting and Automated Execution", "type": "chapter", "group": "chapters", "tags": ["algorithmic-trading", "ernest-chan", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the PDF contents: <strong>Backtesting and Automated Execution</strong>.</li>\n<li>Page span from the contents page: <code>1-38</code>.</li>\n<li>This sits inside Chan&#x27;s broader split between mean-reversion, momentum, execution discipline, and risk management.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>ALGORITHMIC TRADING Founded in 1807, John Wiley &amp; Sons is the oldest independent publish- ing company in the United States. With offi ces in North America, Europe, Australia, and Asia, Wiley is globally committed to developing and mar- keting print and electronic products and services for our customers’ professional and personal knowledge and understanding. The Wiley Trading series features books by traders who have survived the market’s ever changing temperament and have prospered—some by reinventing systems, others by getting back to basics. Whether a novice trader, professional, or somewhere in-between, these books will provide the advice and strategies needed to prosper today and well into the future. For a list of available titles, visit our website at www.WileyFinance.com.</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>Backtesting and live execution should be treated as one engineering system, not two disconnected tasks.</li>\n<li>Bias control and platform design matter before strategy cleverness.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the book contents page plus chapter-opening PDF extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Algorithmic Trading chapter 01 — Backtesting and Automated Execution chapter algorithmic-trading ernest-chan chapter-note Algorithmic Trading chapter 01 — Backtesting and Automated Execution What this chapter appears to cover Chapter title from the PDF contents: Backtesting and Automated Execution . Page span from the contents page: 1 38 . This sits inside Chan's broader split between mean reversion, momentum, execution discipline, and risk management. Opening signal from the extracted pages ALGORITHMIC TRADING Founded in 1807, John Wiley & Sons is the oldest independent publish ing company in the United States. With offi ces in North America, Europe, Australia, and Asia, Wiley is globally committed to developing and mar keting print and electronic products and services for our customers’ professional and personal knowledge and understanding. The Wiley Trading series features books by traders who have survived the market’s ever changing temperament and have prospered—some by reinventing systems, others by getting back to basics. Whether a novice trader, professional, or somewhere in between, these books will provide the advice and strategies needed to prosper today and well into the future. For a list of available titles, visit our website at www.WileyFinance.com. Why this matters for quant strategy building Backtesting and live execution should be treated as one engineering system, not two disconnected tasks. Bias control and platform design matter before strategy cleverness. Related pages algorithmic trading chan backtesting execution realism position sizing momentum mean reversion Extraction notes Derived from the book contents page plus chapter opening PDF extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 1", "pages": "1-38", "book": "Algorithmic Trading"}, "author": ""}, {"id": "algo-chan-02-the-basics-of-mean-reversion", "title": "Algorithmic Trading chapter 02 — The Basics of Mean Reversion", "type": "chapter", "group": "chapters", "tags": ["algorithmic-trading", "ernest-chan", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the PDF contents: <strong>The Basics of Mean Reversion</strong>.</li>\n<li>Page span from the contents page: <code>39-62</code>.</li>\n<li>This sits inside Chan&#x27;s broader split between mean-reversion, momentum, execution discipline, and risk management.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>26 ALGORITHMIC TRADING having to learn a programming language by presenting a graphical “drag- and-drop” user interface for building a trading strategy. Examples of these products are Deltix and Progress Apama. However, I have found that these GUIs can be quite limiting in the variety of strategies that you can build, and in the long run, it is far more effi cient to become adept in a program- ming language in order to express your strategy. (Note that Deltix and Progress Apama also allow other ways to specify a strategy, as explained below.) Traders possessing the next level of programming skill should consider implementing both backtesting and automated execution using one of the scripting languages. These languages do not require compilation, and you can instantly see the results the moment you fi nish typing in the mathe- matical or logical expressions. Many traders’ favorite backtesting platform, Microsoft Excel, perhaps used in conjunction with Visual Basic (VB) macros, belongs to this category. But it is actually quite hard to build a reasonably complicated strategy in Excel, and even harder to debug it. Excel also is not a particularly high-performance language, so if your strategy is very compu- tationally intensive, it is not going to work. If you use Excel for automated executions, you may fi nd that you have to use DDE links provided by your brokerage for market dat</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>Mean reversion needs precise definition before implementation: stationarity tests, half-life intuition, and scaling logic matter.</li>\n<li>This chapter is foundational for deciding when a market is even eligible for mean-reversion treatment.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the book contents page plus chapter-opening PDF extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Algorithmic Trading chapter 02 — The Basics of Mean Reversion chapter algorithmic-trading ernest-chan chapter-note Algorithmic Trading chapter 02 — The Basics of Mean Reversion What this chapter appears to cover Chapter title from the PDF contents: The Basics of Mean Reversion . Page span from the contents page: 39 62 . This sits inside Chan's broader split between mean reversion, momentum, execution discipline, and risk management. Opening signal from the extracted pages 26 ALGORITHMIC TRADING having to learn a programming language by presenting a graphical “drag and drop” user interface for building a trading strategy. Examples of these products are Deltix and Progress Apama. However, I have found that these GUIs can be quite limiting in the variety of strategies that you can build, and in the long run, it is far more effi cient to become adept in a program ming language in order to express your strategy. (Note that Deltix and Progress Apama also allow other ways to specify a strategy, as explained below.) Traders possessing the next level of programming skill should consider implementing both backtesting and automated execution using one of the scripting languages. These languages do not require compilation, and you can instantly see the results the moment you fi nish typing in the mathe matical or logical expressions. Many traders’ favorite backtesting platform, Microsoft Excel, perhaps used in conjunction with Visual Basic (VB) macros, belongs to this category. But it is actually quite hard to build a reasonably complicated strategy in Excel, and even harder to debug it. Excel also is not a particularly high performance language, so if your strategy is very compu tationally intensive, it is not going to work. If you use Excel for automated executions, you may fi nd that you have to use DDE links provided by your brokerage for market dat Why this matters for quant strategy building Mean reversion needs precise definition before implementation: stationarity tests, half life intuition, and scaling logic matter. This chapter is foundational for deciding when a market is even eligible for mean reversion treatment. Related pages algorithmic trading chan backtesting execution realism position sizing momentum mean reversion Extraction notes Derived from the book contents page plus chapter opening PDF extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 2", "pages": "39-62", "book": "Algorithmic Trading"}, "author": ""}, {"id": "algo-chan-03-implementing-mean-reversion-strategies", "title": "Algorithmic Trading chapter 03 — Implementing Mean Reversion Strategies", "type": "chapter", "group": "chapters", "tags": ["algorithmic-trading", "ernest-chan", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the PDF contents: <strong>Implementing Mean Reversion Str  our capital. (Therefore, we invest nothing and earn zero returns if the price never reaches L2.) III. Average-in: We invest in one contract when the price reaches L1, and in another contract if the price reaches L2. In all cases, we exit all contracts only when the price reaches F (so no aver- age-out, even if there is average-in). What are the expected profi ts of each alternative? The expected profi ts in points are: I. 2(F − L1) II. 2p(F − L2) III. p[(F − L1) + (F − L2)] + (1 − p)(F − L1) = (F − L1) + p(F − L2) Obviously, if p = 0, method I is the most profi table. If p = 1, method II is the most profi table. In fact, there is a transition probability pˆ = (F − L1) / (F − L2) such that if p &lt; pˆ, method I is more profi table than II, and vice versa if p &gt; pˆ. It is also easy to show that if p &lt; pˆ, method I is also more profi table than III, and if p &gt; pˆ, method II is more profi table than III. So there is no situation where the average-in strategy is the most profi table one! So does that mean the whole idea of scaling-in/averaging-in has been debunked? Not necessarily. Notice the implicit assumption made in my illustration: the probability of deviating to L2 before reverting to F is constant throughout time. In real life, we may or may not fi nd this prob- ability to be consta</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>Stocks and ETFs provide many practical mean-reversion examples but are vulnerable to microstructure and data issues.</li>\n<li>Useful when translating abstract spread logic into tradable instrument sets.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a veraging in has been debunked? Not necessarily. Notice the implicit assumption made in my illustration: the probability of deviating to L2 before reverting to F is constant throughout time. In real life, we may or may not fi nd this prob ability to be consta Why this matters for quant strategy building Stocks and ETFs provide many practical mean reversion examples but are vulnerable to microstructure and data issues. Useful when translating abstract spread logic into tradable instrument sets. Related pages algorithmic trading chan backtesting execution realism position sizing momentum mean reversion Extraction notes Derived from the book contents page plus chapter opening PDF extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 4", "pages": "87-106", "book": "Algorithmic Trading"}, "author": ""}, {"id": "algo-chan-05-mean-reversion-of-currencies-and-futures", "title": "Algorithmic Trading chapter 05 — Mean Reversion of Currencies and Futures", "type": "chapter", "group": "chapters", "tags": ["algorithmic-trading", "ernest-chan", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the PDF contents: <strong>Mean Reversion of Currencies and Futures</strong>.</li>\n<li>Page span from the contents page: <code>107-132</code>.</li>\n<li>This sits inside Chan&#x27;s broader split between mean-reversion, momentum, execution discipline, and risk management.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>95 MEAN REVERSION OF STOCKS AND ETFS does not include rule 2, and it suff ered from diminishing returns from 2009 onward. The long-only nature of the strategy also presents some risk management challenges. Finally, the number of stocks traded each day is quite small, which means that the strategy does not have a large capacity. The astute reader may wonder how we can use open prices to determine the trading signals for entry at the open and be fi lled at the offi cial open prices. The short answer is, of course: We can’t! We can, however, use the preopen prices (for example, at ARCA) to determine the trading signals. The signals thus determined will not exactly match the ones determined by the actual open prices, but the hope is that the diff erence will not be so large as to wipe out the returns. We can call this diff erence signal noise. Also, note the pitfall of backtesting this strategy using consolidated prices versus primary exchange prices, as explained in Chapter 1. What about the mirror image of this strategy? Can we short stocks that gap up a standard deviation but are still lower than their 20-day mov- ing average? Yes, we can. The APR is 46 percent and the Sharpe ratio is 1.27 over the same period. Despite the seemingly higher return than the long-only strategy, the short-only one does have steeper drawdown (see Figure 4.2), and it suff ered from the same short-sale</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>Currencies and futures require different return conventions, roll assumptions, and term-structure awareness.</li>\n<li>This is directly relevant whenever research moves beyond cash equities.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the book contents page plus chapter-opening PDF extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Algorithmic Trading chapter 05 — Mean Reversion of Currencies and Futures chapter algorithmic-trading ernest-chan chapter-note Algorithmic Trading chapter 05 — Mean Reversion of Currencies and Futures What this chapter appears to cover Chapter title from the PDF contents: Mean Reversion of Currencies and Futures . Page span from the contents page: 107 132 . This sits inside Chan's broader split between mean reversion, momentum, execution discipline, and risk management. Opening signal from the extracted pages 95 MEAN REVERSION OF STOCKS AND ETFS does not include rule 2, and it suff ered from diminishing returns from 2009 onward. The long only nature of the strategy also presents some risk management challenges. Finally, the number of stocks traded each day is quite small, which means that the strategy does not have a large capacity. The astute reader may wonder how we can use open prices to determine the trading signals for entry at the open and be fi lled at the offi cial open prices. The short answer is, of course: We can’t! We can, however, use the preopen prices (for example, at ARCA) to determine the trading signals. The signals thus determined will not exactly match the ones determined by the actual open prices, but the hope is that the diff erence will not be so large as to wipe out the returns. We can call this diff erence signal noise. Also, note the pitfall of backtesting this strategy using consolidated prices versus primary exchange prices, as explained in Chapter 1. What about the mirror image of this strategy? Can we short stocks that gap up a standard deviation but are still lower than their 20 day mov ing average? Yes, we can. The APR is 46 percent and the Sharpe ratio is 1.27 over the same period. Despite the seemingly higher return than the long only strategy, the short only one does have steeper drawdown (see Figure 4.2), and it suff ered from the same short sale Why this matters for quant strategy building Currencies and pter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 6", "pages": "133-154", "book": "Algorithmic Trading"}, "author": ""}, {"id": "algo-chan-07-intraday-momentum-strategies", "title": "Algorithmic Trading chapter 07 — Intraday Momentum Strategies", "type": "chapter", "group": "chapters", "tags": ["algorithmic-trading", "ernest-chan", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the PDF contents: <strong>Intraday Momentum Strategies</strong>.</li>\n<li>Page span from the contents page: <code>155-168</code>.</li>\n<li>This sits inside Chan&#x27;s broader split between mean-reversion, momentum, execution discipline, and risk management.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>144 ALGORITHMIC TRADING Notice that the hedge ratio of this strategy is slightly diff erent from that reported by Simon and Campasano: It is based on the regression fi t between the VX versus ES prices in Equation 5.11, not between their returns as in the original paper. The settlement is the day after the contracts expire. The APR for July 29, 2010, to May 7, 2012 (this period was not used for hedge ratio determination) is 6.9 percent, with a Sharpe ratio of 1. The cumulative return chart is displayed in Figure 6.4. You can fi nd the MATLAB code for this strategy in VX_ES_rollreturn.m on my website. ■Cross-Sectional Strategies There is a third way to extract the often large roll returns in futures besides buying and holding or arbitraging against the underlying asset (or against an instrument correlated with the underlying asset). This third way is a cross- sectional strategy: We can just buy a portfolio of futures in backwardation, and simultaneously short a portfolio of futures in contango. The hope is that the returns of the spot prices cancel each other out (a not unreasonable expectation if we believe commodities’ spot prices are positively correlated with economic growth or some other macroeconomic indices), and we are left with the favorable roll returns. Daniel and Moskowitz described just such a simple “cross-sectional” momentum strategy that is almost a mir- ror imag</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>Intraday momentum raises stronger execution and latency constraints than slower strategies.</li>\n<li>This chapter likely matters most for deciding what is realistic for a personal trading stack.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the book contents page plus chapter-opening PDF extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Algorithmic Trading chapter 07 — Intraday Momentum Strategies chapter algorithmic-trading ernest-chan chapter-note Algorithmic Trading chapter 07 — Intraday Momentum Strategies What this chapter appears to cover Chapter title from the PDF contents: Intraday Momentum Strategies . Page span from the contents page: 155 168 . This sits inside Chan's broader split between mean reversion, momentum, execution discipline, and risk management. Opening signal from the extracted pages 144 ALGORITHMIC TRADING Notice that the hedge ratio of this strategy is slightly diff erent from that reported by Simon and Campasano: It is based on the regression fi t between the VX versus ES prices in Equation 5.11, not between their returns as in the original paper. The settlement is the day after the contracts expire. The APR for July 29, 2010, to May 7, 2012 (this period was not used for hedge ratio determination) is 6.9 percent, with a Sharpe ratio of 1. The cumulative return chart is displayed in Figure 6.4. You can fi nd the MATLAB code for this strategy in VX_ES_rollreturn.m on my website. ■Cross Sectional Strategies There is a third way to extract the often large roll returns in futures besides buying and holding or arbitraging against the underlying asset (or against an instrument correlated with the underlying asset). This third way is a cross sectional strategy: We can just buy a portfolio of futures in backwardation, and simultaneously short a portfolio of futures in contango. The hope is that the returns of the spot prices cancel each other out (a not unreasonable expectation if we believe commodities’ spot prices are positively correlated with economic growth or some other macroeconomic indices), and we are left with the favorable roll returns. Daniel and Moskowitz described just such a simple “cross sectional” momentum strategy that is almost a mir ror imag Why this matters for quant strategy building Intraday momentum raises stronger execution and latency constraints than slower strategies. This chapter likely matters most for deciding what is realistic for a personal trading stack. Related pages algorithmic trading chan backtesting execution realism position sizing momentum mean reversion Extraction notes Derived from the book contents page plus chapter opening PDF extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 7", "pages": "155-168", "book": "Algorithmic Trading"}, "author": ""}, {"id": "algo-chan-08-risk-management", "title": "Algorithmic Trading chapter 08 — Risk Management", "type": "chapter", "group": "chapters", "tags": ["algorithmic-trading", "ernest-chan", "chapter-note"], "se
