re, and disciplined risk management.</li>\n<li>You do not need exotic complexity to approximate the broad logic of those systems.</li>\n<li>What matters most is coherent portfolio construction and robust implementation rather than mystical entry rules.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Clenow explicitly argues that a motivated individual can reproduce much of the structural behavior of institutional trend systems using simple rules, sensible software, and disciplined portfolio assembly.</li>\n</ul>"], ["Why this matters for systematic research", "<ul>\n<li>It reframes trend following as portfolio engineering, not indicator worship.</li>\n<li>It highlights why diversification across contracts and risk buckets matters so much.</li>\n<li>It gives a useful benchmark for deciding whether a “clever” variation is actually adding value.</li>\n</ul>"], ["What to borrow into your own workflow", "<ul>\n<li>Think about universe design and risk normalization before polishing signal details.</li>\n<li>Build simple benchmark trend systems first, then layer refinements only if they survive comparison.</li>\n<li>Evaluate the strategy as a portfolio object: correlation structure, diversification breadth, and drawdown behavior.</li>\n<li>Ask whether each added rule improves robustness or merely tells a better story.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=topic-portfolio-construction-and-risk\" class=\"inline-link\">topic-portfolio-construction-and-risk</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the embedded PDF TOC plus chapter-opening extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Following the Trend chapter 03 — Constructing Diversified Futures Trading Strategies chapter following-the-trend andreas-clenow chapter-note Following the Trend chapter 03 — Constructing Diversified Futures Trading Strategies What this chapter appears to cover Chapter title from the embedded PDF TOC: Constructing Diversified Futures Trading Strategies . Page span from TOC anchors: 67 80 . This is one of the key implementation chapters for understanding why trend following often works better as a diversified portfolio process than as a single market prediction game. Visible subsection structure They Are All Doing the Same Thing Cracking Open the Magic Trend Following Black Box Core argument The large managed futures firms may differ in detail, but much of the return engine comes from a recognizable combination of broad diversification, trend capture, and disciplined risk management. You do not need exotic complexity to approximate the broad logic of those systems. What matters most is coherent portfolio construction and robust implementation rather than mystical entry rules. Opening signal from the extracted pages Clenow explicitly argues that a motivated individual can reproduce much of the structural behavior of institutional trend systems using simple rules, sensible software, and disciplined portfolio assembly. Why this matters for systematic research It reframes trend following as portfolio engineering, not indicator worship. It highlights why diversification across contracts and risk buckets matters so much. It gives a useful benchmark for deciding whether a “clever” variation is actually adding value. What to borrow into your own workflow Think about universe design and risk normalization before polishing signal details. Build simple benchmark trend systems first, then layer refinements only if they survive comparison. Evaluate the strategy as a portfolio object: correlation structure, diversification breadth, and drawdown behavior. Ask whether each added rule improves robustness or merely tells a better story. Related pages following the trend clenow trend following momentum drawdown risk position sizing volatility targeting topic portfolio construction and risk Extraction notes Derived from the embedded PDF TOC plus chapter opening extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-30", "part": "Chapter 3", "pages": "67-80", "book": "Following the Trend"}, "author": ""}, {"id": "ft-clenow-04-two-basic-trend-following-strategies", "title": "Following the Trend chapter 04 — Two Basic Trend-Following Strategies", "type": "chapter", "group": "chapters", "tags": ["following-the-trend", "andreas-clenow", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the embedded PDF TOC: <strong>Two Basic Trend-Following Strategies</strong>.</li>\n<li>Page span from TOC anchors: <code>81-106</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>Strategy Performance</li>\n<li>Correlations Between Strategies</li>\n<li>Conclusions from the Basic Strategies</li>\n<li>Combining the Strategies</li>\n<li>A Core Trend-Following Strategy</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>C H A P T E R 4 59 I nstead of lingering too long on the theoretical aspects of constructing trading strategies, in this chapter I use examples that you can replicate and test yourself, so that you can make up your own mind about what works and what does not. I start by introducing two very basic trend-­following methods, which have been used at least since the 1970s and perhaps even earlier. These particular methods have been chosen for their rend-Following Strategies chapter following-the-trend andreas-clenow chapter-note Following the Trend chapter 04 — Two Basic Trend Following Strategies What this chapter appears to cover Chapter title from the embedded PDF TOC: Two Basic Trend Following Strategies . Page span from TOC anchors: 81 106 . Visible subsection structure Strategy Performance Correlations Between Strategies Conclusions from the Basic Strategies Combining the Strategies A Core Trend Following Strategy Opening signal from the extracted pages C H A P T E R 4 59 I nstead of lingering too long on the theoretical aspects of constructing trading strategies, in this chapter I use examples that you can replicate and test yourself, so that you can make up your own mind about what works and what does not. I start by introducing two very basic trend ­following methods, which have been used at least since the 1970s and perhaps even earlier. These particular methods have been chosen for their simplicity and widespread use, in order to make a point. I intend to demonstrate that these very simple and well ­known strategies, even without any complex modifica tions, can achieve results comparable with many of the professional trend ­ following funds out there. I describe the details of these strategies along with a common position ­sizing formula they both use as well as the diversi fication plan; then we can see how well these strategies perform over time and how they measure up against the competition in the hedge ­fund world. The first strategy we investigate is a real classic and very easy to model and trade. The basis of the strategy is the moving average, that is, the average price for the past X number of days. In this variant of the strategy, two mov ing averages are used with a different number of days used for the look ­back period, so that we have one fast ­moving average and one slow ­moving average. Observant reade Why this matters for systematic research Compares simple trend strategies and the  not have the attention span to get through the year ­by ­year Chapter 6. Practically all systematic trading models, regardless of style or asset class, use price time series in one way or another. After all, it’s hard to imagine what we could do without time series. Trend analysis, for instance, relies completely on such series. Whether you’re trying to follow trends or buy a dip, the knowledge of how the price moved in the recent past is a vital piece of information. You can’t know that the market dipped without knowing Systematic Trading Without Time Series FOLLOWING THE TREND 244 what it did last week and last mo Why this matters for systematic research Term structure expands the toolkit beyond plain time series trend. Important if a system wants futures specific structural signals. Related pages following the trend clenow trend following momentum drawdown risk position sizing volatility targeting Extraction notes Derived from the embedded PDF TOC plus chapter opening extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 8", "pages": "265-274", "book": "Following the Trend"}, "author": ""}, {"id": "ft-clenow-09-tweaks-and-improvements", "title": "Following the Trend chapter 09 — Tweaks and Improvements", "type": "chapter", "group": "chapters", "tags": ["following-the-trend", "andreas-clenow", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the embedded PDF TOC: <strong>Tweaks and Improvements</strong>.</li>\n<li>Page span from TOC anchors: <code>275-286</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>Trading Synthetic Contracts</li>\n<li>Correlation Matrices, Position Sizing, and Risk</li>\n<li>Optimisation and Its Discontents</li>\n<li>Style Diversification</li>\n<li>Volatility-Based Stop Loss</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>C H A P T E R 9 253 I n this chapter I provide some ideas on the type of improvements that may prove beneficial to our core strategy. There are several possible ob- jectives when it comes to tweaking a strategy such as this one, and while not necessarily the most important, increased profitability is only one. If increasing the annual compounded return is the only objective, all you need to do is increase the leverage to just slightly shy of risking a com- plete blow-­up. This is, of course, just stretching the theoretical arguments and not how reality looks. It is important to be able to achieve a high enough annualised return for the strategy to be of interest to investors and worth the time and effort involved in achieving it, but in reality it is much more important, and difficult, to reduce volatility and correlations to similar products. If you can reduce your drawdowns, lower the volatility levels, and achieve a slightly different return profile from the average CTA product, you will find your product much easier to sell. Most of these subjects would require a book of their own to analyse properly and my intention in this chapter is only to point you in the right direction for further research on these topics. After all, in order to really trust and trade strategies with a potential 1,000 to 1 leverage, you need to do some serious research either way. Tweaks and Improvem</li>\n</ul>"], ["Why this matters for systematic research", "<ul>\n<li>Tweaks and improvements should be justified by diversification or risk logic, not optimization vanity.</li>\n<li>A strong anti-overfitting chapter.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=positi tor will perform and which will not in any given year. If you pick a financial market, like rates or equities, your probability of success will be much lower still. The reason for that is not the lack of trends in the equity markets. They have trending periods and non-­trending periods like any other market. It’s just that it’s an extremely homogeneous market. All the markets in your investment universe would move up or down or</li>\n</ul>"], ["Why this matters for systematic research", "<ul>\n<li>Tests whether trend concepts transfer cleanly from futures into equities.</li>\n<li>Useful as a conceptual bridge into Stocks on the Move.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the embedded PDF TOC plus chapter-opening extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Following the Trend chapter 12 — Does Trend Following Work on Stocks? chapter following-the-trend andreas-clenow chapter-note Following the Trend chapter 12 — Does Trend Following Work on Stocks? What this chapter appears to cover Chapter title from the embedded PDF TOC: Does Trend Following Work on Stocks? . Page span from TOC anchors: 305 308 . Visible subsection structure Define Trend Following What about ETFs? Opening signal from the extracted pages C H A P T E R 1 2 283 ■ ■Define Trend Following The primary reason for the high emotions about trend following on stoc "chapters", "tags": ["following-the-trend", "andreas-clenow", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the embedded PDF TOC: <strong>Trading for a Living</strong>.</li>\n<li>Page span from TOC anchors: <code>309-318</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>How Much Does a Good Trader Make?</li>\n<li>Getting a Job in Trading</li>\n<li>Trading Your Own Money</li>\n<li>Trading OPM</li>\n<li>Reasons Not to Trade OPM</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>C H A P T E R 1 3 287 M ost people reading a book like this either dream of trading for a liv- ing, or they are already doing just that. This chapter is meant both for those of you who do not yet trade for a living, and for those of you are, but are doing it wrong. Yes, in my view, there is a wrong way to trade for a living. Somewhat ironically, it is exactly this wrong way that most people outside the industry see as the ultimate goal. To trade your own money for a living. Having goals and big dreams is a good thing, but you should be care- ful in picking those goals. I hope that by the time you’ve finished reading this chapter, you will agree with me that dreaming about trading your own money for a living is the wrong dream. ■ ■How Much Does a Good Trader Make? If you think that you want to trade for a living, the first thing you need to ask yourself is how much you expect to make. I don’t mean your salary, bonus or dollar trading gains but rather in terms of percent. Sometimes when I speak at conferences around the world, I ask the audience for a number. I ask them how many percent per year, on average, a good trader makes. It’s a very interesting exercise, and very telling. People who come from the finan- cial industry or have been trading professionally for some time tend to have very different expectations from hobby traders. Trading for a Living FOLLOWING THE TREND 288 T</li>\n</ul>"], ["Why this matters for systematic research", "<ul>\n<li>Covers the economic reality of trading for a living versus admiring backtests from a distance.</li>\n<li>Helpful for capital and expectation-setting.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the embedded PDF TOC plus chapter-opening extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Following the Trend chapter 13 — Trading for a Living chapter following-the-trend andreas-clenow chapter-note Following the Trend chapter 13 — Trading for a Living What this chapter appears to cover Chapter title from the embedded PDF TOC: Trading for a Living . Page span from TOC anchors: 309 318 . Visible subsection structure How Much Does a Good Trader Make? Getting a Job in Trading Trading Your Own Money Trading OPM Reasons Not to Trade OPM Opening signal from the extracted pages C H A P T E R 1 3 287 M ost people reading a book like this either dream of trading for a liv ing, or they are already doing just that. This chapter is meant both for those of you who do not yet trade for a living, and for those of you are, but are doing it wrong. Yes, in my view, there is a wrong way to trade for a living. Somewhat ironically, it is exactly this wrong way that most people outside the industry see as the ultimate goal. To trade your own money for a living. Having goals and big dreams is a good thing, but you should be care ful in picking those goals. I hope that by the time you’ve finished reading this chapter, you will agree with me that dreaming about trading your own money for a living is the wrong dream. ■ ■How Much Does a Good Trader Make? If you think that you want to trade for a living, the first thing you need to ask yourself is how much you expect to make. I don’t mean your salary, bonus or dollar trading gains but rather in terms of percent. Sometimes when I speak at conferences around the world, I ask the audience for a number. I ask them how many percent per year, on average, a good trader makes. It’s a very interesting exercise, and very telling. People who come from the finan cial industry or have been trading professionally for some time tend to have very different expectations from hobby traders. Trading for a Living FOLLOWING THE TREND 288 T Why this matters for systematic research Covers the economic reality of trading for a living versus admiring backtests from a distance. Helpful for capital and expectation setting. Related pages following the trend clenow trend following momentum drawdown risk position sizing volatility targeting Extraction notes Derived from the embedded PDF TOC plus chapter opening extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 13", "pages": "309-318", "book": "Following the Trend"}, "author": ""}, {"id": "ft-clenow-14-final-words-of-caution", "title": "Following the Trend chapter 14 — Final Words of Caution", "type": "chapter", "group": "chapters", "tags": ["following-the-trend", "andreas-clenow", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the embedded PDF TOC: <strong>Final Words of Caution</strong>.</li>\n<li>Page span from TOC anchors: <code>319-339</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>Diminishing Returns of Futures Funds</li>\n<li>Setting the Initial Risk Level</li>\n<li>Going Live</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>C H A P T E R 1 4 297 T his book deals in highly leveraged derivatives strategies and, as such, it is wise to dedicate the final chapter to the risks and problems that may arise. ■ ■Diminishing Returns of Futures Funds The trend-­following business used to be much easier and it is getting tougher and tougher to achieve the big number returns. In the 1980s and 1990s, most managers in this business had stellar compound returns with hardly any lasting drawdowns, but those days seem to have been replaced with higher volatility and more uncertain results. The core trend-­following strategies are still profitable, given enough time, but the return profiles have changed somewhat in the past decades. It’s hard to find indexes which accurately reflect the trend-­following industry, but one of the most widely followed is the Société Générale Trend Following Index. Figure 14.1 shows this index at the top, and five-­year rolling returns at the bottom. This is to show you the long-­term profile and how it changes over time. What you see there is that the five-­year rolling returns used to be quite high and then kept falling, consistently, year after year. Just a year or two ago, you could have simply extrapolated this falling trend, pun very much intended, and claimed that trend following would become a negative sum game. But then we had that bottoming out of the returns back in 2020 and Fi</li>\n</ul>"], ["Why this matters for systematic research", "<ul>\n<li>Final cautions matter because trend systems fail mostly through sizing, leverage, impatience, or operational sloppiness.</li>\n<li>A useful survival chapter.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentu puts: numbers such as revenue, cash flow, debt to equity ratio, and others. After all, fundamental data are nothing but The W Why this matters for quant strategy building Frames quantitative trading as an operating model, not just a collection of signals. Useful for deciding whether a strategy style fits time, skill, and capital constraints. Related pages quantitative trading chan backtesting execution realism position sizing walk forward analysis drawdown risk Extraction notes Derived from the embedded PDF TOC plus chapter opening extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 1", "pages": "25-34", "book": "Quantitative Trading"}, "author": ""}, {"id": "qt-chan-02-fishing-for-ideas", "title": "Quantitative Trading chapter 02 — Fishing for Ideas", "type": "chapter", "group": "chapters", "tags": ["quantitative-trading", "ernest-chan", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the embedded PDF TOC: <strong>Fishing for Ideas</strong>.</li>\n<li>Page span from TOC anchors: <code>35-56</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>How to Identify a Strategy that Suits You</li>\n<li>A Taste for Plausible Strategies and Their Pitfalls</li>\n<li>Summary</li>\n<li>References</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>11 C H A P T E R 2 T his is the surprise: Finding a trading idea is actually not the hardest part of building a quantitative trading business. There are hundreds, if not thousands, of trading ideas that are in the public sphere at any time, accessible to anyone at little or no cost. Many authors of these trading ideas will tell you their com- plete methodologies in addition to their backtest results. There are finance and investment books, newspapers and magazines, main- stream media websites, academic papers available online or in the nearest public libra han backtesting execution realism position sizing walk forward analysis drawdown risk Extraction notes Derived from the embedded PDF TOC plus chapter opening extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 2", "pages": "35-56", "book": "Quantitative Trading"}, "author": ""}, {"id": "qt-chan-03-backtesting", "title": "Quantitative Trading chapter 03 — Backtesting", "type": "chapter", "group": "chapters", "tags": ["quantitative-trading", "ernest-chan", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the embedded PDF TOC: <strong>Backtesting</strong>.</li>\n<li>Page span from TOC anchors: <code>57-104</code>.</li>\n<li>This is one of the most practically important chapters in the whole library because it sets the standard for how a trading idea should be tested before it deserves capital.</li>\n</ul>"], ["Core argument", "<ul>\n<li>Backtesting is not an after-the-fact chart generator. It is the process that forces the strategy designer to define rules clearly enough that ambiguity disappears.</li>\n<li>A good backtest is supposed to expose hidden assumptions: data leakage, survivorship bias, lookahead, bad execution modeling, and overly convenient parameter choices.</li>\n<li>If a strategy only looks attractive under one narrow set of assumptions, the backtest has already told you something important: the edge is fragile.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>The chapter opens from Chan’s practical research perspective rather than from theory-first academic framing. The emphasis is on turning strategy logic into testable rules and on avoiding false confidence from unrealistic simulations.</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>It is the bridge between “interesting market idea” and “candidate trading system.”</li>\n<li>It creates the evidence needed to decide whether to keep researching, simplify the idea, or kill it.</li>\n<li>It should also reveal the operational burden of the strategy: turnover, latency sensitivity, and data dependencies.</li>\n</ul>"], ["What to borrow into your own workflow", "<ul>\n<li>Define signal, entry, exit, rebalance timing, and sizing before looking at results.</li>\n<li>Stress test assumptions about costs, missing data, and rebalance timing.</li>\n<li>Prefer robustness tables and regime slices over a single headline CAGR.</li>\n<li>Track failure modes explicitly: concentration, tail dependence, unstable turnover, and sensitivity to tiny parameter changes.</li>\n</ul>"], ["Common misuse this chapter warns against", "<ul>\n<li>Using backtests to justify a preferred narrative rather than to challenge it.</li>\n<li>Treating a statistically attractive output as tradable without checking execution realism.</li>\n<li>Confusing parameter optimization with genuine research progress.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=topic-backtesting-and-robustness\" class=\"inline-link\">topic-backtesting-and-robustness</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the embedded PDF TOC plus chapter-opening extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Quantitative Trading chapter 03 — Backtesting chapter quantitative-trading ernest-chan chapter-note Quantitative Trading chapter 03 — Backtesting What this chapter appears to cover Chapter title from the embedded PDF TOC: Backtesting . Page span from TOC anchors: 57 104 . This is one of the most practically important chapters in the whole library because it sets the standard for how a trading idea should be tested before it deserves capital. Core argument Backtesting is not an after the fact chart generator. It is the process that forces the strategy designer to define rules clearly enough that ambiguity disappears. A good backtest is supposed to expose hidden assumptions: data leakage, survivorship bias, lookahead, bad execution modeling, and overly convenient parameter choices. If a strategy only looks attractive under one narrow set of assumptions, the backtest has already told you something important: the edge is fragile. Opening signal from the extracted pages The chapter opens from Chan’s practical research perspective rather than from theory first academic framing. The emphasis is on turning strategy logic into testable rules and on avoiding false confidence from unrealistic simulations. Why this matters for quant strategy building It is the bridge between “interesting market idea” and “candidate trading system.” It creates the evidence needed to decide whether to keep researching, simplify the idea, or kill it. It should also reveal the operational burden of the strategy: turnover, latency sensitivity, and data dependencies. What to borrow into your own workflow Define signal, entry, exit, rebalance timing, and sizing before looking at results. Stress test assumptions about costs, missing data, and rebalance timing. Prefer robustness tables and regime slices over a single headline CAGR. Track failure modes explicitly: concentration, tail dependence, unstable turnover, and sensitivity to tiny parameter changes. Common misuse this chapter warns against Using backtests to justify a preferred narrative rather than to challenge it. Treating a statistically attractive output as tradable without checking execution realism. Confusing parameter optimization with genuine research progress. Related pages quantitative trading chan backtesting execution realism walk forward analysis topic backtesting and robustness Extraction notes Derived from the embedded PDF TOC plus chapter opening extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-30", "part": "Chapter 3", "pages": "57-104", "book": "Quantitative Trading"}, "author": ""}, {"id": "qt-chan-04-setting-up-your-business", "title": "Quantitative Trading chapter 04 — Setting Up Your Business", "type": "chapter", "group": "chapters", "tags": ["quantitative-trading", "ernest-chan", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the embedded PDF TOC: <strong>Setting Up Your Business</strong>.</li>\n<li>Page span from TOC anchors: <code>105-116</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>Business Structure: Retail or Proprietary?</li>\n<li>Choosing a Brokerage or Proprietary Trading Firm</li>\n<li>Physical Infrastructure</li>\n<li>Summary</li>\n<li>References</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>81 C H A P T E R 4 I n this chapter, we will be taking a break from the technical aspect of trading to focus on the business side of it. Assuming that your goal is to remain an independent trader and not work for a money management institution, the choice of the ­business structure for trading is important. The main choice you have to make is whether to open a retail brokerage account or to join a ­proprietary trading firm. The next step is to determine what features of the brokerage or trading firm are important to you. Finally, you have to decide what kind of physical trading infrastructure you need in order to execute your quantitative strategy. BUSINESS STRUCTURE: RETAIL OR PROPRIETARY? As a trader, you can choose to be completely independent or semi- independent. To be completely independent, you can simply open a retail brokerage account, deposit some cash, and start trading. No one will question your strategy, and no one will guide you in your trading. Furthermore, your leverage is limited by Securities and Exchange Commission (SEC) Regulation T—roughly two times Setting Up Your Business 82\b QUANTITATIVE TRADING your equity if you hold overnight positions. Naturally, all the profits and losses will accrue to you. However, you can choose to join what is called a proprietary trading firm such as Bright Trading and become a member of their firm. In order to become a member</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>Business structure, brokerage choice, and infrastructure shape what is feasible in practice.</li>\n<li>Relevant whenever a research project moves toward live deployment.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the embedded PDF TOC plus chapter-opening extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Quantitative Trading chapter 04 — Setting Up Your Business chapter quantitative-trading ernest-chan chapter-note Quantitative Trading chapter 04 — Setting Up Your Business What this chapter appears to cover Chapter title from the embedded PDF TOC: Setting Up Your Business . Page span from TOC anchors: 105 116 . Visible subsection structure Business Structure: Retail or Proprietary? Choosing a Brokerage or Proprietary Trading Firm Physical Infrastructure Summary  in Quantitative Trading</strong>.</li>\n<li>Page span from TOC anchors: <code>157-216</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>Mean-Reverting versus Momentum Strategies</li>\n<li>Regime Change and Conditional Parameter Optimization</li>\n<li>Stationarity and Cointegration</li>\n<li>Factor Models</li>\n<li>What Is Your Exit Strategy?</li>\n<li>Seasonal Trading Strategies</li>\n<li>High-Frequency Trading Strategies</li>\n<li>Is It Better to Have a High-Leverage versus a High-Beta Portfolio?</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>133 C H A P T E R 7 T he first six chapters of this book covered most of the basic knowledge needed to research, develop, and execute your own quantitative strategy. This chapter explains important themes in quantitative trading in more detail. These themes form the bases of statistical arbitrage trading, and most quantitative trad- ers are conversant in some if not most of these topics. They are also very helpful in informing our intuition about trading. I will describe the two basic categories of trading strategies: mean-reverting versus momentum strategies. Periods of mean- reverting and trending behaviors are examples of what some traders call regimes, and the different regimes require different strategies, or at least different parameters of the same strategy. Mean-reverting strategies derive their mathematical justification from the concepts of stationarity and cointegration of time series, which I will cover next. Following that, I will discuss a novel application of machine learning to adapt the parameters of a trading strategy to different regimes that we call Conditional Parameter Optimization (CPO). Then I will describe a theory that many hedge funds use to manage large portfolios and one that has caused much turmoil in their per- formances: namely, factor models. Other categories of strategies that traders frequently discuss are seasonal trading and high-frequency S</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>Special topics broaden the research vocabulary: regime change, factor models, stationarity, exits, seasonality, and HFT.</li>\n<li>Good chapter for connecting simple systems to more advanced refinements without overfitting too early.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the embedded PDF TOC plus chapter-opening extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Quantitative Trading chapter 07 — Special Topics in Quantitative Trading chapter quantitative-trading ernest-chan chapter-note Quantitative Trading chapter 07 — Special Topics in Quantitative Trading What this chapter appears to cover Chapter title from the embedded PDF TOC: Special Topics in Quantitative Trading . Page span from TOC anchors: 157 216 . Visible subsection structure Mean Reverting versus Momentum Strategies Regime Change and Conditional Parameter Optimization Stationarity and Cointegration Factor Models What Is Your Exit Strategy? Seasonal Trading Strategies High Frequency Trading Strategies Is It Better to Have a High Leverage versus a High Beta Portfolio? Opening signal from the extracted pages 133 C H A P T E R 7 T he first six chapters of this book covered most of the basic knowledge needed to research, develop, and execute your own quantitative strategy. This chapter explains important themes in quantitative trading in more detail. These themes form the bases of statistical arbitrage trading, and most quantitative trad ers are conversant in some if not most of these topics. They are also very helpful in informing our intuition about trading. I will describe the two basic categories of trading strategies: mean reverting versus momentum strategies. Periods of mean reverting and trending behaviors are examples of what some traders call regimes, and the different regimes require different strategies, or at least different parameters of the same strategy. Mean reverting strategies derive their mathematical justification from the concepts of stationarity and cointegration of time series, which I will cover next. Following that, I will discuss a novel application of machine learning to adapt the parameters of a trading strategy to different regimes that we call Conditional Parameter Optimization (CPO). Then I will describe a theory that many hedge funds use to manage large portfolios and one that has caused much turmoil in their per formances: namely, factor models. Other categories of strategies that traders frequently discuss are seasonal trading and high frequency S Why this matters for quant strategy building Special topics broaden the research vocabulary: regime change, factor models, stationarity, exits, seasonality, and HFT. Good chapter for connecting simple systems to more advanced refinements without overfitting too early. Related pages quantitative trading chan backtesting execution realism position sizing walk forward analysis drawdown risk Extraction notes Derived from the embedded PDF TOC plus chapter opening extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Chapter 7", "pages": "157-216", "book": "Quantitative Trading"}, "author": ""}, {"id": "qt-chan-08-conclusion-can-independent-traders-succeed", "title": "Quantitative Trading chapter 08 — Conclusion: Can Independent Traders Succeed?", "type": "chapter", "group": "chapters", "tags": ["quantitative-trading", "ernest-chan", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the embedded PDF TOC: <strong>Conclusion: Can Independent Traders Succeed?</strong>.</li>\n<li>Page span from TOC anchors: <code>217-256</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>Next Steps</li>\n<li>References</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>193 C H A P T E R 8 Q uantitative trading gained notoriety in the summer of 2007 when some enormous hedge funds run by some of the most reputable money managers rung up losses measured in billions in just a few days (though some had recovered by the end of the month). It is déjà vu all over again in January 2021. They brought back bad memories of other notorious hedge fund debacles such as that of Long-Term Capital Management and Amaranth Advi- sors (both referenced in Chapter 6), except that this time it was not just one trader or one firm, but losses at multiple funds over a short period of time. And yet, ever since I began my career in the institutional quan- titative trading business, I have spoken to many small, independ- ent traders, working in shabby offices or their spare bedrooms, who gain small but steady and growing profits year-in and year-out, quite unlike the stereotypical reckless day traders of the popular imagi- nation. In fact, many independent traders that I know of have not only survived the periods when big funds lost billions, but actually thrived in those times. This has been the central mystery of trading to me for many years: how does an independent trader with insig- nificant equity and minimal infrastructure trade with a high Sharpe ratio while firms with all-star teams fail spectacularly? Conclusion Can Independent Traders Succeed? 194\b QUANTITATIVE</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>The conclusion is less about closure and more about next-step realism for an independent quant.</li>\n<li>Useful as a reminder that process persistence matters more than one dazzling backtest.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the embedded PDF TOC plus chapter-opening extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Quantitative Trading chapter 08 — Conclusion: Can Independent Traders Succeed? chapter quantitative-trading ernest-chan chapter-note Quantitative Trading chapter 08 — Conclusion: Can Independent Traders Succeed? What this chapter appears to cover Chapter title from the embedded PDF TOC: Conclusion: Can Independent Traders Succeed? . Page span from TOC anchors: 217 256 . Visible subsection structure Next Steps References Opening signal from the extracted pages 193 C H A P T E R 8 Q uantitative trading gained notoriety in the summer of 2007 when some enormous hedge funds run by some of the most reputable money managers rung up losses measured in billions in just a few days (though some had recovered by the end of the month). It is déjà vu all over again in January 2021. They brought back bad memories of other notorious hedge fund debacles such as that of Long Term Capital Management and Amaranth Advi sors (both referenced in Chapter 6), except that this time it was not just one t reyserman, 2014) . There have been ups and downs and at times there have even b Why this matters for systematic stock selection Separates futures style trend following from stock specific momentum realities. Important conceptual bridge between Clenow’s two books. Related pages stocks on the move clenow momentum position sizing backtesting trend following Extraction notes Derived from EPUB navigation plus section opening extraction. This is a structured section note, not a full section digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Section 3", "pages": "EPUB section", "book": "Stocks on the Move"}, "author": ""}, {"id": "stom-clenow-04-the-momentum-effect", "title": "Stocks on the Move section 04 — The Momentum Effect", "type": "chapter", "group": "chapters", "tags": ["stocks-on-the-move", "andreas-clenow", "chapter-note"], "sections": [["What this section appears to cover", "<ul>\n<li>Top-level EPUB section title: <strong>The Momentum Effect</strong>.</li>\n<li>Source HTML file: <code>tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_008.html</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>The Rational Behind Momentum Investing</li>\n<li>The advantage of a Systematic Approach</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Stocks on the Move - Beating the Market with Hedge Fund Momentum Strategies The Momentum Effect When a stock has been going up for a while, the likelihood of it continuing up is greater than for it to turn around. A stock which is moving up faster than other stocks is likely to continue to move up faster than other stocks. This, in essence, is the momentum effect. What makes the momentum effect comfortable to rely on is not only that it has worked very well in the past, but also that it makes logical sense. It’s a phenomenon in the market which is not likely to go away, because it’s part of basic human nature. Everyone likes a winner. Acco : {"created": "2026-05-29", "updated": "2026-05-29", "part": "Section 4", "pages": "EPUB section", "book": "Stocks on the Move"}, "author": ""}, {"id": "stom-clenow-05-market-regime-filter", "title": "Stocks on the Move section 05 — Market Regime Filter", "type": "chapter", "group": "chapters", "tags": ["stocks-on-the-move", "andreas-clenow", "chapter-note"], "sections": [["What this section appears to cover", "<ul>\n<li>Top-level EPUB section title: <strong>Market Regime Filter</strong>.</li>\n<li>Source HTML file: <code>tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_009.html</code>.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Stocks on the Move - Beating the Market with Hedge Fund Momentum Strategies Market Regime Filter In chapter , I showed some simple trend following style trading models and how they failed to perform satisfactory on stocks. There’s a very easy way to significantly improve these models. It’s a very simple and straightforward concept and it puzzles me greatly why so many are still not implementing it. It’s very easy: Don’t buy stocks in a bear market. When it comes to trading strategies for stocks, the one indicator that’s more important than all the others is the index. At times it may appear as if a stock is independent, moving by its own force, but that’s partially an illusion. Almost all stocks are impacted on a daily basis by the overall state of the market. Even a momentum stock backed up by positive news flow and buying pressure is impacted by it. In a bull market, most stocks move up. Momentum stocks are likely to move up more than the others, but most of them move in the same direction. In a sideways market regime, some stocks move up and some move down. The index may look sideways if you look at a chart covering several months, but on the days it moves up, most stocks perform a little better. Momentum stocks tend to do very well in sideways markets, as long as there’s not overly much volatility. In bear markets, it suddenly doesn’t seem to matter which stocks you have an</li>\n</ul>"], ["Why this matters for systematic stock selection", "<ul>\n<li>Shows that stock momentum needs context, not blind always-on exposure.</li>\n<li>Useful for deciding when broad market conditions should gate portfolio exposure.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from EPUB navigation plus section-opening extraction.</li>\n<li>This is a structured section note, not a full section digest.</li>\n</ul>"]], "search_text": "Stocks on the Move section 05 — Market Regime Filter chapter stocks-on-the-move andreas-clenow chapter-note Stocks on the Move section 05 — Market Regime Filter What this section appears to cover Top level EPUB section title: Market Regime Filter . Source HTML file: tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_009.html . Opening signal from the extracted pages Stocks on the Move Beating the Market with Hedge Fund Momentum Strategies Market Regime Filter In chapter , I showed some simple trend following style trading models and how they failed to perform satisfactory on stocks. There’s a very easy way to significantly improve these models. It’s a very simple and straightforward concept and it puzzles me greatly why so many are still not implementing it. It’s very easy: Don’t buy stocks in a bear market. When it comes to trading strategies for stocks, the one indicator that’s more important than all the others is the index. At times it may appear as if a stock is independent, moving by its own force, but that’s partially an illusion. Almost all stocks are impacted on a daily basis by the overall state of the market. Even a momentum stock backed up by positive news flow and buying pressure is impacted by it. In a bull market, most stocks move up. Momentum stocks are likely to move up more than the others, but most of them move in the same direction. In a sideways market regime, some stocks move up and some move down. The index may look sideways if you look at a chart covering several months, but on the days it moves up, most stocks perform a little better. Momentum stocks tend to do very well in sideways markets, as long as there’s not overly much volatility. In bear markets, it suddenly doesn’t seem to matter which stocks you have an Why this matters for systematic stock selection Shows that stock momentum needs context, not blind always on exposure. Useful for deciding when broad market conditions should gate portfolio exposure. Related pages stocks on the move clenow momentum position sizing backtesting trend following Extraction notes Derived from EPUB navigation plus section opening extraction. This is a structured section note, not a full section digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Section 5", "pages": "EPUB section", "book": "Stocks on the Move"}, "author": ""}, {"id": "stom-clenow-06-ranking-stocks", "title": "Stocks on the Move section 06 — Ranking Stocks", "type": "chapter", "group": "chapters", "tags": ["stocks-on-the-move", "andreas-clenow", "chapter-note"], "sections": [["What this section appears to cover", "<ul>\n<li>Top-level EPUB section title: <strong>Ranking Stocks</strong>.</li>\n<li>Source HTML file: <code>tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_010.html</code>.</li>\n<li>This is one of the most implementation-critical sections in the equities momentum portion of the library.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>Using Exponential Regression for Ranking Stocks</li>\n<li>Additional Filters</li>\n</ul>"], ["Core argument", "<ul>\n<li>Stock momentum becomes systematic only when the ranking logic is explicit, stable, and reproducible.</li>\n<li>Ranking is not a cosmetic sort step; it is the mechanism that decides which names represent the style you are actually trying to capture.</li>\n<li>Small changes in ranking methodology can materially change turnover, concentration, and behavioral exposure.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Clenow stresses that browsing hundreds of charts or relying on familiar names is an invitation to inconsistency. The ranking process must remove mood, visual bias, and ad hoc selection from the workflow.</li>\n</ul>"], ["Why this matters for systematic stock selection", "<ul>\n<li>It is where a vague “buy strong stocks” intuition becomes an actual process.</li>\n<li>It determines whether the strategy is really capturing momentum or just collecting recent winners with hidden biases.</li>\n<li>It strongly influences rebalance behavior and implementation friction.</li>\n</ul>"], ["What to borrow into your own workflow", "<ul>\n<li>Define ranking logic numerically and keep it easy to reproduce.</li>\n<li>Check whether the ranking measure is actually capturing persistent leadership rather than noisy short-term spikes.</li>\n<li>Pair ranking with filters that reflect liquidity, tradability, and regime awareness.</li>\n<li>Review the names at the top and bottom of the ranking to understand what the model is really selecting.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=topic-trend-momentum-and-mean-reversion\" class=\"inline-link\">topic-trend-momentum-and-mean-reversion</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from EPUB navigation plus section-opening extraction.</li>\n<li>This is a structured section note, not a full section digest.</li>\n</ul>"]], "search_text": "Stocks on the Move section 06 — Ranking Stocks chapter stocks-on-the-move andreas-clenow chapter-note Stocks on the Move section 06 — Ranking Stocks What this section appears to cover Top level EPUB section title: Ranking Stocks . Source HTML file: tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_010.html . This is one of the most implementation critical sections in the equities momentum portion of the library. Visible subsection structure Using Exponential Regression for Ranking Stocks Additional Filters Core argument Stock momentum becomes systematic only when the ranking logic is explicit, stable, and reproducible. Ranking is not a cosmetic sort step; it is the mechanism that decides which names represent the style you are actually trying to capture. Small changes in ranking methodology can materially change turnover, concentration, and behavioral exposure. Opening signal from the extracted pages Clenow stresses that browsing hundreds of charts or relying on familiar names is an invitation to inconsistency. The ranking process must remove mood, visual bias, and ad hoc selection from the workflow. Why this matters for systematic stock selection It is where a vague “buy strong stocks” intuition becomes an actual process. It determines whether the strategy is really capturing momentum or just collecting recent winners with hidden biases. It strongly influences rebalance behavior and implementation friction. What to borrow into your own workflow Define ranking logic numerically and keep it easy to reproduce. Check whether the ranking measure is actually capturing persistent leadership rather than noisy short term spikes. Pair ranking with filters that reflect liquidity, tradability, and regime awareness. Review the names at the top and bottom of the ranking to understand what the model is really selecting. Related pages stocks on the move clenow momentum position sizing backtesting trend following topic trend momentum and mean reversion Extraction notes Derived from EPUB navigation plus section opening extraction. This is a structured section note, not a full section digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-30", "part": "Section 6", "pages": "EPUB section", "book": "Stocks on the Move"}, "author": ""}, {"id": "stom-clenow-07-position-size", "title": "Stocks on the Move section 07 — Position Size", "type": "chapter", "group": "chapters", "tags": ["stocks-on-the-move", "andreas-clenow", "chapter-note"], "sections": [["What this section appears to cover", "<ul>\n<li>Top-level EPUB section title: <strong>Position Size</strong>.</li>\n<li>Source HTML file: <code>tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_011.html</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>Position Rebalancing</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Stocks on the Move - Beating the Market with Hedge Fund Momentum Strategies Position Size So you’ve decided which stock to buy. That’s a good step in the right direction. But now you’re faced with a very important, but often neglected decision. The size of your position and how it changes over time can make all the difference in the world. When it comes to position size, you need to remember that we’re not allocating money. We’re allocating risk. That’s the key to understanding position sizing. The amount of cash used is not a critical factor. That might be a limiting factor when dealing in cash instruments such a apter and then employ trailing stop logic, we</li>\n</ul>"], ["Why this matters for systematic stock selection", "<ul>\n<li>Exit logic is central to maintaining momentum exposure without turning into buy-and-forget.</li>\n<li>Useful for comparing signal entry quality versus portfolio maintenance discipline.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from EPUB navigation plus section-opening extraction.</li>\n<li>This is a structured section note, not a full section digest.</li>\n</ul>"]], "search_text": "Stocks on the Move section 08 — When to Sell chapter stocks-on-the-move andreas-clenow chapter-note Stocks on the Move section 08 — When to Sell What this section appears to cover Top level EPUB section title: When to Sell . Source HTML file: tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_012.html . Visible subsection structure Portfolio Rebalancing Opening signal from the extracted pages Stocks on the Move Beating the Market with Hedge Fund Momentum Strategies When to Sell I bet you’re wondering about the stop loss logic. What it’s based on, how far away it is, whether the stop loss order is placed in the market or triggered on closing prices. Well, sorry to disappoint you. There are no stop losses here. Some types of trading strategies require the use of stop loss orders, while others don’t. Momentum stock portfolios don’t need this. In fact, using stop loss logic for this type of strategy will most likely show an adverse effect. There are better ways to decide when to kick out a stock. Trend followers normally use a trailing stop. That means that you stay in a position as long as it doesn’t move down a certain distance. This is valid exit method for some types of strategies. Always keep in mind the underlying logic of things. It’s a very common trap to fall into worn old mantras about how to let profits run, cutting losses, letting the trend be your friend until it bends and such. Don’t get stuck in these mantras. The fact of the matter is that sometimes these things may be true and sometimes they are not. What you need is to apply common sense and critical thinking, not old quotes taken out of context. And you can quote me on that. If we were to construct a portfolio based on the ranking concept presented in chapter and then employ trailing stop logic, we Why this matters for systematic stock selection Exit logic is central to maintaining momentum exposure without turning into buy and forget. Useful for comparing signal entry quality versus portfolio maintenance discipline. Related pages stocks on the move clenow momentum position sizing backtesting trend following Extraction notes Derived from EPUB navigation plus section opening extraction. This is a structured section note, not a full section digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Section 8", "pages": "EPUB section", "book": "Stocks on the Move"}, "author": ""}, {"id": "stom-clenow-09-a-complete-momentum-trading-strategy", "title": "Stocks on the Move section 09 — A Complete Momentum Trading Strategy", "type": "chapter", "group": "chapters", "tags": ["stocks-on-the-move", "andreas-clenow", "chapter-note"], "sections": [["What this section appears to cover", "<ul>\n<li>Top-level EPUB section title: <strong>A Complete Momentum Trading Strategy</strong>.</li>\n<li>Source HTML file: <code>tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_013.html</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>The Exact Trading Rules</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Stocks on the Move - Beating the Market with Hedge Fund Momentum Strategies A Complete Momentum Trading Strategy Now that we’ve talked about the necessary building blocks for a real strategy, we’re ready to construct a solid set of rules. Having rigid trading rules offers great advantages. You’ll always have a set course of action. Your decisions will never be based on randomness or your mood of the day. In case of market distress, you’ll have a ready plan that you know has worked in the past. When you have a solid set of rules you will be able to relax more. It’s much easier to have confidence in your trading methodology if you know that your exact rules have been tried and tested and worked very well in the past. You won’t have to look at your stocks every day and you won’t have to make decisions under pressure. Using the building blocks that have been described earlier, let’s create a complete strategy with exact rules for how to trade. Once you have firm rules, you can either see it as a check list which you manually work through at specified intervals, or you can go a step further and automate the entire process. Having these rules, you can of course also construct a proper simulation and back test the concept. This will give you added confidence as well as giving you reasonable expectations of performance. It’s important to understand what kind of return profile you can e</li>\n</ul>"], ["Why this matters for systematic stock selection", "<ul>\n<li>Combines the prior pieces into a cohesive, tradable rule set.</li>\n<li>A high-value synthesis section for future implementation work.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-l ep further and automate the entire process. Having these rules, you can of course also construct a proper simulation and back test the concept. This will give you added confidence as well as giving you reasonable expectations of performance. It’s important to understand what kind of return profile you can e Why this matters for systematic stock selection Combines the prior pieces into a cohesive, tradable rule set. A high value synthesis section for future implementation work. Related pages stocks on the move clenow momentum position sizing backtesting trend following Extraction notes Derived from EPUB navigation plus section opening extraction. This is a structured section note, not a full section digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Section 9", "pages": "EPUB section", "book": "Stocks on the Move"}, "author": ""}, {"id": "stom-clenow-10-trading-the-strategy", "title": "Stocks on the Move section 10 — Trading the Strategy", "type": "chapter", "group": "chapters", "tags": ["stocks-on-the-move", "andreas-clenow", "chapter-note"], "sections": [["What this section appears to cover", "<ul>\n<li>Top-level EPUB section title: <strong>Trading the Strategy</strong>.</li>\n<li>Source HTML file: <code>tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_014.html</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>The Initial Portfolio</li>\n<li>Position Rebalancing</li>\n<li>Portfolio Rebalance</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Stocks on the Move - Beating the Market with Hedge Fund Momentum Strategies Trading the Strategy Perhaps the whole momentum strategy seems a bit theoretical at this point. It might help if we take a look at the practical side and see how you would actually implement it. We’ll also review some charts to see where stocks would have been bought and sold. The Initial Portfolio The day you launch your strategy, you jump right into the deep end of the pool. No gradual buying. Given that the market regime is positive, that is if the index is trading above its 200 day moving average, we just buy stocks until we’re out of cash. Obviously the first task here is to make sure that the S&amp;P 500 is trading above the moving average. This part is easy. Any charting software can do that for you, and you could even do it in Excel if you want by just comparing the average of the last 200 index prices to the current one. If the index is below the moving average, we don’t buy a thing. Just sit tight and wait for it to come back up into positive territory. Now you need to calculate the relevant analytics mentioned in previous chapters and make a neat little ranking table. Doing this manually for one stock is easy enough, but we need it for hundreds of stocks. Some readers may think this is a piece of cake to get done while others have no idea where to start. What you want to come up with is something</li>\n</ul>"], ["Why this matters for systematic stock selection", "<ul>\n<li>Walks through operational execution and rebalance behavior rather than just abstract rules.</li>\n<li>Useful whenever moving from backtest logic to day-to-day workflow.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from EPUB navigation plus section-opening extraction.</li>\n<li>This is a structured section note, not a full section digest.</li>\n</ul>"]], "search_text": "Stocks on the Move section 10 — Trading the Strategy chapter stocks-on-the-move andreas-clenow chapter-note Stocks on the Move section 10 — Trading the Strategy What this section appears to cover Top level EPUB section title: Trading the Strategy . Source HTML file: tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_014.html . Visible subsection structure The Initial Portfolio Position Rebalancing Portfolio Rebalance Opening signal from the extracted pages Stocks on the Move Beating the Market with Hedge Fund Momentum Strategies Trading the Strategy Perhaps the whole momentum strategy seems a bit theoretical at this point. It might help if we take a look at the practical side and see how you would actually implement it. We’ll also review some charts to see where stocks would have been bought and sold. The Initial Portfolio The day you launch your strategy, you jump right into the deep end of the pool. No gradual buying. Given that the market regime is positive, that is if the index is trading above its 200 day moving average, we just buy stocks until we’re out of cash. Obviously the first task here is to make sure that the S&P 500 is trading above the moving average. This part is easy. Any charting software can do that for you, and you could even do it in Excel if you want by just comparing the average of the last 200 index prices to the current one. If the index is below the moving average, we don’t buy a thing. Just sit tight and wait for it to come back up into positive territory. Now you need to calculate the relevant analytics mentioned in previous chapters and make a neat little ranking table. Doing this manually for one stock is easy enough, but we need it for hundreds of stocks. Some readers may think this is a piece of cake to get done while others have no idea where to start. What you want to come up with is something Why this matters for systematic stock selection Walks through operational execution and rebalance behavior rather than just abstract rules. Useful whenever moving from backtest logic to day to day workflow. Related pages stocks on the move clenow momentum position sizing backtesting trend following Extraction notes Derived from EPUB navigation plus section opening extraction. This is a structured section note, not a full section digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Section 10", "pages": "EPUB section", "book": "Stocks on the Move"}, "author": ""}, {"id": "stom-clenow-11-momentum-strategy-performance", "title": "Stocks on the Move section 11 — Momentum Strategy Performance", "type": "chapter", "group": "chapters", "tags": ["stocks-on-the-move", "andreas-clenow", "chapter-note"], "sections": [["What this section appears to cover", "<ul>\n<li>Top-level EPUB section title: <strong>Momentum Strategy Performance</strong>.</li>\n<li>Source HTML file: <code>tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_015.html</code>.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Stocks on the Move - Beating the Market with Hedge Fund Momentum Strategies Momentum Strategy Performance We now have a complete equity momentum strategy. So far we’ve looked at the various components of the strategy but we haven’t seen the actual results yet. Before looking at the historical performance of this approach, stop and consider what is realistic to expect. This is not a strategy where you can expect a steady 10% a year. Very few strategies are. It’s not a strategy where you can expect every year to be positive. And it’s certainly not a strategy that should be expected to be uncorrelated to the equity markets. We are after all buying stocks. Strategies based on buying stocks tend to look very similar in the long run. Some are better, some are worse, but they will be correlated. What we can hope for is to show strong performance in bull markets and to lose less than the index in bear markets. If we do that, we’ll have very attractive returns in the long run. The first question is of course, whether or not we’re outperforming the market. If we’re making money but not beating the index, then there’s really no point in all this effort. A quick glance at Figure 12-26 should set your mind at ease in that regard. As this is a long term chart with large percentage moves, a standard price chart can be a bit misleading however and easily gives an exaggerated performance impres</li>\n</ul>"], ["Why this matters for systematic stock selection", "<ul>\n<li>Performance interpretation matters because stock momentum can look easy until drawdowns arrive.</li>\n<li>Useful for setting expectations about risk and persistence.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from EPUB navigation plus section-opening extraction.</li>\n<li>This is a structured section note, not a full section digest.</li>\n</ul>"]], "search_text": "Stocks on the Move section 11 — Momentum Strategy Performance chapter stocks-on-the-move andreas-clenow chapter-note Stocks on the Move section 11 — Momentum Strategy Performance What this section appears to cover Top level EPUB section title: Momentum Strategy Performance . Source HTML file: tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_015.html . Opening signal from the extracted pages Stocks on the Move Beating the Market with Hedge Fund Momentum Strategies Momentum Strategy Performance We now have a complete equity momentum strategy. So far we’ve looked at the various components of the strategy but we haven’t seen the actual results yet. Before looking at the historical performance of this approach, stop and consider what is realistic to expect. This is not a strategy where you can expect a steady 10% a year. Very few strategies are. It’s not a strategy where you can expect every year to be positive. And it’s certainly not a strategy that should be expected to be uncorrelated to the equity markets. We are after all buying stocks. Strategies based on buying stocks tend to look very similar in the long run. Some are better, some are worse, but they will be correlated. What we can hope for is to show strong performance in bull markets and to lose less than the index in bear markets. If we do that, we’ll have very attractive returns in the long run. The first question is of course, whether or not we’re outperforming the market. If we’re making money but not beating the index, then there’s really no point in all this effort. A quick glance at Figure 12 26 should set your mind at ease in that regard. As this is a long term chart with large percentage moves, a standard price chart can be a bit misleading however and easily gives an exaggerated performance impres Why this matters for systematic stock selection Performance interpretation matters because stock momentum can look easy until drawdowns arrive. Useful for setting expectations about risk and persistence. Related pages stocks on the move clenow momentum position sizing backtesting trend following Extraction notes Derived from EPUB navigation plus section opening extraction. This is a structured section note, not a full section digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Section 11", "pages": "EPUB section", "book": "Stocks on the Move"}, "author": ""}, {"id": "stom-clenow-12-year-by-year-review", "title": "Stocks on the Move section 12 — Year by Year Review", "type": "chapter", "group": "chapters", "tags": ["stocks-on-the-move", "andreas-clenow", "chapter-note"], "sections": [["What this section appears to cover", "<ul>\n<li>Top-level EPUB section title: <strong>Year by Year Review</strong>.</li>\n<li>Source HTML file: <code>tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_016.html</code>.</li>\n</ul>"], ["Visible subsection structure", "<ul>\n<li>1999</li>\n<li>2000</li>\n<li>2001</li>\n<li>2002</li>\n<li>2003</li>\n<li>2004</li>\n<li>2005</li>\n<li>2006</li>\n<li>2007</li>\n<li>2008</li>\n<li>2009</li>\n<li>2010</li>\n<li>2011</li>\n<li>2012</li>\n<li>2013</li>\n<li>2014</li>\n<li>Conclusions of Year by Year Review</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Stocks on the Move - Beating the Market with Hedge Fund Momentum Strategies Year by Year Review When writing my first book, Following the Trend , which is about trend following futures strategies, I struggled with how to best convey what it’s really like to be a professional asset manager. Just showing some simulation statistics and long term performance graphs really doesn’t show the day to day struggle. Quite often, a strategy can look great when you’ve got a multi-decade perspective but it may still be very tough or even impossible to execute in reality. It’s only when the proverbial rubber meets the road that we’ll really find out what works and what doesn’t. My solution in that book was to write a monster chapter where I explained, year by year, how that trading strategy had performed in the past. It wasn’t my intention for that chapter to end up dominating the book, but that’s what happened. In the end, that chapter took up almost a third of the book. This made me wonder if I should really include it. Personally, I found it to be by far the most important part of that book. It’s the chapter that explains the tough parts. What it’s really like to sit in a 25% drawdown, having clients pulling out money, seeing revenues plummeting and wondering if the business is over. These situations will happen. Only if you have full understanding of your trading method and how it behaves</li>\n</ul>"], ["Why this matters for systematic stock selection", "<ul>\n<li>A regime-by-regime review is useful for understanding discomfort and persistence.</li>\n<li>Good antidote to over-trusting summary metrics.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from EPUB navigation plus section-opening extraction.</li>\n<li>This is a structured section note, not a full section digest.</li>\n</ul>"]], "search_text": "Stocks on the Move section 12 — Year by Year Review chapter stocks-on-the-move andreas-clenow chapter-note Stocks on the Move section 12 — Year by Year Review What this section appears to cover Top level EPUB section title: Year by Year Review . Source HTML file: tmp_9778811f651732ecc8290f68481552d6_SJs6xx.ch.fixed.fc.tidied.stylehacked.xfixed_split_016.html . Visible subsection structure 1999 2000 2001 2002 2003 2004 2005 2006 2007 2008 2009 2010 2011 2012 2013 2014 Conclusions of Year by Year Review Opening signal from the extracted pages Stocks on the Move Beating the Market with Hedge Fund Momentum Strategies Year by Year Review When writing my first book, Following the Trend , which is about trend following futures strategies, I struggled with how to best convey what it’s really like to be a professional asset manager. Just showing some simulation statistics and long term performance graphs really doesn’t show the day to day struggle. Quite often, a strategy can look great when you’ve got a multi decade perspective but it may still be very tough or even impossible to execute in
