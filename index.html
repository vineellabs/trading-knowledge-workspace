ip/spiva/ Jegadeesh, N., & Titman, S. (1993). Return to Buying Winner and Selling Losers: Implications for Stock Market Efficiency. Blackwell Publishing. Kaminski, K. M., & Greyserman, A. (2014). Trend Following with Managed Futures. Wiley. Levy, R. A. (1967). Relative Strength as a Criterion for Investment Selection. Journal of Finance. Radge, N. (2012). Unholy Grails: A New Road to Wealth. Radge Publishing. Wilcox, C., & Crittenden, E. (2005). Does Trend Following Work on Stocks. Longboard Asset Management. Winton Capital Management. (2015). The Global Monkey. Why this matters for systematic stock selection This section contributes to the end to end equity momentum workflow rather than isolated indicator trivia. Useful for turning simple momentum intuition into a maintainable portfolio process. Related pages stocks on the move clenow momentum position sizing backtesting trend following Extraction notes Derived from EPUB navigation plus section opening extraction. This is a structured section note, not a full section digest.", "meta": {"created": "2026-05-29", "updated": "2026-05-29", "part": "Section 16", "pages": "EPUB section", "book": "Stocks on the Move"}, "author": ""}, {"id": "carver-st-01-flawed-human-brain", "title": "Systematic Trading chapter 01 — The Flawed Human Brain", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver opens by arguing that human cognition is powerful but unreliable in financial decision-making, especially under stress, ego, fear, and hindsight bias.</p>"], ["Why this chapter matters", "<p>This is the philosophical foundation for the whole book: systems are not just efficiency tools, they are bias-control tools.</p>"], ["Section map from contents", "<ul>\n<li>Humans should be great traders, but...</li>\n<li>Simple trading rules</li>\n<li>Sticking to the plan</li>\n<li>Good system design</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Discretionary judgment can identify context, but it is inconsistent when money and uncertainty are involved.</li>\n<li>Even smart and experienced traders break their own rules in exactly the moments when discipline matters most.</li>\n<li>Human bias does not disappear when building systems; it reappears in rule design, parameter choice, and post-hoc tweaking.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Treat notebooks and research scripts as places where bias can sneak in through cherry-picked date ranges, symbols, or thresholds.</li>\n<li>Prefer explicit rules and recorded assumptions over intuitive “this chart looks good” decisions.</li>\n<li>Keep a clear separation between hypothesis formation and evaluation.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: Start of main chapter sequence</li>\n<li>Next: [Chapter 02](carver-st-02-systematic-trading-rules.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 01 — The Flawed Human Brain chapter systematic-trading carver chapter-note Chapter 01 — The Flawed Human Brain Core idea Carver opens by arguing that human cognition is powerful but unreliable in financial decision making, especially under stress, ego, fear, and hindsight bias. Why this chapter matters This is the philosophical foundation for the whole book: systems are not just efficiency tools, they are bias control tools. Section map from contents Humans should be great traders, but... Simple trading rules Sticking to the plan Good system design Key takeaways Discretionary judgment can identify context, but it is inconsistent when money and uncertainty are involved. Even smart and experienced traders break their own rules in exactly the moments when discipline matters most. Human bias does not disappear when building systems; it reappears in rule design, parameter choice, and post hoc tweaking. Project implications Treat notebooks and research scripts as places where bias can sneak in through cherry picked date ranges, symbols, or thresholds. Prefer explicit rules and recorded assumptions over intuitive “this chart looks good” decisions. Keep a clear separation between hypothesis formation and evaluation. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Start of main chapter sequence Next: Chapter 02 (carver st 02 systematic trading rules.md) Related pages walk forward analysis backtesting drawdown risk Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Theory", "pages": "28-41", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-02-systematic-trading-rules", "title": "Systematic Trading chapter 02 — Systematic Trading Rules", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>A trading rule is a systematic forecast of price movement, and Carver focuses on what makes such rules plausible, robust, and realistically profitable.</p>"], ["Why this chapter matters", "<p>This chapter frames trading rules as modest, probabilistic edges rather than magic formulas.</p>"], ["Section map from contents", "<ul>\n<li>What makes a good trading rule</li>\n<li>When trading rules don’t work</li>\n<li>Why certain rules are profitable</li>\n<li>Classifying trading styles</li>\n<li>Achievable Sharpe ratios</li>\n<li>Conclusion</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Good rules need economic or behavioral plausibility, not just a pretty equity curve.</li>\n<li>A backtest can fail live because of overfitting, crowding, changing costs, or fragile assumptions.</li>\n<li>Trend, momentum, carry, and similar styles should be understood by characteristics and failure modes, not just by indicator names.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Document the rationale for any forecast rule before testing it.</li>\n<li>Benchmark candidate rules against realistic Sharpe expectations instead of fantasy returns.</li>\n<li>Classify local strategies by style so correlation and regime overlap become visible early.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 01](carver-st-01-flawed-human-brain.md)</li>\n<li>Next: [Chapter 03](carver-st-03-fitting.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 02 — Systematic Trading Rules chapter systematic-trading carver chapter-note Chapter 02 — Systematic Trading Rules Core idea A trading rule is a systematic forecast of price movement, and Carver focuses on what makes such rules plausible, robust, and realistically profitable. Why this chapter matters This chapter frames trading rules as modest, probabilistic edges rather than magic formulas. Section map from contents What makes a good trading rule When trading rules don’t work Why certain rules are profitable Classifying trading styles Achievable Sharpe ratios Conclusion Key takeaways Good rules need economic or behavioral plausibility, not just a pretty equity curve. A backtest can fail live because of overfitting, crowding, changing costs, or fragile assumptions. Trend, momentum, carry, and similar styles should be understood by characteristics and failure modes, not just by indicator names. Project implications Document the rationale for any forecast rule before testing it. Benchmark candidate rules against realistic Sharpe expectations instead of fantasy returns. Classify local strategies by style so correlation and regime overlap become visible early. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 01 (carver st 01 flawed human brain.md) Next: Chapter 03 (carver st 03 fitting.md) Related pages trend following momentum execution realism Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Theory", "pages": "42-67", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-03-fitting", "title": "Systematic Trading chapter 03 — Fitting", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver treats rule selection and parameter tuning as dangerous because the same human overconfidence that hurts discretionary trading also corrupts systematic design.</p>"], ["Why this chapter matters", "<p>One of the most valuable chapters for quant strategy building because it directly addresses the path from “interesting idea” to “fragile overfit.”</p>"], ["Section map from contents", "<ul>\n<li>The perils of over-fitting</li>\n<li>Some rules for effective fitting</li>\n<li>How I choose my rules</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Overfitting is not an edge; it is borrowed confidence from the past.</li>\n<li>If you insist on fitting, the process must be constrained, justified, and skeptical.</li>\n<li>Carver’s bias is toward simpler, more generic rules that avoid heavy optimization.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Minimize free parameters in local research notebooks.</li>\n<li>Use broad robustness checks and holdout logic before trusting a tuned rule.</li>\n<li>Be suspicious of strategy improvements that only appear after repeated parameter search.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 02](carver-st-02-systematic-trading-rules.md)</li>\n<li>Next: [Chapter 04](carver-st-04-portfolio-allocation.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 03 — Fitting chapter systematic-trading carver chapter-note Chapter 03 — Fitting Core idea Carver treats rule selection and parameter tuning as dangerous because the same human overconfidence that hurts discretionary trading also corrupts systematic design. Why this chapter matters One of the most valuable chapters for quant strategy building because it directly addresses the path from “interesting idea” to “fragile overfit.” Section map from contents The perils of over fitting Some rules for effective fitting How I choose my rules Key takeaways Overfitting is not an edge; it is borrowed confidence from the past. If you insist on fitting, the process must be constrained, justified, and skeptical. Carver’s bias is toward simpler, more generic rules that avoid heavy optimization. Project implications Minimize free parameters in local research notebooks. Use broad robustness checks and holdout logic before trusting a tuned rule. Be suspicious of strategy improvements that only appear after repeated parameter search. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 02 (carver st 02 systematic trading rules.md) Next: Chapter 04 (carver st 04 portfolio allocation.md) Related pages walk forward analysis backtesting execution realism Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Toolbox", "pages": "68-85", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-04-portfolio-allocation", "title": "Systematic Trading chapter 04 — Portfolio Allocation", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Allocation decisions matter as much as signal generation, but optimization can become another elegant way of overfitting.</p>"], ["Why this chapter matters", "<p>This chapter shifts the unit of thinking from single-rule cleverness to portfolio construction and weight discipline.</p>"], ["Section map from contents", "<ul>\n<li>Optimising gone bad</li>\n<li>Saving optimisation from itself</li>\n<li>Making weights by hand</li>\n<li>Incorporating Sharpe ratios</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Naive optimization can amplify estimation error rather than improve outcomes.</li>\n<li>Hand-built or constrained weights can outperform overconfident “optimal” weights.</li>\n<li>Sharpe assumptions matter, but they should not be treated as precise truths.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Add simple baseline weighting schemes before any optimizer in the local stack.</li>\n<li>Treat optimizer outputs as suggestions that require stress tests, not as final answers.</li>\n<li>Surface concentration and correlation assumptions in every portfolio notebook.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 03](carver-st-03-fitting.md)</li>\n<li>Next: [Chapter 05](carver-st-05-framework-overview.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 04 — Portfolio Allocation chapter systematic-trading carver chapter-note Chapter 04 — Portfolio Allocation Core idea Allocation decisions matter as much as signal generation, but optimization can become another elegant way of overfitting. Why this chapter matters This chapter shifts the unit of thinking from single rule cleverness to portfolio construction and weight discipline. Section map from contents Optimising gone bad Saving optimisation from itself Making weights by hand Incorporating Sharpe ratios Key takeaways Naive optimization can amplify estimation error rather than improve outcomes. Hand built or constrained weights can outperform overconfident “optimal” weights. Sharpe assumptions matter, but they should not be treated as precise truths. Project implications Add simple baseline weighting schemes before any optimizer in the local stack. Treat optimizer outputs as suggestions that require stress tests, not as final answers. Surface concentration and correlation assumptions in every portfolio notebook. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 03 (carver st 03 fitting.md) Next: Chapter 05 (carver st 05 framework overview.md) Related pages position sizing volatility targeting drawdown risk Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Toolbox", "pages": "86-109", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-05-framework-overview", "title": "Systematic Trading chapter 05 — Framework Overview", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver introduces a modular system architecture so strategy components can be reasoned about separately rather than mixed into a single opaque recipe.</p>"], ["Why this chapter matters", "<p>This chapter is the bridge from ideas into actual implementation architecture.</p>"], ["Section map from contents", "<ul>\n<li>A bad example</li>\n<li>Why a modular framework?</li>\n<li>The elements of the framework</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>A trading system should be decomposed into explicit components.</li>\n<li>Modularity makes testing, replacement, and diagnosis easier.</li>\n<li>Bad systems often mix signals, sizing, instruments, and costs into one confusing whole.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Mirror Carver’s module boundaries in your code and notebooks.</li>\n<li>Separate forecasts, volatility estimation, position sizing, and portfolio weighting in outputs and plots.</li>\n<li>Prefer composable research functions over monolithic strategy scripts.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 04](carver-st-04-portfolio-allocation.md)</li>\n<li>Next: [Chapter 06](carver-st-06-instruments.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 05 — Framework Overview chapter systematic-trading carver chapter-note Chapter 05 — Framework Overview Core idea Carver introduces a modular system architecture so strategy components can be reasoned about separately rather than mixed into a single opaque recipe. Why this chapter matters This chapter is the bridge from ideas into actual implementation architecture. Section map from contents A bad example Why a modular framework? The elements of the framework Key takeaways A trading system should be decomposed into explicit components. Modularity makes testing, replacement, and diagnosis easier. Bad systems often mix signals, sizing, instruments, and costs into one confusing whole. Project implications Mirror Carver’s module boundaries in your code and notebooks. Separate forecasts, volatility estimation, position sizing, and portfolio weighting in outputs and plots. Prefer composable research functions over monolithic strategy scripts. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 04 (carver st 04 portfolio allocation.md) Next: Chapter 06 (carver st 06 instruments.md) Related pages backtesting position sizing volatility targeting Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "110-117", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-06-instruments", "title": "Systematic Trading chapter 06 — Instruments", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Before discussing signals, Carver forces the reader to decide what should actually be traded and which instruments are structurally suitable.</p>"], ["Why this chapter matters", "<p>Instrument choice quietly determines liquidity, leverage, cost structure, and implementation feasibility.</p>"], ["Section map from contents", "<ul>\n<li>Necessities</li>\n<li>Instrument choice and trading style</li>\n<li>Access</li>\n<li>Summary of instrument choice</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Some instruments are simply poor choices for systematic trading.</li>\n<li>Trading style should influence which markets and wrappers you use.</li>\n<li>Access method matters: the same exposure via futures, ETFs, CFDs, or cash products can behave very differently operationally.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Encode instrument metadata and trading constraints alongside price data.</li>\n<li>Avoid testing strategies on instruments you cannot realistically access or execute.</li>\n<li>Model lot size, leverage, and route-specific frictions early.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 05](carver-st-05-framework-overview.md)</li>\n<li>Next: [Chapter 07](carver-st-07-forecasts.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 06 — Instruments chapter systematic-trading carver chapter-note Chapter 06 — Instruments Core idea Before discussing signals, Carver forces the reader to decide what should actually be traded and which instruments are structurally suitable. Why this chapter matters Instrument choice quietly determines liquidity, leverage, cost structure, and implementation feasibility. Section map from contents Necessities Instrument choice and trading style Access Summary of instrument choice Key takeaways Some instruments are simply poor choices for systematic trading. Trading style should influence which markets and wrappers you use. Access method matters: the same exposure via futures, ETFs, CFDs, or cash products can behave very differently operationally. Project implications Encode instrument metadata and trading constraints alongside price data. Avoid testing strategies on instruments you cannot realistically access or execute. Model lot size, leverage, and route specific frictions early. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 05 (carver st 05 framework overview.md) Next: Chapter 07 (carver st 07 forecasts.md) Related pages execution realism position sizing drawdown risk Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "118-125", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-07-forecasts", "title": "Systematic Trading chapter 07 — Forecasts", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Forecasts are the layer that says how much you like a trade, whether that comes from discretion, a no-rule allocation assumption, or systematic rules.</p>"], ["Why this chapter matters", "<p>This chapter formalizes signal generation as a distinct object that feeds the rest of the framework.</p>"], ["Section map from contents", "<ul>\n<li>What makes a good forecast</li>\n<li>Discretionary trading with stop losses</li>\n<li>The asset allocating investor’s no-rule rule</li>\n<li>Two example systematic rules</li>\n<li>Adapting and creating trading rules</li>\n<li>Selecting trading rules and variations</li>\n<li>Summary of trading rules and forecasts</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Forecast quality matters more than indicator ornamentation.</li>\n<li>Different user archetypes can share the same downstream risk framework even with different forecast sources.</li>\n<li>Rule variation and adaptation should stay disciplined rather than becoming endless customization.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Represent forecasts in your research stack as normalized outputs, not just raw signals.</li>\n<li>Support discretionary and systematic forecast inputs through the same downstream sizing pipeline.</li>\n<li>Keep a registry of rule families and variations with rationale notes.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 06](carver-st-06-instruments.md)</li>\n<li>Next: [Chapter 08](carver-st-08-combined-forecasts.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 07 — Forecasts chapter systematic-trading carver chapter-note Chapter 07 — Forecasts Core idea Forecasts are the layer that says how much you like a trade, whether that comes from discretion, a no rule allocation assumption, or systematic rules. Why this chapter matters This chapter formalizes signal generation as a distinct object that feeds the rest of the framework. Section map from contents What makes a good forecast Discretionary trading with stop losses The asset allocating investor’s no rule rule Two example systematic rules Adapting and creating trading rules Selecting trading rules and variations Summary of trading rules and forecasts Key takeaways Forecast quality matters more than indicator ornamentation. Different user archetypes can share the same downstream risk framework even with different forecast sources. Rule variation and adaptation should stay disciplined rather than becoming endless customization. Project implications Represent forecasts in your research stack as normalized outputs, not just raw signals. Support discretionary and systematic forecast inputs through the same downstream sizing pipeline. Keep a registry of rule families and variations with rationale notes. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 06 (carver st 06 instruments.md) Next: Chapter 08 (carver st 08 combined forecasts.md) Related pages momentum trend following mean reversion Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "126-141", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-08-combined-forecasts", "title": "Systematic Trading chapter 08 — Combined Forecasts", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Once multiple rules exist, the problem shifts from “is this signal good?” to “how should competing signals be blended?”</p>"], ["Why this chapter matters", "<p>Many quant workflows fail here by summing signals naively or letting one noisy rule dominate.</p>"], ["Section map from contents", "<ul>\n<li>Combining with forecast weights</li>\n<li>Choosing the forecast weights</li>\n<li>Getting to 10</li>\n<li>Capped at 20</li>\n<li>Summary for combining forecasts</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Signal combination needs explicit weighting logic.</li>\n<li>Scale normalization matters so no single rule overwhelms the combined forecast accidentally.</li>\n<li>Capping combined strength is part of keeping the system behaved under disagreement and extremes.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Normalize forecast outputs before combining them.</li>\n<li>Log component forecasts, weights, and capped final forecast values for every backtest run.</li>\n<li>Treat signal blending as its own tested layer, not a one-line sum hidden in notebook code.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 07](carver-st-07-forecasts.md)</li>\n<li>Next: [Chapter 09](carver-st-09-volatility-targeting.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 08 — Combined Forecasts chapter systematic-trading carver chapter-note Chapter 08 — Combined Forecasts Core idea Once multiple rules exist, the problem shifts from “is this signal good?” to “how should competing signals be blended?” Why this chapter matters Many quant workflows fail here by summing signals naively or letting one noisy rule dominate. Section map from contents Combining with forecast weights Choosing the forecast weights Getting to 10 Capped at 20 Summary for combining forecasts Key takeaways Signal combination needs explicit weighting logic. Scale normalization matters so no single rule overwhelms the combined forecast accidentally. Capping combined strength is part of keeping the system behaved under disagreement and extremes. Project implications Normalize forecast outputs before combining them. Log component forecasts, weights, and capped final forecast values for every backtest run. Treat signal blending as its own tested layer, not a one line sum hidden in notebook code. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 07 (carver st 07 forecasts.md) Next: Chapter 09 (carver st 09 volatility targeting.md) Related pages volatility targeting position sizing backtesting Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "142-151", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-09-volatility-targeting", "title": "Systematic Trading chapter 09 — Volatility targeting", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "robert-carver", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the PDF TOC: <strong>Volatility targeting</strong>.</li>\n<li>Page span from TOC mapping: <code>169-194</code>.</li>\n<li>This is one of Carver’s most reusable ideas because it turns raw positions into comparable risk units.</li>\n</ul>"], ["Core argument", "<ul>\n<li>Position decisions should be expressed through risk, not through arbitrary contract counts or cash sizes.</li>\n<li>Volatility targeting helps normalize opportunity sets so that instruments with different raw price behavior can still be compared and combined coherently.</li>\n<li>It is also a way of making leverage decisions explicit instead of letting them hide inside instrument choice.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>The chapter opens in Carver’s typical practical style: risk should be budgeted deliberately, and strategy behavior becomes much easier to reason about once positions are scaled to a target level of volatility.</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>It makes cross-asset and cross-strategy comparison more meaningful.</li>\n<li>It reduces the chance that one noisy instrument dominates portfolio behavior by accident.</li>\n<li>It creates a cleaner interface between alpha generation and portfolio construction.</li>\n</ul>"], ["What to borrow into your own workflow", "<ul>\n<li>Express signal outputs in target-risk units rather than nominal lots wherever possible.</li>\n<li>Keep the volatility estimate methodology stable enough that position size changes are interpretable.</li>\n<li>Measure the effect of volatility targeting on turnover, lag, and drawdown shape instead of assuming it is always beneficial.</li>\n<li>Use the same risk language across notebooks, simulations, and portfolio summaries.</li>\n</ul>"], ["Common misuse this chapter warns against", "<ul>\n<li>Assuming volatility targeting solves correlation, concentration, or regime-shift problems by itself.</li>\n<li>Re-estimating volatility so aggressively that sizing becomes noisy and pro-cyclical.</li>\n<li>Treating “equalized risk” as the same thing as “optimal portfolio.”</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=topic-portfolio-construction-and-risk\" class=\"inline-link\">topic-portfolio-construction-and-risk</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the PDF TOC plus chapter-opening extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Systematic Trading chapter 09 — Volatility targeting chapter systematic-trading robert-carver chapter-note Systematic Trading chapter 09 — Volatility targeting What this chapter appears to cover Chapter title from the PDF TOC: Volatility targeting . Page span from TOC mapping: 169 194 . This is one of Carver’s most reusable ideas because it turns raw positions into comparable risk units. Core argument Position decisions should be expressed through risk, not through arbitrary contract counts or cash sizes. Volatility targeting helps normalize opportunity sets so that instruments with different raw price behavior can still be compared and combined coherently. It is also a way of making leverage decisions explicit instead of letting them hide inside instrument choice. Opening signal from the extracted pages The chapter opens in Carver’s typical practical style: risk should be budgeted deliberately, and strategy behavior becomes much easier to reason about once positions are scaled to a target level of volatility. Why this matters for quant strategy building It makes cross asset and cross strategy comparison more meaningful. It reduces the chance that one noisy instrument dominates portfolio behavior by accident. It creates a cleaner interface between alpha generation and portfolio construction. What to borrow into your own workflow Express signal outputs in target risk units rather than nominal lots wherever possible. Keep the volatility estimate methodology stable enough that position size changes are interpretable. Measure the effect of volatility targeting on turnover, lag, and drawdown shape instead of assuming it is always beneficial. Use the same risk language across notebooks, simulations, and portfolio summaries. Common misuse this chapter warns against Assuming volatility targeting solves correlation, concentration, or regime shift problems by itself. Re estimating volatility so aggressively that sizing becomes noisy and pro cyclical. Treating “equalized risk” as the same thing as “optimal portfolio.” Related pages systematic trading carver volatility targeting position sizing drawdown risk topic portfolio construction and risk Extraction notes Derived from the PDF TOC plus chapter opening extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-30", "part": "Chapter 9", "pages": "169-194", "book": "Systematic Trading"}, "author": ""}, {"id": "carver-st-10-position-sizing", "title": "Systematic Trading chapter 10 — Position sizing", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "robert-carver", "chapter-note"], "sections": [["What this chapter appears to cover", "<ul>\n<li>Chapter title from the PDF TOC: <strong>Position sizing</strong>.</li>\n<li>Page span from TOC mapping: <code>195-214</code>.</li>\n<li>This chapter matters because many research stacks spend too much time on signals and too little on how those signals become actual exposure.</li>\n</ul>"], ["Core argument", "<ul>\n<li>A signal is incomplete until it specifies how much capital or risk to allocate.</li>\n<li>Position sizing is where conviction, forecast strength, diversification, and risk tolerance become operational.</li>\n<li>Sizing rules should be understandable enough that a bad month does not tempt discretionary override.</li>\n</ul>"], ["Opening signal from the extracted pages", "<ul>\n<li>Carver’s framing pushes the reader toward a repeatable translation from forecast into exposure, with enough structure that portfolio behavior can be debugged after the fact.</li>\n</ul>"], ["Why this matters for quant strategy building", "<ul>\n<li>Sizing often explains more of the realized drawdown profile than a marginally better entry rule.</li>\n<li>It creates consistency across instruments and across time.</li>\n<li>It is essential for comparing research variants honestly.</li>\n</ul>"], ["What to borrow into your own workflow", "<ul>\n<li>Keep signal generation and sizing as separable layers in code.</li>\n<li>Track how often sizing rules amplify or suppress forecast changes.</li>\n<li>Make drawdown tolerance and leverage budget visible in the sizing design.</li>\n<li>Use post-trade review to see whether sizing logic is adding stability or just complexity.</li>\n</ul>"], ["Common misuse this chapter warns against", "<ul>\n<li>Allowing exposure to drift because the signal code and sizing code are tangled together.</li>\n<li>Choosing position sizes from intuition after the signal is already known.</li>\n<li>Letting one instrument’s volatility regime silently dictate total portfolio risk.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=topic-portfolio-construction-and-risk\" class=\"inline-link\">topic-portfolio-construction-and-risk</a></li>\n</ul>"], ["Extraction notes", "<ul>\n<li>Derived from the PDF TOC plus chapter-opening extraction.</li>\n<li>This is a structured chapter note, not a full chapter digest.</li>\n</ul>"]], "search_text": "Systematic Trading chapter 10 — Position sizing chapter systematic-trading robert-carver chapter-note Systematic Trading chapter 10 — Position sizing What this chapter appears to cover Chapter title from the PDF TOC: Position sizing . Page span from TOC mapping: 195 214 . This chapter matters because many research stacks spend too much time on signals and too little on how those signals become actual exposure. Core argument A signal is incomplete until it specifies how much capital or risk to allocate. Position sizing is where conviction, forecast strength, diversification, and risk tolerance become operational. Sizing rules should be understandable enough that a bad month does not tempt discretionary override. Opening signal from the extracted pages Carver’s framing pushes the reader toward a repeatable translation from forecast into exposure, with enough structure that portfolio behavior can be debugged after the fact. Why this matters for quant strategy building Sizing often explains more of the realized drawdown profile than a marginally better entry rule. It creates consistency across instruments and across time. It is essential for comparing research variants honestly. What to borrow into your own workflow Keep signal generation and sizing as separable layers in code. Track how often sizing rules amplify or suppress forecast changes. Make drawdown tolerance and leverage budget visible in the sizing design. Use post trade review to see whether sizing logic is adding stability or just complexity. Common misuse this chapter warns against Allowing exposure to drift because the signal code and sizing code are tangled together. Choosing position sizes from intuition after the signal is already known. Letting one instrument’s volatility regime silently dictate total portfolio risk. Related pages systematic trading carver position sizing volatility targeting drawdown risk topic portfolio construction and risk Extraction notes Derived from the PDF TOC plus chapter opening extraction. This is a structured chapter note, not a full chapter digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-30", "part": "Chapter 10", "pages": "195-214", "book": "Systematic Trading"}, "author": ""}, {"id": "carver-st-11-portfolios", "title": "Systematic Trading chapter 11 — Portfolios", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>After sizing individual positions, Carver zooms out again to show how whole portfolios should be assembled and diversified.</p>"], ["Why this chapter matters", "<p>This chapter stops the reader from treating a collection of trades as a portfolio just because there are several of them.</p>"], ["Section map from contents", "<ul>\n<li>Portfolios and instrument weights</li>\n<li>Instrument weights – asset allocators and systems traders</li>\n<li>Instrument weights – semi-automatic trading</li>\n<li>Instrument diversification multiplier</li>\n<li>A portfolio of positions and trades</li>\n<li>Summary for creating a portfolio of trading subsystems</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Too few assets means hidden concentration risk.</li>\n<li>Instrument weights should reflect more than personal familiarity or convenience.</li>\n<li>Diversification deserves an explicit multiplier or adjustment rather than being hand-waved.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Report effective concentration, not just count of symbols.</li>\n<li>Add cross-strategy and cross-instrument diversification diagnostics to the research stack.</li>\n<li>Think in terms of portfolio-of-subsystems, especially if multiple signal families are used.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 10](carver-st-10-position-sizing.md)</li>\n<li>Next: [Chapter 12](carver-st-12-speed-and-size.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 11 — Portfolios chapter systematic-trading carver chapter-note Chapter 11 — Portfolios Core idea After sizing individual positions, Carver zooms out again to show how whole portfolios should be assembled and diversified. Why this chapter matters This chapter stops the reader from treating a collection of trades as a portfolio just because there are several of them. Section map from contents Portfolios and instrument weights Instrument weights – asset allocators and systems traders Instrument weights – semi automatic trading Instrument diversification multiplier A portfolio of positions and trades Summary for creating a portfolio of trading subsystems Key takeaways Too few assets means hidden concentration risk. Instrument weights should reflect more than personal familiarity or convenience. Diversification deserves an explicit multiplier or adjustment rather than being hand waved. Project implications Report effective concentration, not just count of symbols. Add cross strategy and cross instrument diversification diagnostics to the research stack. Think in terms of portfolio of subsystems, especially if multiple signal families are used. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 10 (carver st 10 position sizing.md) Next: Chapter 12 (carver st 12 speed and size.md) Related pages drawdown risk position sizing volatility targeting Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "182-193", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-12-speed-and-size", "title": "Systematic Trading chapter 12 — Speed and Size", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver ties system design to practical realities: how fast you trade, how much it costs, and how account size changes feasible behavior.</p>"], ["Why this chapter matters", "<p>Probably the clearest bridge from research fantasy to execution reality.</p>"], ["Section map from contents", "<ul>\n<li>Speed of trading</li>\n<li>Calculating the cost of trading</li>\n<li>Using trading costs to make design decisions</li>\n<li>Trading with more or less capital</li>\n<li>Determining overall portfolio size</li>\n<li>Summary of tailoring systems for costs and capital</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Trading cost is a design input, not a cleanup item.</li>\n<li>Strategy frequency and account size interact with liquidity and slippage constraints.</li>\n<li>Portfolio size should be chosen in light of market t models must be first class citizens in backtests. Expect intraday or faster ideas to face a much higher realism burden than slower systems. Flag strategy variants whose edge disappears after plausible cost assumptions. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 11 (carver st 11 portfolios.md) Next: Chapter 13 (carver st 13 semi automatic trader.md) Related pages execution realism backtesting drawdown risk Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Framework", "pages": "194-225", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-13-semi-automatic-trader", "title": "Systematic Trading chapter 13 — Semi-automatic Trader", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver shows how a trader can keep discretionary market views while outsourcing risk control, stops, and sizing to a system.</p>"], ["Why this chapter matters", "<p>Useful if you want judgment in entries but discipline in exposure.</p>"], ["Section map from contents", "<ul>\n<li>Who are you?</li>\n<li>Using the framework</li>\n<li>Process</li>\n<li>Trading diary</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Discretion and systematization are not all-or-nothing opposites.</li>\n<li>A repeatable daily process matters as much as the signal source.</li>\n<li>The framework can be used to constrain human impulse rather than replace human interpretation entirely.</li>\n</ul>"], ["Project implications", "<ul>\n<li>If you ever do discretionary overlays, keep them downstream-compatible with the same risk framework.</li>\n<li>Use diaries or logs for discretionary calls so performance can be audited by regime and behavior.</li>\n<li>Do r 12 (carver st 12 speed and size.md) Next: Chapter 14 (carver st 14 asset allocating investor.md) Related pages position sizing drawdown risk execution realism Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Practice", "pages": "226-241", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-14-asset-allocating-investor", "title": "Systematic Trading chapter 14 — Asset Allocating Investor", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>This archetype assumes returns are hard to forecast and uses the framework mainly to allocate capital systematically across assets.</p>"], ["Why this chapter matters", "<p>Important because it shows the framework is broader than alpha-hunting signal systems.</p>"], ["Section map from contents", "<ul>\n<li>Who are you?</li>\n<li>Using the framework</li>\n<li>Weekly process</li>\n<li>Trading diary</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>A “no-rule” forecast can still live inside a disciplined allocation framework.</li>\n<li>Systematic process can add value even when predictive confidence is low.</li>\n<li>Cheap broad access vehicles such as ETFs make this style operationally accessible.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Useful template if you want a portfolio sleeve that is diversified and disciplined but not signal-heavy.</li>\n<li>Separate allocation logic from market-timing logic in research design.</li>\n<li>Track whether simple diversified baselines outperform more complex active ideas after costs.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 13](carver-st-13-semi-automatic-trader.md)</l chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Practice", "pages": "242-261", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-15-staunch-systems-trader", "title": "Systematic Trading chapter 15 — Staunch Systems Trader", "type": "chapter", "group": "chapters", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver’s final archetype is the committed rules-based trader who uses systematic forecasts plus the full risk-and-portfolio framework.</p>"], ["Why this chapter matters", "<p>This is the closest match to a serious quant strategy-building workflow.</p>"], ["Section map from contents", "<ul>\n<li>Who are you?</li>\n<li>Using the framework</li>\n<li>Daily process</li>\n<li>Trading diary</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>The framework becomes most demanding and most coherent when fully systematic.</li>\n<li>Daily operation includes more than signals: data, execution, monitoring, and process discipline all matter.</li>\n<li>A practical system can be part-time and still structured, provided the design matches available data and operational capacity.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Closest template for the trading-vy research direction.</li>\n<li>Design future local systems so they can be operated repeatedly with explicit daily steps, not just rerun as notebooks.</li>\n<li>Treat data availability and instrument mechanics as part of system design from day one.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 14](carver-st-14-asset-allocating-investor.md)</li>\n<li>Next: End of main chapter sequence</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 15 — Staunch Systems Trader chapter systematic-trading carver chapter-note Chapter 15 — Staunch Systems Trader Core idea Carver’s final archetype is the committed rules based trader who uses systematic forecasts plus the full risk and portfolio framework. Why this chapter matters This is the closest match to a serious quant strategy building workflow. Section map from contents Who are you? Using the framework Daily process Trading diary Key takeaways The framework becomes most demanding and most coherent when fully systematic. Daily operation includes more than signals: data, execution, monitoring, and process discipline all matter. A practical system can be part time and still structured, provided the design matches available data and operational capacity. Project implications Closest template for the trading vy research direction. Design future local systems so they can be operated repeatedly with explicit daily steps, not just rerun as notebooks. Treat data availability and instrument mechanics as part of system design from day one. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 14 (carver st 14 asset allocating investor.md) Next: End of main chapter sequence Related pages backtesting execution realism volatility targeting Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Practice", "pages": "262-275", "book": "systematic-trading-carver"}, "author": ""}, {"id": "backtesting", "title": "Backtesting", "type": "concept", "group": "concepts", "tags": ["backtesting", "validation", "research-process"], "sections": [["Summary", "<p>Backtesting is not merely a way to advertise historical returns. Across these books it serves three jobs:</p>\n<p class=\"numbered\">1. verify that you truly understand the strategy</p>\n<p class=\"numbered\">2. debug implementation details before capital is at risk</p>\n<p class=\"numbered\">3. estimate whether the edge is robust enough to survive costs and out-of-sample stress</p>"], ["Shared lessons across books", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a> stresses replication and common pitfalls.</li>\n<li><a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a> reminds us that signal behavior is frequency-dependent and context-sensitive.</li>\n<li><a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a> adds the discipline of fitting restraint and portfolio-aware evaluation.</li>\n</ul>"], ["What future local backtests should include", "<ul>\n<li>explicit data assumptions</li>\n<li>transaction costs and slippage estimates</li>\n<li>out-of-sample or walk-forward sections</li>\n<li>risk-normalized metrics</li>\n<li>a note on what could break live</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n</ul>"]], "search_text": "Backtesting concept backtesting validation research-process Backtesting Backtesting is not merely a way to advertise historical returns. Across these books it serves three jobs: 1. verify that you truly understand the strategy 2. debug implementation details before capital is at risk 3. estimate whether the edge is robust enough to survive costs and out of sample stress Shared lessons across books quantitative trading chan stresses replication and common pitfalls. algorithmic trading chan reminds us that signal behavior is frequency dependent and context sensitive. systematic trading carver adds the discipline of fitting restraint and portfolio aware evaluation. What future local backtests should include explicit data assumptions transaction costs and slippage estimates out of sample or walk forward sections risk normalized metrics a note on what could break live Related pages walk forward analysis execution realism position sizing", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "drawdown-risk", "title": "Drawdown Risk", "type": "concept", "group": "concepts", "tags": ["drawdown", "survival", "skew", "risk"], "sections": [["Summary", "<p>These books repeatedly imply the same truth: strategies fail in practice less often because they lack a chart pattern and more often because the trader cannot survive the inevitable losing period.</p>"], ["Core ideas", "<ul>\n<li>Trend systems can look wrong for long stretches before paying off.</li>\n<li>Sizing and leverage determine whether a temporary bad period is survivable.</li>\n<li>Risk management is partly psychological: systems should be designed so the operator can keep following them.</li>\n</ul>"], ["Local implication", "<p>Any strategy note should contain at least a short statement on likely drawdown behavior, not just CAGR or Sharpe.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n</ul>"]], "search_text": "Drawdown Risk concept drawdown survival skew risk Drawdown Risk These books repeatedly imply the same truth: strategies fail in practice less often because they lack a chart pattern and more often because the trader cannot survive the inevitable losing period. Core ideas Trend systems can look wrong for long stretches before paying off. Sizing and leverage determine whether a temporary bad period is survivable. Risk management is partly psychological: systems should be designed so the operator can keep following them. Local implication Any strategy note should contain at least a short statement on likely drawdown behavior, not just CAGR or Sharpe. Related pages position sizing volatility targeting trend following", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "execution-realism", "title": "Execution Realism", "type": "concept", "group": "concepts", "tags": ["execution", "slippage", "costs", "implementation"], "sections": [["Summary", "<p>Execution realism means acknowledging that the path from signal to filled order is where many apparently good ideas fail.</p>"], ["What these books emphasize", "<ul>\n<li>Backtests and live systems diverge because of bugs, cost assumptions, market impact, and regime changes.</li>\n<li>Intraday and short-horizon strategies are especially sensitive to assumptions about fills and liquidity.</li>\n<li>A strategy report that ignores costs is incomplete.</li>\n</ul>"], ["What this means for the project", "<p>Every serious result should eventually answer:</p>\n<ul>\n<li>What spread/slippage assumption was used?</li>\n<li>Is the instrument liquid enough for the strategy style?</li>\n<li>How sensitive is edge to worse fills?</li>\n<li>Is the execution model appropriate for bar frequency?</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n<li><a href=\"#page=testing-and-execution-checklist\" class=\"inline-link\">testing-and-execution-checklist</a></li>\n</ul>"]], "search_text": "Execution Realism concept execution slippage costs implementation Execution Realism Execution realism means acknowledging that the path from signal to filled order is where many apparently good ideas fail. What these books emphasize Backtests and live systems diverge because of bugs, cost assumptions, market impact, and regime changes. Intraday and short horizon strategies are especially sensitive to assumptions about fills and liquidity. A strategy report that ignores costs is incomplete. What this means for the project Every serious result should eventually answer: What spread/slippage assumption was used? Is the instrument liquid enough for the strategy style? How sensitive is edge to worse fills? Is the execution model appropriate for bar frequency? Related pages backtesting mean reversion testing and execution checklist", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "mean-reversion", "title": "Mean Reversion", "type": "concept", "group": "concepts", "tags": ["mean-reversion", "intraday", "seasonality"], "sections": [["Summary", "<p>The strongest lesson surfaced from the Chan material is that mean reversion is context-dependent. A series can look non-reverting on daily bars and still show exploitable intraday or seasonal mean reversion under specific conditions.</p>"], ["Why this matters", "<p>This is directly relevant to local market-data work: bar frequency, time-of-day effects, and market regime can matter as much as the high-level strategy label.</p>"], ["Caveat", "<p>Mean reversion tends to be more fragile to <a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a> than slower momentum/trend systems because the edge per trade is often smaller and more cost-sensitive.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n</ul>"]], "search_text": "Mean Reversion concept mean-reversion intraday seasonality Mean Reversion The strongest lesson surfaced from the Chan material is that mean reversion is context dependent. A series can look non reverting on daily bars and still show exploitable intraday or seasonal mean reversion under specific conditions. Why this matters This is directly relevant to local market data work: bar frequency, time of day effects, and market regime can matter as much as the high level strategy label. Caveat Mean reversion tends to be more fragile to execution realism than slower momentum/trend systems because the edge per trade is often smaller and more cost sensitive. Related pages backtesting execution realism momentum", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "momentum", "title": "Momentum", "type": "concept", "group": "concepts", "tags": ["momentum", "trend", "ranking"], "sections": [["Summary", "<p>Momentum appears in multiple forms across these books:</p>\n<ul>\n<li>time-series momentum / trend following in <a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></li>\n<li>broader strategy-category treatment in <a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a></li>\n<li>cross-sectional equity momentum in <a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></li>\n</ul>"], ["Practical lesson", "<p>Momentum is less about one magic indicator and more about consistent selection, holding, rebalancing, and risk control. The books collectively suggest that simple momentum ideas often have better durability than overfit exotic models.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"]], "search_text": "Momentum concept momentum trend ranking Momentum Momentum appears in multiple forms across these books: time series momentum / trend following in following the trend clenow broader strategy category treatment in algorithmic trading chan cross sectional equity momentum in stocks on the move clenow Practical lesson Momentum is less about one magic indicator and more about consistent selection, holding, rebalancing, and risk control. The books collectively suggest that simple momentum ideas often have better durability than overfit exotic models. Related pages trend following position sizing drawdown risk", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "position-sizing", "title": "Position Sizing", "type": "concept", "group": "concepts", "tags": ["risk", "leverage", "sizing", "capital-allocation"], "sections": [["Summary", "<p>Position sizing is where strategy ideas become survivable or fragile.</p>"], ["Shared lessons", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a> connects leverage and capital allocation to growth vs drawdown trade-offs.</li>\n<li><a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a> treats sizing as a disciplined portfolio problem, often normalized through <a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a>.</li>\n</ul>"], ["Working rule for future research", "<p>Any promising signal should be evaluated twice:</p>\n<p class=\"numbered\">1. raw signal quality</p>\n<p class=\"numbered\">2. signal quality after realistic sizing logic</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a></li>\n</ul>"]], "search_text": "Position Sizing concept risk leverage sizing capital-allocation Position Sizing Position sizing is where strategy ideas become survivable or fragile. Shared lessons quantitative trading chan connects leverage and capital allocation to growth vs drawdown trade offs. systematic trading carver treats sizing as a disciplined portfolio problem, often normalized through volatility targeting . Working rule for future research Any promising signal should be evaluated twice: 1. raw signal quality 2. signal quality after realistic sizing logic Related pages volatility targeting drawdown risk strategy research pipeline", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "trend-following", "title": "Trend Following", "type": "concept", "group": "concepts", "tags": ["trend-following", "futures", "diversification"], "sections": [["Summary", "<p>Trend following is the most explicit “simple but hard” strategy family in this set. It tends to be conceptually easy, operationally demanding, and psychologically uncomfortable during flat or hostile periods.</p>"], ["What these books suggest", "<ul>\n<li>Diversification across assets matters.</li>\n<li>Risk normalization matters.</li>\n<li>Simple trend logic can be more durable than overparameterized systems.</li>\n<li>Trend following and <a href=\"#page=momentum\" class=\"inline-link\">momentum</a> are closely related, but implementation details differ by asset class.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n</ul>"]], "search_text": "Trend Following concept trend-following futures diversification Trend Following Trend following is the most explicit “simple but hard” strategy family in this set. It tends to be conceptually easy, operationally demanding, and psychologically uncomfortable during flat or hostile periods. What these books suggest Diversification across assets matters. Risk normalization matters. Simple trend logic can be more durable than overparameterized systems. Trend following and momentum are closely related, but implementation details differ by asset class. Related pages momentum drawdown risk position sizing", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "volatility-targeting", "title": "Volatility Targeting", "type": "concept", "group": "concepts", "tags": ["volatility-targeting", "sizing", "portfolio"], "sections": [["Summary", "<p>Volatility targeting is central in Carver’s framework. It aims to scale positions so that risk is more stable across time and across instruments, rather than allowing nominal exposure to determine realized risk.</p>"], ["Why it matters", "<ul>\n<li>Makes strategy comparisons fairer.</li>\n<li>Helps avoid accidental overbetting when volatility changes.</li>\n<li>Provides a natural bridge between single-strategy research and portfolio construction.</li>\n</ul>"], ["Local implication", "<p>Future research code should treat volatility targeting as a reusable module rather than a per-notebook afterthought.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n</ul>"]], "search_text": "Volatility Targeting concept volatility-targeting sizing portfolio Volatility Targeting Volatility targeting is central in Carver’s framework. It aims to scale positions so that risk is more stable across time and across instruments, rather than allowing nominal exposure to determine realized risk. Why it matters Makes strategy comparisons fairer. Helps avoid accidental overbetting when volatility changes. Provides a natural bridge between single strategy research and portfolio construction. Local implication Future research code should treat volatility targeting as a reusable module rather than a per notebook afterthought. Related pages position sizing drawdown risk backtesting", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "walk-forward-analysis", "title": "Walk-Forward Analysis", "type": "concept", "group": "concepts", "tags": ["walk-forward", "out-of-sample", "fitting", "robustness"], "sections": [["Summary", "<p>Walk-forward analysis is the habit of judging a strategy by repeated out-of-sample performance rather than by one clean in-sample curve.</p>"], ["Why it belongs here", "<p>Chan emphasizes replication and due diligence; Carver emphasizes fitting restraint. Put together, they imply that research should constantly ask whether the result survives after parameters are chosen.</p>"], ["Local implication", "<p>For serious experiments, use at least one of:</p>\n<ul>\n<li>train / validation / test splits</li>\n<li>rolling walk-forward windows</li>\n<li>regime-based robustness checks</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a></li>\n</ul>"]], "search_text": "Walk-Forward Analysis concept walk-forward out-of-sample fitting robustness Walk Forward Analysis Walk forward analysis is the habit of judging a strategy by repeated out of sample performance rather than by one clean in sample curve. Why it belongs here Chan emphasizes replication and due diligence; Carver emphasizes fitting restraint. Put together, they imply that research should constantly ask whether the result survives after parameters are chosen. Local implication For serious experiments, use at least one of: train / validation / test splits rolling walk forward windows regime based robustness checks Related pages backtesting drawdown risk strategy research pipeline", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "best-ideas-by-topic", "title": "Best ideas by topic", "type": "synthesis", "group": "syntheses", "tags": ["cross-book", "topics", "reference-layer"], "sections": [["Why this page exists", "<ul>\n<li>The library is now deep enough that browsing by book is no longer the only useful entry point.</li>\n<li>This page groups the best practical ideas by problem type: idea generation, testing, execution, portfolio construction, and stock/futures strategy design.</li>\n<li>Use it as the fast reference layer when you remember the concept but not which author explained it best.</li>\n</ul>"], ["Topic pages", "<ul>\n<li><a href=\"#page=topic-idea-generation-and-research-loop\" class=\"inline-link\">topic-idea-generation-and-research-loop</a></li>\n<li><a href=\"#page=topic-backtesting-and-robustness\" class=\"inline-link\">topic-backtesting-and-robustness</a></li>\n<li><a href=\"#page=topic-execution-and-live-trading\" class=\"inline-link\">topic-execution-and-live-trading</a></li>\n<li><a href=\"#page=topic-portfolio-construction-and-risk\" class=\"inline-link\">topic-portfolio-construction-and-risk</a></li>\n<li><a href=\"#page=topic-trend-momentum-and-mean-reversion\" class=\"inline-link\">topic-trend-momentum-and-mean-reversion</a></li>\n</ul>"], ["Suggested usage", "<p class=\"numbered\">1. Start with the topic that matches the problem you are solving.</p>\n ategies stom clenow 06 ranking stocks", "meta": {"created": "2026-05-30", "updated": "2026-05-30", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "reading-path", "title": "Reading Path", "type": "synthesis", "group": "syntheses", "tags": ["reading-order", "learning-path"], "sections": [["Recommended sequence", "<p class=\"numbered\">1. <a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a></p>\n<ul>\n<li>Goal: learn the overall independent-quant workflow.</li>\n</ul>\n<p class=\"numbered\">2. <a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a></p>\n<ul>\n<li>Goal: learn sizing, fitting restraint, and portfolio process.</li>\n</ul>\n<p class=\"numbered\">3. <a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></p>\n<ul>\n<li>Goal: understand robust simple trend systems.</li>\n</ul>\n<p class=\"numbered\">4. <a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a></p>\n<ul>\n<li>Goal: expand strategy archetypes and implementation nuance.</li>\n</ul>\n<p class=\"numbered\">5. <a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a></p>\n<ul>\n<li>Goal: see how simplicity translates into a focused momentum portfolio method.</li>\n</ul>"], ["Reading rule", "<p>For each book, create or update at least one practical artifact:</p>\n<ul>\n<li>a backtest idea</li>\n<li>a risk-control module</li>\n<li>an execution caveat</li>\n<li>a research checklist item</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a></li>\n<li><a href=\"#page=testing-and-execution-checklist\" class=\"inline-link\">testing-and-execution-checklist</a></li>\n</ul>"]], "search_text": "Reading Path synthesis reading-order learning-path Reading Path Recommended sequence 1. quantitative trading chan Goal: le
