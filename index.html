-targeting</a> where appropriate</li>\n<li>drawdown-aware reporting</li>\n</ul>\n<h3>6. Review layer</h3>\n<ul>\n<li>why the strategy might fail</li>\n<li>what conditions it probably needs</li>\n<li>whether the result is still good after implementation realism</li>\n</ul>"], ["Local priority", "<p>The immediate value for <code>trading-vy</code> is to harden the validation, cost, and sizing layers before chasing more complex signals.</p>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n</ul>"]], "search_text": "Strategy Research Pipeline synthesis research-pipeline implementation workflow Strategy Research Pipeline What these books imply the local pipeline should contain 1. Data layer clean market data explicit bar frequency choices awareness of missing bars / timestamp conventions 2. Signal layer simple, explainable strategy rules first clear separation of momentum, trend, and mean reversion hypotheses 3. Validation layer proper backtesting out of sample or walk forward analysis sensitivity to parameters and regime changes 4. Cost layer spread/slippage assumptions liquidity realism notes on expected live vs backtest divergence 5. Risk layer reusable position sizing volatility targeting where appropriate drawdown aware reporting 6. Review layer why the strategy might fail what conditions it probably needs whether the result is still good after implementation realism Local priority The immediate value for trading vy is to harden the validation, cost, and sizing layers before chasing more complex signals. Related pages backtesting execution realism position sizing", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "testing-and-execution-checklist", "title": "Testing and Execution Checklist", "type": "synthesis", "group": "syntheses", "tags": ["checklist", "testing", "execution"], "sections": [["Summary", "<p>Use this before treating any local backtest as decision-worthy.</p>"], ["Data and setup", "<ul>\n<li>Is the dataset clearly defined and reproducible?</li>\n<li>Are timestamps, missing bars, splits, and other adjustments understood?</li>\n<li>Is the bar frequency appropriate for the hypothesis?</li>\n</ul>"], ["Backtest quality", "<ul>\n<li>Can the result be reproduced from scratch?</li>\n<li>Is there a clear train / test or walk-forward split?</li>\n<li>Were parameters kept simple enough to avoid obvious overfitting?</li>\n</ul>"], ["Execution realism", "<ul>\n<li>What spread/slippage assumption was used?</li>\n<li>Would edge survive worse fills?</li>\n<li>Is liquidity compatible with the strategy horizon?</li>\n</ul>"], ["Risk and sizing", "<ul>\n<li>Is there an explicit <a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a> rule?</li>\n<li>Is <a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a> needed?</li>\n<li>What does drawdown look like, and is it survivable?</li>\n</ul>"], ["Final judgment", "<ul>\n<li>Would I still trade this after degrading assumptions slightly?</li>\n<li>Does the idea add anything new relative to simpler baselines?</li>\n<li>What is the most likely failure mode?</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"]], "search_text": "Testing and Execution Checklist synthesis checklist testing execution Testing and Execution Checklist Use this before treating any local backtest as decision worthy. Data and setup Is the dataset clearly defined and reproducible? Are timestamps, missing bars, splits, and other adjustments understood? Is the bar frequency appropriate for the hypothesis? Backtest quality Can the result be reproduced from scratch? Is there a clear train / test or walk forward split? Were parameters kept simple enough to avoid obvious overfitting? Execution realism What spread/slippage assumption was used? Would edge survive worse fills? Is liquidity compatible with the strategy horizon? Risk and sizing Is there an explicit position sizing rule? Is volatility targeting needed? What does drawdown look like, and is it survivable? Final judgment Would I still trade this after degrading assumptions slightly? Does the idea add anything new relative to simpler baselines? What is the most likely failure mode? Related pages strategy research pipeline execution realism drawdown risk", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "topic-backtesting-and-robustness", "title": "Topic: backtesting and robustness", "type": "synthesis", "group": "syntheses", "tags": ["topic", "backtesting", "robustness"], "sections": [["Core lesson across books", "<ul>\n<li>Backtests are useful when they falsify weak ideas and clarify assumptions.</li>\n<li>They are dangerous when they become a factory for overfitted comfort.</li>\n</ul>"], ["Best source anchors", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=qt-chan-03-backtesting\" class=\"inline-link\">qt-chan-03-backtesting</a></li>\n<li><a href=\"#page=algo-chan-01-backtesting-and-automated-execution\" class=\"inline-link\">algo-chan-01-backtesting-and-automated-execution</a></li>\n<li><a href=\"#page=carver-st-03-fitting\" class=\"inline-link\">carver-st-03-fitting</a></li>\n<li><a href=\"#page=ft-clenow-11-modelling-futures-strategies\" class=\"inline-link\">ft-clenow-11-modelling-futures-strategies</a></li>\n</ul>"], ["Best ideas", "<ul>\n<li>Align test design with tradable rea : "2026-05-30", "updated": "2026-05-30", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "topic-execution-and-live-trading", "title": "Topic: execution and live trading", "type": "synthesis", "group": "syntheses", "tags": ["topic", "execution", "live-trading"], "sections": [["Core lesson across books", "<ul>\n<li>Many edges survive in research but die at the interface between signal and order.</li>\n<li>Chan emphasizes market frictions directly; Carver emphasizes operational rules and consistency; Clenow implicitly rewards designs that do not require heroic execution.</li>\n</ul>"], ["Best source anchors", "<ul>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=qt-chan-05-executionsystems\" class=\"inline-link\">qt-chan-05-executionsystems</a></li>\n<li><a href=\"#page=algo-chan-01-backtesting-and-automated-execution\" class=\"inline-link\">algo-chan-01-backtesting-and-automated-execution</a></li>\n<li><a href=\"#page=carver-st-12-speed-and-size\" class=\"inline-link\">carver-st-12-speed-and-size</a></li>\n<li><a href=\"#page=stom-clenow-10-trading-the-strategy\" class=\"inline-link\">stom-clenow-10-trading-the-strategy</a></li>\n</ul>"], ["Best ideas", "<ul>\n<li>Prefer strategies whose edge is not hyper-sensitive to a few ticks of slippage.</li>\n<li>Separate signal timestamp, decision timestamp, and execution timestamp.</li>\n<li>Model order style explicitly: market, limit, close, next-open, VWAP-like, staged execution.</li>\n<li>Simpler slower systems are easier to keep faithful in live trading.</li>\n<li>Operational repeatability is a competitive advantage for individual researchers.</li>\n</ul>"], ["What this means in practice", "<ul>\n<li>When in doubt, bias your assumptions toward worse execution.</li>\n<li>Build monitoring for divergence between intended positions and actual fills.</li>\n<li>Favor systems you can execute consistently with your current tooling and time horizon.</li>\n</ul>"]], "search_text": "Topic: execution and live trading synthesis topic execution live-trading Topic: execution and live trading Core lesson across books Many edges survive in research but die at the interface between signal and order. Chan emphasizes market frictions directly; Carver emphasizes operational rules and consistency; Clenow implicitly rewards designs that do not require heroic execution. Best source anchors execution realism qt chan 05 executionsystems algo chan 01 backtesting and automated execution carver st 12 speed and size stom clenow 10 trading the strategy Best ideas Prefer strategies whose edge is not hyper sensitive to a few ticks of slippage. Separate signal timestamp, decision timestamp, and execution timestamp. Model order style explicitly: market, limit, close, next open, VWAP like, staged execution. Simpler slower systems are easier to keep faithful in live trading. Operational repeatability is a competitive advantage for individual researchers. What this means in practice When in doubt, bias your assumptions toward worse execution. Build monitoring for divergence between intended positions and actual fills. Favor systems you can execute consistently with your current tooling and time horizon.", "meta": {"created": "2026-05-30", "updated": "2026-05-30", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "topic-idea-generation-and-research-loop", "title": "Topic: idea generation and research loop", "type": "synthesis", "group": "syntheses", "tags": ["topic", "research-loop", "idea-generation"], "sections": [["Core lesson across books", "<ul>\n<li>Good strategy research starts with a clear mechanism, not with brute-force parameter search.</li>\n<li>Chan is strongest on research workflow discipline; Carver is strongest on reducing discretionary self-deception; Clenow is strongest on turning simple ideas into coherent portfolio systems.</li>\n</ul>"], ["Best source anchors", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a></li>\n<li><a href=\"#page=qt-chan-02-fishing-for-ideas\" class=\"inline-link\">qt-chan-02-fishing-for-ideas</a></li>\n<li><a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a></li>\n<li><a href=\"#page=carver-st-03-fitting\" class=\"inline-link\">carver-st-03-fitting</a></li>\n<li><a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a></li>\n</ul>"], ["Best ideas", "<ul>\n<li>Start from a market behavior hypothesis: trend persistence, cross-sectional momentum, short-horizon mean reversion, carry, or portfolio diversification.</li>\n<li>Write down the data requirements and failure conditions before coding.</li>\n<li>Prefer a small number of understandable variants over massive parameter grids.</li>\n<li>Keep a separation between research logic, execution assumptions, and sizing logic.</li>\n<li>Treat robustness as a first-class output of research, not a final cosmetic check.</li>\n</ul>"], ["What this means in practice", "<ul>\n<li>Your research notebook should answer: what is the edge supposed to be, where should it fail, what costs can it survive, and how sensitive is it to universe and parameter choices?</li>\n<li>A strategy that only looks good after repeated parameter nudging is already suspect.</li>\n</ul>"]], "search_text": "Topic: idea generation and research loop synthesis topic research-loop idea-generation Topic: idea generation and research loop Core lesson across books Good strategy research starts with a clear mechanism, not with brute force parameter search. Chan is strongest on research workflow discipline; Carver is strongest on reducing discretionary self deception; Clenow is strongest on turning simple ideas into coherent portfolio systems. Best source anchors quantitative trading chan qt chan 02 fishing for ideas systematic trading carver carver st 03 fitting following the trend clenow Best ideas Start from a market iants in comparable risk units. Track gross exposure, net exposure, concentration, and expected volatility as part of routine research output. Use portfolio construction rules that remain understandable after six months away from the project.", "meta": {"created": "2026-05-30", "updated": "2026-05-30", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "topic-trend-momentum-and-mean-reversion", "title": "Topic: trend, momentum, and mean reversion", "type": "synthesis", "group": "syntheses", "tags": ["topic", "trend", "momentum", "mean-reversion"], "sections": [["Core lesson across books", "<ul>\n<li>These are not interchangeable labels.</li>\n<li>The books collectively suggest that signal family, horizon, and universe jointly determine whether trend, momentum, or mean reversion is sensible.</li>\n</ul>"], ["Best source anchors", "<ul>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n<li><a href=\"#page=algo-chan-02-the-basics-of-mean-reversion\" class=\"inline-link\">algo-chan-02-the-basics-of-mean-reversion</a></li>\n<li><a href=\"#page=algo-chan-06-interday-momentum-strategies\" class=\"inline-link\">algo-chan-06-interday-momentum-strategies</a></li>\n<li><a href=\"#page=ft-clenow-04-two-basic-trend-following-strategies\" class=\"inline-link\">ft-clenow-04-two-basic-trend-following-strategies</a></li>\n<li><a href=\"#page=stom-clenow-06-ranking-stocks\" class=\"inline-link\">stom-clenow-06-ranking-stocks</a></li>\n</ul>"], ["Best ideas", "<ul>\n<li>Mean reversion often needs tighter data hygiene, stronger execution realism, and clearer microstructure awareness.</li>\n<li>Trend following is often more robust when expressed at portfolio level with broad diversification.</li>\n<li>Cross-sectional momentum is usually as much about ranking and selection discipline as it is about raw signal choice.</li>\n<li>Horizons matter: intraday momentum and multi-month momentum are different businesses.</li>\n<li>A strategy can look like “momentum” in one decomposition and “trend following” in another; focus on implementation consequences, not labels alone.</li>\n</ul>"], ["What this means in practice", "<ul>\n<li>For each research idea, specify: time horizon, holding period, universe, rebalance cadence, and expected source of edge.</li>\n<li>Do not move indicators between families without re-evaluating costs, turnover, and portfolio construction.</li>\n</ul>"]], "search_text": "Topic: trend, momentum, and mean reversion synthesis topic trend momentum mean-reversion Topic: trend, momentum, and mean reversion Core lesson across books These are not interchangeable labels. The books collectively suggest that signal family, horizon, and universe jointly determine whether trend, momentum, or mean reversion is sensible. Best source anchors trend following momentum mean reversion algo chan 02 the basics of mean reversion algo chan 06 interday momentum strategies ft clenow 04 two basic trend following strategies stom clenow 06 ranking stocks Best ideas Mean reversion often needs tighter data hygiene, stronger execution realism, and clearer microstructure awareness. Trend following is often more robust when expressed at portfolio level with broad diversification. Cross sectional momentum is usually as much about ranking and selection discipline as it is about raw signal choice. Horizons matter: intraday momentum and multi month momentum are different businesses. A strategy can look like “momentum” in one decomposition and “trend following” in another; focus on implementation consequences, not labels alone. What this means in practice For each research idea, specify: time horizon, holding period, universe, rebalance cadence, and expected source of edge. Do not move indicators between families without re evaluating costs, turnover, and portfolio constru function pageMatchesSearch(p){if(!currentSearch)return true; return p.search_text.toLowerCase().includes(currentSearch);}
function visiblePages(){return pages.filter(p=>pageMatchesFilter(p)&&pageMatchesSearch(p));}
function currentPageId(){const hash=location.hash||''; const m=hash.match(/page=([^&]+)/); return m?decodeURIComponent(m[1]):'overview';}
function findPage(id){return pages.find(p=>p.id===id);}
function setRoute(id){location.hash='page='+encodeURIComponent(id);}
function goHome(){setRoute('overview');}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function copyPageLink(id){const url=location.origin+location.pathname+'#page='+encodeURIComponent(id); navigator.clipboard.writeText(url).then(()=>{const btn=document.getElementById('copy-link-btn'); if(btn){const old=btn.textContent; btn.textContent='Copied'; setTimeout(()=>btn.textContent=old,900);}});}
function renderFilters(){document.getElementById('filters').innerHTML=filterDefs.map(([key,label])=>`<button class="filter-pill ${currentFilter===key?'active':''}" onclick="setFilter('${key}')">${label}</button>`).join('');}
function setFilter(key){currentFilter=key; renderFilters(); renderSidebar(); renderMain();}
function renderSidebar(){const root=document.getElementById('sidebarNav'); const current=currentPageId(); const groups={start:[],books:[],concepts:[],syntheses:[],chapters:[]}; visiblePages().forEach(p=>{if(groups[p.group])groups[p.group].push(p);}); root.innerHTML=Object.entries(groups).map(([group,items])=>{if(!items.length)return ''; const sorted=items.slice().sort((a,b)=>a.title.localeCompare(b.title)); return `<div class="nav-group"><div class="section-title">${groupLabels[group]}</div><div class="nav-list">${sorted.map(p=>`<div class="nav-item ${current===p.id?'active':''}" onclick="setRoute('${p.id}')"><div class="name">${escapeHtml(p.title)}</div><div class="meta">${escapeHtml(p.type.replace('-',' '))}</div></div>`).join('')}</div></div>`;}).join('');}
function iconForType(type){return ({book:'📘',concept:'🧠',synthesis:'🧭',chapter:'📑','chapter-map':'🗺️',home:'🏠'})[type]||'📄';}
function labelForType(type){return ({book:'Book',concept:'Concept',synthesis:'Synthesis',chapter:'Chapter','chapter-map':'Map',home:'Home'})[type]||type;}
function cardForPage(id,tagClass){const p=findPage(id); if(!p)return ''; const rawSummary=stripTags((p.sections[0]&&p.sections[0][1])||'').trim(); let summary=rawSummary; if(summary.length>165){summary=summary.slice(0,165); const lastSpace=summary.lastIndexOf(' '); if(lastSpace>100) summary=summary.slice(0,lastSpace); summary+='…';} return `<div class="card clickable" onclick="setRoute('${p.id}')"><div class="card-top"><div class="card-icon">${iconForType(p.type)}</div><span class="tag ${tagClass}">${escapeHtml(labelForType(p.type))}</span></div><div class="card-title">${escapeHtml(p.title)}</div><div class="card-copy">${escapeHtml(summary||'Open this note in the workspace.')}</div></div>`;}
function renderHome(){const overview=findPage('overview'); const overviewLead=overview&&overview.sections[0]?stripTags(overview.sections[0][1]).trim():'A compact workspace built from your trading book notes.'; const startRows=homeData.start_here.map(id=>{const p=findPage(id); if(!p)return ''; return `<div class="mini-item" onclick="setRoute('${p.id}')"><strong>${escapeHtml(p.title)}</strong><span>${escapeHtml(labelForType(p.type))} · Open this first when orienting to the library.</span></div>`;}).join(''); const priorityRows=homeData.priority_chapters.map(id=>{const p=findPage(id); if(!p)return ''; const meta=((p.meta.pages||'')+(p.meta.pages?' · ':'')+'deep chapter'); return `<div class="mini-item" onclick="setRoute('${p.id}')"><strong>${escapeHtml(p.title)}</strong><span>${escapeHtml(meta)}</span></div>`;}).join(''); return `<div class="page-shell"><div class="hero"><div class="main"><div class="label">Workspace</div><div class="amount">Trading Knowledge Reference</div><div class="note">${escapeHtml(overviewLead)} Browse books, concepts, syntheses, and deep chapter notes across all books in a single local HTML workspace.</div></div><div class="hero-splits"><div class="split"><div class="s-label">Books</div><div class="s-amount">5</div></div><div class="split blue"><div class="s-label">Concepts</div><div class="s-amount">9</div></div><div class="split warn"><div class="s-label">Syntheses</div><div class="s-amount">9</div></div><div class="split inr"><div class="s-label">Deep chapters</div><div class="s-amount">61</div></div></div></div><div class="section home-subgrid"><div class="panel"><div class="section-title">Start here</div><div class="mini-list">${startRows}</div></div><div class="panel"><div class="section-title">Best next reading for implementation</div><div class="mini-list">${priorityRows}</div></div></div><div class="section"><div class="section-head"><div class="section-title">Books</div></div><div class="grid books">${homeData.books.map(id=>cardForPage(id,'book')).join('')}</div></div><div class="section"><div class="section-head"><div class="section-title">Key concepts</div></div><div class="grid cards">${homeData.concepts.map(id=>cardForPage(id,'concept')).join('')}</div></div><div class="section"><div class="section-head"><div class="section-title">Syntheses for actual research work</div></div><div class="grid cards">${homeData.syntheses.map(id=>cardForPage(id,'synthesis')).join('')}</div></div></div>`;}
function renderChapterNav(id){const chapters=pages.filter(p=>p.type==='chapter').sort((a,b)=>a.id.localeCompare(b.id)); const idx=chapters.findIndex(c=>c.id===id); const prev=idx>0?chapters[idx-1]:null; const next=idx<chapters.length-1?chapters[idx+1]:null; return `<div class="chapter-nav">${prev?`<a href="#page=${encodeURIComponent(prev.id)}">← ${escapeHtml(prev.title)}</a>`:''}${next?`<a href="#page=${encodeURIComponent(next.id)}">${escapeHtml(next.title)} →</a>`:''}</div>`;}
function renderPage(page){const metaBits=[page.type!=='home'?labelForType(page.type):'Home']; if(page.author)metaBits.push(page.author); if(page.meta.part)metaBits.push(page.meta.part); if(page.meta.pages)metaBits.push('pp. '+page.meta.pages); const chips=(page.tags||[]).map(tag=>`<span class="chip">${escapeHtml(tag)}</span>`).join(''); const article=page.sections.map(([title,content])=>`<h2>${escapeHtml(title)}</h2>${content}`).join(''); const searchScopeCount=visiblePages().length; const statPages=page.meta.pages?`<div class="stat"><div class="label">Pages</div><div class="value">${escapeHtml(page.meta.pages)}</div></div>`:''; const statPart=page.meta.part?`<div class="stat"><div class="label">Part</div><div class="value">${escapeHtml(page.meta.part)}</div></div>`:''; const chapterNav=page.type==='chapter'?renderChapterNav(page.id):''; return `<div class="page-shell"><div class="breadcrumbs"><span>Workspace</span><span>›</span><a href="#page=overview" class="inline-link">Home</a><span>›</span><span>${escapeHtml(page.title)}</span></div><div class="page-head"><div class="page-title">${escapeHtml(page.title)}</div><div class="page-sub">${metaBits.map(escapeHtml).join(' · ')}</div><div class="toolbar"><button class="button" onclick="goHome()">Back to home</button><button class="button" id="copy-link-btn" onclick="copyPageLink('${page.id}')">Copy link</button></div>${chips?`<div class="chips">${chips}</div>`:''}</div><div class="content-grid"><article class="article">${article}${chapterNav}</article><aside class="aside"><div class="stat"><div class="label">Type</div><div class="value">${escapeHtml(labelForType(page.type))}</div></div><div class="stat"><div class="label">Current filter scope</div><div class="value">${searchScopeCount}</div></div>${statPages}${statPart}</aside></div></div>`;}
function renderSearchResults(){const hits=visiblePages(); if(!hits.length){return `<div class="empty"><strong>No results.</strong> Try clearing the filter or using a broader search term like <code>risk</code>, <code>Carver</code>, or <code>momentum</code>.</div>`;} return `<div class="page-shell"><div class="page-head"><div class="page-title">Search & filter results</div><div class="page-sub">${hits.length} visible pages · filter ${escapeHtml(currentFilter)}${currentSearch?` · search “${escapeHtml(currentSearch)}”`:''}</div></div><div class="result-list">${hits.map(p=>cardForPage(p.id,p.type==='book'?'book':p.type==='concept'?'concept':p.type==='synthesis'?'synthesis':'chapter')).join('')}</div></div>`;}
function renderMain(){const root=document.getElementById('app'); const page=findPage(currentPageId()); if((currentSearch||currentFilter!=='all')&&(!page||currentPageId()==='overview')){root.innerHTML=renderSearchResults(); return;} if(!page){root.innerHTML=renderHome(); return;} if(page.type==='home'){root.innerHTML=renderHome(); return;} root.innerHTML=renderPage(page);}
function syncSearch(){currentSearch=document.getElementById('searchInput').value.trim().toLowerCase(); renderSidebar(); renderMain();}
document.getElementById('searchInput').addEventListener('input',syncSearch);
window.addEventListener('hashchange',()=>{renderSidebar(); renderMain();});
renderFilters(); renderSidebar(); renderMain();
</script>
</body>
</html>
