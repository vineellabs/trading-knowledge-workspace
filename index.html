<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Knowledge Workspace</title>
  <style>
    :root {
      --bg:#f7f6f3; --surface:#ffffff; --surface-2:#faf9f6; --border:#e8e5df; --text:#1a1917; --muted:#7a7670;
      --accent:#2d6a4f; --accent-lt:#d8f0e4; --warn:#b45309; --warn-lt:#fef3c7; --blue:#3730a3; --blue-lt:#eef2ff;
      --inr:#5b2d8c; --inr-lt:#ede9fe; --danger:#991b1b; --danger-lt:#fee2e2;
      --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04); --shadow-md:0 4px 12px rgba(0,0,0,.07);
      --sidebar:320px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
    a{color:inherit;text-decoration:none}
    code{background:#f3f1ed;border:1px solid var(--border);padding:1px 5px;border-radius:6px;font-size:12px}
    .app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
    .sidebar{position:sticky;top:0;height:100vh;padding:24px 18px 28px;border-right:1px solid var(--border);background:rgba(247,246,243,.92);backdrop-filter:saturate(120%) blur(12px);overflow:auto}
    .content{padding:32px 28px 56px;max-width:1100px;width:100%;margin:0 auto}
    .workspace-title{font-size:22px;font-weight:650;letter-spacing:-.3px;cursor:pointer}
    .subtitle{color:var(--muted);font-size:13px;margin-top:6px}
    .fx-pill{display:inline-block;background:#f0f0ee;color:var(--muted);font-size:11px;padding:3px 10px;border-radius:20px;margin-top:10px}
    .search{margin-top:18px}
    .search input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;background:#fff;font:inherit;color:var(--text)}
    .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
    .filter-pill{font-size:11px;font-weight:600;letter-spacing:.3px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:.15s}
    .filter-pill.active{background:var(--accent-lt);color:var(--accent);border-color:transparent}
    .nav-group{margin-top:20px}
    .section-title{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .nav-list{display:flex;flex-direction:column;gap:4px}
    .nav-item{padding:9px 10px;border-radius:10px;cursor:pointer;transition:.15s;border:1px solid transparent}
    .nav-item:hover{background:#fbfaf7;border-color:var(--border)}
    .nav-item.active{background:var(--surface);border-color:var(--border);box-shadow:var(--shadow)}
    .nav-item .name{font-size:13px;font-weight:550;color:var(--text)}
    .nav-item .meta{font-size:11px;color:var(--muted);margin-top:2px}
    .hero{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 28px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;box-shadow:var(--shadow-md);flex-wrap:wrap}
    .hero .main{flex:1;min-width:240px}
    .hero .label{font-size:12px;color:var(--muted);margin-bottom:4px}
    .hero .amount{font-size:32px;font-weight:700;letter-spacing:-1px}
    .hero .note{font-size:12px;color:var(--muted);margin-top:6px;max-width:72ch}
    .hero-splits{display:flex;gap:10px;flex-wrap:wrap}
    .split{text-align:center;padding:10px 16px;border-radius:10px;background:var(--accent-lt);min-width:110px}
    .split.warn{background:var(--warn-lt)} .split.blue{background:var(--blue-lt)} .split.inr{background:var(--inr-lt)}
    .split .s-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);margin-bottom:2px;text-transform:uppercase}
    .split .s-amount{font-size:18px;font-weight:700}
    .grid{display:grid;gap:12px}
    .grid.books{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
    .grid.cards{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
    .card,.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow)}
    .card.clickable{cursor:pointer;transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease}
    .card.clickable:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);border-color:#ded8cf}
    .card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
    .card-title{font-size:14px;font-weight:650;letter-spacing:-.1px}
    .card-copy{font-size:12px;color:var(--muted)}
    .card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;background:#f0f0ee}
    .tag{font-size:10px;font-weight:600;letter-spacing:.4px;padding:3px 8px;border-radius:20px;text-transform:uppercase}
    .tag.book{background:var(--blue-lt);color:var(--blue)} .tag.concept{background:var(--accent-lt);color:var(--accent)} .tag.synthesis{background:var(--warn-lt);color:var(--warn)} .tag.chapter{background:var(--inr-lt);color:var(--inr)}
    .section{margin-top:28px}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .section-head .section-title{margin-bottom:0}
    .page-shell{display:flex;flex-direction:column;gap:16px}
    .page-head{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 28px;box-shadow:var(--shadow-md)}
    .page-title{font-size:28px;font-weight:700;letter-spacing:-.8px}
    .page-sub{font-size:13px;color:var(--muted);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
    .chip{font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;background:#f0f0ee;color:#555}
    .content-grid{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:14px;align-items:start}
    .article{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px;box-shadow:var(--shadow)}
    .article h2{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:22px 0 10px}
    .article h3{font-size:15px;font-weight:650;margin:18px 0 8px}
    .article p{margin:0 0 10px;font-size:14px}
    .article p.numbered{padding-left:2px;font-weight:500}
    .article ul{margin:0 0 14px 18px}
    .article li{margin:0 0 8px}
    .inline-link{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(45,106,79,.28)}
    .aside{display:flex;flex-direction:column;gap:12px;position:sticky;top:24px}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
    .stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:6px}
    .stat .value{font-size:20px;font-weight:700;letter-spacing:-.5px}
    .result-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
    .empty{background:#fffdf7;border:1px solid #e8e0c8;border-radius:12px;padding:18px 20px;font-size:13px;color:#5a5040;line-height:1.7}
    .breadcrumbs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--muted)}
    .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
    .button{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 12px;font:inherit;font-size:12px;color:var(--text);cursor:pointer}
    .button:hover{background:#fbfaf7}
    .chapter-nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
    .chapter-nav a{display:inline-flex;padding:8px 10px;border-radius:10px;background:#fbfaf7;border:1px solid var(--border)}
    .home-subgrid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
    .mini-list{display:flex;flex-direction:column;gap:10px}
    .mini-item{padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
    .mini-item:last-child{border-bottom:0}
    .mini-item strong{display:block;font-size:13px}
    .mini-item span{font-size:12px;color:var(--muted)}
    .footer-note{margin-top:36px;text-align:center;font-size:12px;color:#b8b2aa}
    @media (max-width:980px){
      .app{grid-template-columns:1fr}
      .sidebar{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--border)}
      .content{padding:22px 14px 40px}
      .content-grid,.home-subgrid{grid-template-columns:1fr}
      .aside{position:relative;top:auto}
      .hero{padding:20px}
      .hero .amount{font-size:28px}
      .page-head{padding:20px}
      .page-title{font-size:24px}
    }
  </style>
</head>

<script>
const pages = [{"id": "overview", "title": "Trading Books Overview", "type": "home", "group": "start", "tags": ["systematic-trading", "backtesting", "execution", "risk"], "sections": [["Summary", "<p>This wiki is meant to answer a practical question: how should a personal quant researcher use a small set of good trading books without getting lost in theory or building too much tooling too early?</p>"], ["Core takeaway", "<p>These books collectively argue for a simple sequence:</p>\n<p class=\"numbered\">1. Learn how to form testable ideas.</p>\n<p class=\"numbered\">2. Learn how to avoid fooling yourself in backtests.</p>\n<p class=\"numbered\">3. Learn how to size and diversify risk.</p>\n<p class=\"numbered\">4. Learn why execution assumptions break simulated performance.</p>\n<p class=\"numbered\">5. Only then add complexity.</p>"], ["What each author mainly contributes", "<ul>\n<li><a href=\"#page=quantitative-trading-chan\" class=\"inline-link\">quantitative-trading-chan</a> and <a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a> give the practical independent-quant mindset: strategy archetypes, data issues, backtest pitfalls, and execution systems.</li>\n<li><a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a> gives the strongest framework for portfolio construction, fitting restraint, leverage, and volatility-based risk normalization.</li>\n<li><a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a> shows how simple diversified trend following can be robust when implemented consistently across futures.</li>\n<li><a href=\"#page=stocks-on-the-move-clenow\" class=\"inline-link\">stocks-on-the-move-clenow</a> translates similar simplicity into an equities momentum portfolio process.</li>\n</ul>"], ["The big pattern across books", "<p>The best ideas are usually not the most complicated ones. The edge comes from robust process, realistic costs, survivable sizing, and sticking with rules through drawdowns. That theme links <a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a>, <a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a>, <a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a>, and <a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a>.</p>"], ["How this helps the project", "<p>For <code>trading-vy</code>, the most useful output is not a generic “chat with PDFs” assistant. It is a set of durable pages that sharpen local research decisions:</p>\n<ul>\n<li>what backtests must include</li>\n<li>what execution assumptions need to be modeled</li>\n<li>what risk controls belong in strategy experiments</li>\n<li>what simple strategy families are worth testing first</li>\n</ul>"], ["Recommended next use of this wiki", "<p>Start with <a href=\"#page=reading-path\" class=\"inline-link\">reading-path</a>, then use <a href=\"#page=strategy-research-pipeline\" class=\"inline-link\">strategy-research-pipeline</a> and <a href=\"#page=testing-and-execution-checklist\" class=\"inline-link\">testing-and-execution-checklist</a> when designing or reviewing local signal research.</p>"]], "search_text": "Trading Books Overview home systematic-trading backtesting execution risk Overview This wiki is meant to answer a practical question: how should a personal quant researcher use a small set of good trading books without getting lost in theory or building too much tooling too early? Core takeaway These books collectively argue for a simple sequence: 1. Learn how to form testable ideas. 2. Learn how to avoid fooling yourself in backtests. 3. Learn how to size and diversify risk. 4. Learn why execution assumptions break simulated performance. 5. Only then add complexity. What each author mainly contributes quantitative trading chan and algorithmic trading chan give the practical independent quant mindset: strategy archetypes, data issues, backtest pitfalls, and execution systems. systematic trading carver gives the strongest framework for portfolio construction, fitting restraint, leverage, and volatility based risk normalization. following the trend clenow shows how simple diversified trend following can be robust when implemented consistently across futures. stocks on the move clenow translates similar simplicity into an equities momentum portfolio process. The big pattern across books The best ideas are usually not the most complicated ones. The edge comes from robust process, realistic costs, survivable sizing, and sticking with rules through drawdowns. That theme links backtesting , execution realism , position sizing , and drawdown risk . How this helps the project For trading vy , the most useful output is not a generic “chat with PDFs” assistant. It is a set of durable pages that sharpen local research decisions: what backtests must include what execution assumptions need to be modeled what risk controls belong in strategy experiments what simple strategy families are worth testing first Recommended next use of this wiki Start with reading path , then use strategy research pipeline and testing and execution checklist when designing or reviewing local signal research.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "algorithmic-trading-chan", "title": "Algorithmic Trading", "type": "book", "group": "books", "tags": ["mean-reversion", "momentum", "intraday", "execution", "backtesting"], "sections": [["Why this matters here", "<ul>\n<li>Good bridge from abstract quant ideas to concrete strategy archetypes.</li>\n<li>Emphasizes that different effects appear at different sampling frequencies.</li>\n<li>Useful for reminding future agents that live divergence often comes from costs, bugs, or regime shifts rather than from “markets becoming impossible.”</li>\n</ul>"], ["What it seems to contribute most", "<p>This book is practical and strategy-oriented. The sampled pages and index strongly emphasize:</p>\n<ul>\n<li>intraday and daily <a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n<li>time-series <a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li>arbitrage / cointegration patterns</li>\n<li>transaction costs and implementation pitfalls</li>\n<li>the importance of matching research logic to execution reality</li>\n</ul>"], ["Strongest ideas to retain", "<p class=\"numbered\">1. A price series can fail to mean-revert at one timescale and still mean-revert at another.</p>\n<p class=\"numbered\">2. Strategy categories matter less than implementation discipline.</p>\n<p class=\"numbered\">3. Well-known edges decay; robustness comes from process and adaptation rather than blind attachment to a textbook trade.</p>\n<p class=\"numbered\">4. <a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a> and realistic transaction costs are central, not afterthoughts.</p>"], ["Project implications", "<ul>\n<li>For local research, do not dismiss intraday seasonality or conditional mean reversion just because daily bars look weak.</li>\n<li>Separate “signal logic” from “bar frequency / market microstructure assumptions.”</li>\n<li>When a strategy underperforms live, check engineering mismatches and cost assumptions before assuming the thesis is dead.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=mean-reversion\" class=\"inline-link\">mean-reversion</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n</ul>"]], "search_text": "Algorithmic Trading book mean-reversion momentum intraday execution backtesting Algorithmic Trading — Ernest P. Chan Why this matters here Good bridge from abstract quant ideas to concrete strategy archetypes. Emphasizes that different effects appear at different sampling frequencies. Useful for reminding future agents that live divergence often comes from costs, bugs, or regime shifts rather than from “markets becoming impossible.” What it seems to contribute most This book is practical and strategy oriented. The sampled pages and index strongly emphasize: intraday and daily mean reversion time series momentum arbitrage / cointegration patterns transaction costs and implementation pitfalls the importance of matching research logic to execution reality Strongest ideas to retain 1. A price series can fail to mean revert at one timescale and still mean revert at another. 2. Strategy categories matter less than implementation discipline. 3. Well known edges decay; robustness comes from process and adaptation rather than blind attachment to a textbook trade. 4. execution realism and realistic transaction costs are central, not afterthoughts. Project implications For local research, do not dismiss intraday seasonality or conditional mean reversion just because daily bars look weak. Separate “signal logic” from “bar frequency / market microstructure assumptions.” When a strategy underperforms live, check engineering mismatches and cost assumptions before assuming the thesis is dead. Related pages mean reversion momentum execution realism backtesting", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": "Ernest P. Chan"}, {"id": "following-the-trend-clenow", "title": "Following the Trend", "type": "book", "group": "books", "tags": ["trend-following", "futures", "diversification", "robustness"], "sections": [["Why this matters here", "<ul>\n<li>Very useful antidote to overcomplication.</li>\n<li>Presents managed futures <a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a> as a diversified, rules-based business rather than a bag of clever indicators.</li>\n<li>Helpful for thinking about robustness, persistence, and cross-asset diversification.</li>\n</ul>"], ["Key themes visible from contents and sample pages", "<p>The contents immediately center on cross-asset trend following with futures, criticism of trend-following strategies, and diversified managed futures. The sampled mid-book text also reinforces the economics of running a systematic fund through different environments, not just hunting for the prettiest backtest.</p>"], ["Strongest ideas to retain", "<ul>\n<li>Simple trend logic can remain useful when diversified properly across assets.</li>\n<li>Managed futures should be evaluated across regimes, including years when equities dominate and years when crisis diversification matters.</li>\n<li>The strategy is as much about construction discipline and staying power as about signal cleverness.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Local futures/spot research can borrow the principle of broad diversification even if the current focus is narrower than a full managed-futures portfolio.</li>\n<li>When evaluating strategy quality, include bad-year behavior and crisis behavior, not just average return.</li>\n<li>Use this book alongside <a href=\"#page=systematic-trading-carver\" class=\"inline-link\">systematic-trading-carver</a> to separate signal simplicity from risk sophistication.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n</ul>"]], "search_text": "Following the Trend book trend-following futures diversification robustness Following the Trend — Andreas Clenow Why this matters here Very useful antidote to overcomplication. Presents managed futures trend following as a diversified, rules based business rather than a bag of clever indicators. Helpful for thinking about robustness, persistence, and cross asset diversification. Key themes visible from contents and sample pages The contents immediately center on cross asset trend following with futures, criticism of trend following strategies, and diversified managed futures. The sampled mid book text also reinforces the economics of running a systematic fund through different environments, not just hunting for the prettiest backtest. Strongest ideas to retain Simple trend logic can remain useful when diversified properly across assets. Managed futures should be evaluated across regimes, including years when equities dominate and years when crisis diversification matters. The strategy is as much about construction discipline and staying power as about signal cleverness. Project implications Local futures/spot research can borrow the principle of broad diversification even if the current focus is narrower than a full managed futures portfolio. When evaluating strategy quality, include bad year behavior and crisis behavior, not just average return. Use this book alongside systematic trading carver to separate signal simplicity from risk sophistication. Related pages trend following momentum drawdown risk position sizing", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": "Andreas F. Clenow"}, {"id": "quantitative-trading-chan", "title": "Quantitative Trading", "type": "book", "group": "books", "tags": ["backtesting", "execution", "risk-management", "research-process"], "sections": [["Why this matters here", "<ul>\n<li>Probably the best “independent quant” operating manual in this set.</li>\n<li>Explicitly covers <a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a>, execution systems, and money/risk management in one workflow.</li>\n<li>Closest book to the question: how do I actually build, test, and run a strategy business sensibly?</li>\n</ul>"], ["Key themes observed from extracted chapters", "<p>The table of contents and sampled pages highlight a coherent pipeline:</p>\n<p class=\"numbered\">1. understand what quant trading is and who can do it</p>\n<p class=\"numbered\">2. acquire data and design rules</p>\n<p class=\"numbered\">3. perform serious <a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></p>\n<p class=\"numbered\">4. compare expected vs live performance inside execution systems</p>\n<p class=\"numbered\">5. handle <a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a>, leverage, and drawdowns via disciplined risk management</p>"], ["Strongest ideas to retain", "<ul>\n<li>Always replicate and inspect a strategy yourself, even if the source gives historical results.</li>\n<li>The backtest is not only validation; it is also a debugging and understanding tool.</li>\n<li>Live underperformance should trigger a diagnosis ladder: software bugs, backtest mismatch, excessive costs, illiquidity, data-snooping bias, and regime shift.</li>\n<li>Risk management is not separate from alpha; it determines whether alpha is survivable.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Any local research notebook should make room for both performance statistics and implementation diagnostics.</li>\n<li>A strategy result without cost assumptions and a post-backtest “live divergence checklist” is incomplete.</li>\n<li>Future agents should connect execution problems directly to strategy review rather than treating them as separate operational issues.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n</ul>"]], "search_text": "Quantitative Trading book backtesting execution risk-management research-process Quantitative Trading — Ernest P. Chan Why this matters here Probably the best “independent quant” operating manual in this set. Explicitly covers backtesting , execution systems, and money/risk management in one workflow. Closest book to the question: how do I actually build, test, and run a strategy business sensibly? Key themes observed from extracted chapters The table of contents and sampled pages highlight a coherent pipeline: 1. understand what quant trading is and who can do it 2. acquire data and design rules 3. perform serious backtesting 4. compare expected vs live performance inside execution systems 5. handle position sizing , leverage, and drawdowns via disciplined risk management Strongest ideas to retain Always replicate and inspect a strategy yourself, even if the source gives historical results. The backtest is not only validation; it is also a debugging and understanding tool. Live underperformance should trigger a diagnosis ladder: software bugs, backtest mismatch, excessive costs, illiquidity, data snooping bias, and regime shift. Risk management is not separate from alpha; it determines whether alpha is survivable. Project implications Any local research notebook should make room for both performance statistics and implementation diagnostics. A strategy result without cost assumptions and a post backtest “live divergence checklist” is incomplete. Future agents should connect execution problems directly to strategy review rather than treating them as separate operational issues. Related pages backtesting execution realism position sizing walk forward analysis", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": "Ernest P. Chan"}, {"id": "stocks-on-the-move-clenow", "title": "Stocks on the Move", "type": "book", "group": "books", "tags": ["equities-momentum", "ranking", "portfolio-construction", "simplicity"], "sections": [["Why this matters here", "<ul>\n<li>Gives an implementation-focused equities momentum framework.</li>\n<li>Useful for seeing how a very simple statement (“buy stocks that move up”) becomes a systematic portfolio process.</li>\n<li>Good complement to <a href=\"#page=following-the-trend-clenow\" class=\"inline-link\">following-the-trend-clenow</a> because it narrows from multi-asset futures to stock selection and portfolio management.</li>\n</ul>"], ["Key themes visible from EPUB sampling", "<p>The preface makes the book’s intent explicit: one simple momentum strategy, systematically managed. It appears to focus less on proving that momentum exists and more on showing how to rank, construct, and maintain a portfolio around that fact.</p>"], ["Strongest ideas to retain", "<ul>\n<li>Simple concepts can be powerful if the portfolio process is clear.</li>\n<li>The hard part is not inventing a novel insight; it is implementing the ranking, filtering, and portfolio management cleanly.</li>\n<li>Good systematic equity momentum should resist the temptation to add unnecessary complexity.</li>\n</ul>"], ["Project implications", "<ul>\n<li>If local research expands into cross-sectional equity or instrument ranking, this book is a strong model for keeping the process comprehensible.</li>\n<li>It can also act as a useful contrast with <a href=\"#page=algorithmic-trading-chan\" class=\"inline-link\">algorithmic-trading-chan</a>: one book is broader and strategy-archetype focused, the other is narrower and portfolio-process focused.</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n</ul>"]], "search_text": "Stocks on the Move book equities-momentum ranking portfolio-construction simplicity Stocks on the Move — An ry: chapters 1–2</li>\n<li>Toolbox: chapters 3–4</li>\n<li>Framework: chapters 5–12</li>\n<li>Practice: chapters 13–15</li>\n</ul>"], ["Reading priority for this project", "<p class=\"numbered\">1. Chapter 3 — Fitting</p>\n<p class=\"numbered\">2. Chapter 9 — Volatility Targeting</p>\n<p class=\"numbered\">3. Chapter 10 — Position Sizing</p>\n<p class=\"numbered\">4. Chapter 11 — Portfolios</p>\n<p class=\"numbered\">5. Chapter 12 — Speed and Size</p>\n<p class=\"numbered\">6. Chapters 7–8 — Forecasts and Combined Forecasts</p>"], ["Chapter links", "<ul>\n<li>[01 — The Flawed Human Brain](systematic-trading-carver-chapters/carver-st-01-flawed-human-brain.md)</li>\n<li>[02 — Systematic Trading Rules](systematic-trading-carver-chapters/carver-st-02-systematic-trading-rules.md)</li>\n<li>[03 — Fitting](systematic-trading-carver-chapters/carver-st-03-fitting.md)</li>\n<li>[04 — Portfolio Allocation](systematic-trading-carver-chapters/carver-st-04-portfolio-allocation.md)</li>\n<li>[05 — Framework Overview](systematic-trading-carver-chapters/carver-st-05-framework-overview.md)</li>\n<li>[06 — Instruments](systematic-trading-carver-chapters/carver-st-06-instruments.md)</li>\n<li>[07 — Forecasts](systematic-trading-carver-chapters/carver-st-07-forecasts.md)</li>\n<li>[08 — Combined Forecasts](systematic-trading-carver-chapters/carver-st-08-combined-forecasts.md)</li>\n<li>[09 — Volatility Targeting](systematic-trading-carver-chapters/carver-st-09-volatility-targeting.md)</li>\n<li>[10 — Position Sizing](systematic-trading-carver-chapters/carver-st-10-position-sizing.md)</li>\n<li>[11 — Portfolios](systematic-trading-carver-chapters/carver-st-11-portfolios.md)</li>\n<li>[12 — Speed and Size](systematic-trading-carver-chapters/carver-st-12-speed-and-size.md)</li>\n<li>[13 — Semi-automatic Trader](systematic-trading-carver-chapters/carver-st-13-semi-automatic-trader.md)</li>\n<li>[14 — Asset Allocating Investor](systematic-trading-carver-chapters/carver-st-14-asset-allocating-investor.md)</li>\n<li>[15 — Staunch Systems Trader](systematic-trading-carver-chapters/carver-st-15-staunch-systems-trader.md)</li>\n</ul>"], ["How to use this set", "<ul>\n<li>Use chapters 3, 4, 9, 10, 11, and 12 when translating book ideas into actual backtest architecture.</li>\n<li>Use chapters 1 and 2 when sanity-checking whether an idea is real or just emotionally appealing.</li>\n<li>Use chapters 13–15 to decide which Carver archetype best fits the actual workflow you want to run locally.</li>\n</ul>"]], "search_text": "Systematic Trading chapter map chapter-map systematic-trading chapter-map carver Systematic Trading — chapter map This note breaks Robert Carver’s Systematic Trading into navigable chunks for future research work. It is based on the PDF table of contents plus chapter opening page extraction, so it is stronger than the first pass source summary but still not a full line by line digest. Parts Theory: chapters 1–2 Toolbox: chapters 3–4 Framework: chapters 5–12 Practice: chapters 13–15 Reading priority for this project 1. Chapter 3 — Fitting 2. Chapter 9 — Volatility Targeting 3. Chapter 10 — Position Sizing 4. Chapter 11 — Portfolios 5. Chapter 12 — Speed and Size 6. Chapters 7–8 — Forecasts and Combined Forecasts Chapter links 01 — The Flawed Human Brain (systematic trading carver chapters/carver st 01 flawed human brain.md) 02 — Systematic Trading Rules (systematic trading carver chapters/carver st 02 systematic trading rules.md) 03 — Fitting (systematic trading carver chapters/carver st 03 fitting.md) 04 — Portfolio Allocation (systematic trading carver chapters/carver st 04 portfolio allocation.md) 05 — Framework Overview (systematic trading carver chapters/carver st 05 framework overview.md) 06 — Instruments (systematic trading carver chapters/carver st 06 instruments.md) 07 — Forecasts (systematic trading carver chapters/carver st 07 forecasts.md) 08 — Combined Forecasts (systematic trading carver chapters/carver st 08 combined forecasts.md) 09 — Volatility Targeting (systematic trading carver chapters/carver st 09 volatility targeting.md) 10 — Position Sizing (systematic trading carver chapters/carver st 10 position sizing.md) 11 — Portfolios (systematic trading carver chapters/carver st 11 portfolios.md) 12 — Speed and Size (systematic trading carver chapters/carver st 12 speed and size.md) 13 — Semi automatic Trader (systematic trading carver chapters/carver st 13 semi automatic trader.md) 14 — Asset Allocating Investor (systematic trading carver chapters/carver st 14 asset allocating investor.md) 15 — Staunch Systems Trader (systematic trading carver chapters/carver st 15 staunch systems trader.md) How to use this set Use chapters 3, 4, 9, 10, 11, and 12 when translating book ideas into actual backtest architecture. Use chapters 1 and 2 when sanity checking whether an idea is real or just emotionally appealing. Use chapters 13–15 to decide which Carver archetype best fits the actual workflow you want to run locally.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": ""}, {"id": "systematic-trading-carver", "title": "Systematic Trading", "type": "book", "group": "books", "tags": ["portfolio-construction", "volatility-targeting", "fitting", "systematic-process"], "sections": [["Why this matters here", "<ul>\n<li>Best source in this set for robust portfolio process.</li>\n<li>Particularly strong on fitting limits, diversification, <a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a>, and portfolio-level thinking.</li>\n<li>Most useful if the goal is to run strategies that survive bad periods instead of merely looking impressive in sample.</li>\n</ul>"], ["What this deeper pass adds", "<ul>\n<li>A chapter-by-chapter map grounded in the PDF table of contents and chapter-opening pages.</li>\n<li>Separate notes for each of the 15 main chapters, so future agents can navigate Carver by topic instead of treating the book as one blob.</li>\n<li>Better links from book structure to this project’s research pipeline, sizing logic, and execution realism work.</li>\n</ul>"], ["Book structure at a glance", "<ul>\n<li>Introduction: why discretionary decision-making breaks under stress and why a systematic framework helps.</li>\n<li>Part One / Theory: why humans make poor trading decisions and what makes trading rules plausible.</li>\n<li>Part Two / Toolbox: how fitting and portfolio allocation go wrong, and how to restrain them.</li>\n<li>Part Three / Framework: the modular components of a systematic process, from instruments through forecasts, volatility, sizing, and portfolios.</li>\n<li>Part Four / Practice: three user archetypes — semi-automatic trader, asset allocator, and staunch systems trader.</li>\n</ul>"], ["Chapter map", "<ul>\n<li>[Carver chapter map](systematic-trading-carver-chapter-map.md)</li>\n<li>[Chapter 1 — The Flawed Human Brain](systematic-trading-carver-chapters/carver-st-01-flawed-human-brain.md)</li>\n<li>[Chapter 2 — Systematic Trading Rules](systematic-trading-carver-chapters/carver-st-02-systematic-trading-rules.md)</li>\n<li>[Chapter 3 — Fitting](systematic-trading-carver-chapters/carver-st-03-fitting.md)</li>\n<li>[Chapter 4 — Portfolio Allocation](systematic-trading-carver-chapters/carver-st-04-portfolio-allocation.md)</li>\n<li>[Chapter 5 — Framework Overview](systematic-trading-carver-chapters/carver-st-05-framework-overview.md)</li>\n<li>[Chapter 6 — Instruments](systematic-trading-carver-chapters/carver-st-06-instruments.md)</li>\n<li>[Chapter 7 — Forecasts](systematic-trading-carver-chapters/carver-st-07-forecasts.md)</li>\n<li>[Chapter 8 — Combined Forecasts](systematic-trading-carver-chapters/carver-st-08-combined-forecasts.md)</li>\n<li>[Chapter 9 — Volatility Targeting](systematic-trading-carver-chapters/carver-st-09-volatility-targeting.md)</li>\n<li>[Chapter 10 — Position Sizing](systematic-trading-carver-chapters/carver-st-10-position-sizing.md)</li>\n<li>[Chapter 11 — Portfolios](systematic-trading-carver-chapters/carver-st-11-portfolios.md)</li>\n<li>[Chapter 12 — Speed and Size](systematic-trading-carver-chapters/carver-st-12-speed-and-size.md)</li>\n<li>[Chapter 13 — Semi-automatic Trader](systematic-trading-carver-chapters/carver-st-13-semi-automatic-trader.md)</li>\n<li>[Chapter 14 — Asset Allocating Investor](systematic-trading-carver-chapters/carver-st-14-asset-allocating-investor.md)</li>\n<li>[Chapter 15 — Staunch Systems Trader](systematic-trading-carver-chapters/carver-st-15-staunch-systems-trader.md)</li>\n</ul>"], ["Strongest ideas to retain", "<p class=\"numbered\">1. Systems are partly a defense against the flawed human brain.</p>\n<p class=\"numbered\">2. Fitting and parameter choice should be constrained and justified.</p>\n<p class=\"numbered\">3. The portfolio is the real unit of decision, not a single strategy in isolation.</p>\n<p class=\"numbered\">4. Use <a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a> and conservative leverage logic so returns are normalized to risk and drawdowns remain survivable.</p>\n<p class=\"numbered\">5. Trading speed, cost, instrument choice, and account size must shape design from the start rather than being added after a pretty backtest.</p>"], ["Project implications", "<ul>\n<li>Local research should report volatility-normalized metrics, not just raw returns.</li>\n<li>Position sizing logic deserves its own module rather than being embedded ad hoc in notebooks.</li>\n<li>Portfolio concentration and cross-strategy correlation should be considered early, even in personal research.</li>\n<li>Research notebooks should separate forecast generation, volatility estimation, sizing, and portfolio construction into explicit steps.</li>\n</ul>"], ["Related pages", "<ul>\n<li>[Carver chapter map](systematic-trading-carver-chapter-map.md)</li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n</ul>"]], "search_text": "Systematic Trading book portfolio-construction volatility-targeting fitting systematic-process Systematic Trading — Robert Carver Why this matters here Best source in this set for robust portfolio process. Particularly strong on fitting limits, diversification, volatility targeting , and portfolio level thinking. Most useful if the goal is to run strategies that survive bad periods instead of merely looking impressive in sample. What this deeper pass adds A chapter by chapter map grounded in the PDF table of contents and chapter opening pages. Separate notes for each of the 15 main chapters, so future agents can navigate Carver by topic instead of treating the book as one blob. Better links from book structure to this project’s research pipeline, sizing logic, and execution realism work. Book structure at a glance Introduction: why discretionary decision making breaks under stress and why a systematic framework helps. Part One / Theory: why humans make poor trading decisions and what makes trading rules plausible. Part Two / Toolbox: how fitting and portfolio allocation go wrong, and how to restrain them. Part Three / Framework: the modular components of a systematic process, from instruments through forecasts, volatility, sizing, and portfolios. Part Four / Practice: three user archetypes — semi automatic trader, asset allocator, and staunch systems trader. Chapter map Carver chapter map (systematic trading carver chapter map.md) Chapter 1 — The Flawed Human Brain (systematic trading carver chapters/carver st 01 flawed human brain.md) Chapter 2 — Systematic Trading Rules (systematic trading carver chapters/carver st 02 systematic trading rules.md) Chapter 3 — Fitting (systematic trading carver chapters/carver st 03 fitting.md) Chapter 4 — Portfolio Allocation (systematic trading carver chapters/carver st 04 portfolio allocation.md) Chapter 5 — Framework Overview (systematic trading carver chapters/carver st 05 framework overview.md) Chapter 6 — Instruments (systematic trading carver chapters/carver st 06 instruments.md) Chapter 7 — Forecasts (systematic trading carver chapters/carver st 07 forecasts.md) Chapter 8 — Combined Forecasts (systematic trading carver chapters/carver st 08 combined forecasts.md) Chapter 9 — Volatility Targeting (systematic trading carver chapters/carver st 09 volatility targeting.md) Chapter 10 — Position Sizing (systematic trading carver chapters/carver st 10 position sizing.md) Chapter 11 — Portfolios (systematic trading carver chapters/carver st 11 portfolios.md) Chapter 12 — Speed and Size (systematic trading carver chapters/carver st 12 speed and size.md) Chapter 13 — Semi automatic Trader (systematic trading carver chapters/carver st 13 semi automatic trader.md) Chapter 14 — Asset Allocating Investor (systematic trading carver chapters/carver st 14 asset allocating investor.md) Chapter 15 — Staunch Systems Trader (systematic trading carver chapters/carver st 15 staunch systems trader.md) Strongest ideas to retain 1. Systems are partly a defense against the flawed human brain. 2. Fitting and parameter choice should be constrained and justified. 3. The portfolio is the real unit of decision, not a single strategy in isolation. 4. Use volatility targeting and conservative leverage logic so returns are normalized to risk and drawdowns remain survivable. 5. Trading speed, cost, instrument choice, and account size must shape design from the start rather than being added after a pretty backtest. Project implications Local research should report volatility normalized metrics, not just raw returns. Position sizing logic deserves its own module rather than being embedded ad hoc in notebooks. Portfolio concentration and cross strategy correlation should be considered early, even in personal research. Research notebooks should separate forecast generation, volatility estimation, sizing, and portfolio construction into explicit steps. Related pages Carver chapter map (systematic trading carver chapter map.md) volatility targeting position sizing drawdown risk walk forward analysis", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "", "pages": "", "book": ""}, "author": "Robert Carver"}, {"id": "carver-st-01-flawed-human-brain", "title": "Systematic Trading chapter 01 — The Flawed Human Brain", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver opens by arguing that human cognition is powerful but unreliable in financial decision-making, especially under stress, ego, fear, and hindsight bias.</p>"], ["Why this chapter matters", "<p>This is the philosophical foundation for the whole book: systems are not just efficiency tools, they are bias-control tools.</p>"], ["Section map from contents", "<ul>\n<li>Humans should be great traders, but...</li>\n<li>Simple trading rules</li>\n<li>Sticking to the plan</li>\n<li>Good system design</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Discretionary judgment can identify context, but it is inconsistent when money and uncertainty are involved.</li>\n<li>Even smart and experienced traders break their own rules in exactly the moments when discipline matters most.</li>\n<li>Human bias does not disappear when building systems; it reappears in rule design, parameter choice, and post-hoc tweaking.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Treat notebooks and research scripts as places where bias can sneak in through cherry-picked date ranges, symbols, or thresholds.</li>\n<li>Prefer explicit rules and recorded assumptions over intuitive “this chart looks good” decisions.</li>\n<li>Keep a clear separation between hypothesis formation and evaluation.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: Start of main chapter sequence</li>\n<li>Next: [Chapter 02](carver-st-02-systematic-trading-rules.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 01 — The Flawed Human Brain chapter systematic-trading carver chapter-note Chapter 01 — The Flawed Human Brain Core idea Carver opens by arguing that human cognition is powerful but unreliable in financial decision making, especially under stress, ego, fear, and hindsight bias. Why this chapter matters This is the philosophical foundation for the whole book: systems are not just efficiency tools, they are bias control tools. Section map from contents Humans should be great traders, but... Simple trading rules Sticking to the plan Good system design Key takeaways Discretionary judgment can identify context, but it is inconsistent when money and uncertainty are involved. Even smart and experienced traders break their own rules in exactly the moments when discipline matters most. Human bias does not disappear when building systems; it reappears in rule design, parameter choice, and post hoc tweaking. Project implications Treat notebooks and research scripts as places where bias can sneak in through cherry picked date ranges, symbols, or thresholds. Prefer explicit rules and recorded assumptions over intuitive “this chart looks good” decisions. Keep a clear separation between hypothesis formation and evaluation. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Start of main chapter sequence Next: Chapter 02 (carver st 02 systematic trading rules.md) Related pages walk forward analysis backtesting drawdown risk Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Theory", "pages": "28-41", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-02-systematic-trading-rules", "title": "Systematic Trading chapter 02 — Systematic Trading Rules", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>A trading rule is a systematic forecast of price movement, and Carver focuses on what makes such rules plausible, robust, and realistically profitable.</p>"], ["Why this chapter matters", "<p>This chapter frames trading rules as modest, probabilistic edges rather than magic formulas.</p>"], ["Section map from contents", "<ul>\n<li>What makes a good trading rule</li>\n<li>When trading rules don’t work</li>\n<li>Why certain rules are profitable</li>\n<li>Classifying trading styles</li>\n<li>Achievable Sharpe ratios</li>\n<li>Conclusion</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Good rules need economic or behavioral plausibility, not just a pretty equity curve.</li>\n<li>A backtest can fail live because of overfitting, crowding, changing costs, or fragile assumptions.</li>\n<li>Trend, momentum, carry, and similar styles should be understood by characteristics and failure modes, not just by indicator names.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Document the rationale for any forecast rule before testing it.</li>\n<li>Benchmark candidate rules against realistic Sharpe expectations instead of fantasy returns.</li>\n<li>Classify local strategies by style so correlation and regime overlap become visible early.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 01](carver-st-01-flawed-human-brain.md)</li>\n<li>Next: [Chapter 03](carver-st-03-fitting.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=trend-following\" class=\"inline-link\">trend-following</a></li>\n<li><a href=\"#page=momentum\" class=\"inline-link\">momentum</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 02 — Systematic Trading Rules chapter systematic-trading carver chapter-note Chapter 02 — Systematic Trading Rules Core idea A trading rule is a systematic forecast of price movement, and Carver focuses on what makes such rules plausible, robust, and realistically profitable. Why this chapter matters This chapter frames trading rules as modest, probabilistic edges rather than magic formulas. Section map from contents What makes a good trading rule When trading rules don’t work Why certain rules are profitable Classifying trading styles Achievable Sharpe ratios Conclusion Key takeaways Good rules need economic or behavioral plausibility, not just a pretty equity curve. A backtest can fail live because of overfitting, crowding, changing costs, or fragile assumptions. Trend, momentum, carry, and similar styles should be understood by characteristics and failure modes, not just by indicator names. Project implications Document the rationale for any forecast rule before testing it. Benchmark candidate rules against realistic Sharpe expectations instead of fantasy returns. Classify local strategies by style so correlation and regime overlap become visible early. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 01 (carver st 01 flawed human brain.md) Next: Chapter 03 (carver st 03 fitting.md) Related pages trend following momentum execution realism Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Theory", "pages": "42-67", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-03-fitting", "title": "Systematic Trading chapter 03 — Fitting", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Carver treats rule selection and parameter tuning as dangerous because the same human overconfidence that hurts discretionary trading also corrupts systematic design.</p>"], ["Why this chapter matters", "<p>One of the most valuable chapters for quant strategy building because it directly addresses the path from “interesting idea” to “fragile overfit.”</p>"], ["Section map from contents", "<ul>\n<li>The perils of over-fitting</li>\n<li>Some rules for effective fitting</li>\n<li>How I choose my rules</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Overfitting is not an edge; it is borrowed confidence from the past.</li>\n<li>If you insist on fitting, the process must be constrained, justified, and skeptical.</li>\n<li>Carver’s bias is toward simpler, more generic rules that avoid heavy optimization.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Minimize free parameters in local research notebooks.</li>\n<li>Use broad robustness checks and holdout logic before trusting a tuned rule.</li>\n<li>Be suspicious of strategy improvements that only appear after repeated parameter search.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 02](carver-st-02-systematic-trading-rules.md)</li>\n<li>Next: [Chapter 04](carver-st-04-portfolio-allocation.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=walk-forward-analysis\" class=\"inline-link\">walk-forward-analysis</a></li>\n<li><a href=\"#page=backtesting\" class=\"inline-link\">backtesting</a></li>\n<li><a href=\"#page=execution-realism\" class=\"inline-link\">execution-realism</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 03 — Fitting chapter systematic-trading carver chapter-note Chapter 03 — Fitting Core idea Carver treats rule selection and parameter tuning as dangerous because the same human overconfidence that hurts discretionary trading also corrupts systematic design. Why this chapter matters One of the most valuable chapters for quant strategy building because it directly addresses the path from “interesting idea” to “fragile overfit.” Section map from contents The perils of over fitting Some rules for effective fitting How I choose my rules Key takeaways Overfitting is not an edge; it is borrowed confidence from the past. If you insist on fitting, the process must be constrained, justified, and skeptical. Carver’s bias is toward simpler, more generic rules that avoid heavy optimization. Project implications Minimize free parameters in local research notebooks. Use broad robustness checks and holdout logic before trusting a tuned rule. Be suspicious of strategy improvements that only appear after repeated parameter search. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 02 (carver st 02 systematic trading rules.md) Next: Chapter 04 (carver st 04 portfolio allocation.md) Related pages walk forward analysis backtesting execution realism Extraction note This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page by page digest.", "meta": {"created": "2026-05-27", "updated": "2026-05-27", "part": "Toolbox", "pages": "68-85", "book": "systematic-trading-carver"}, "author": ""}, {"id": "carver-st-04-portfolio-allocation", "title": "Systematic Trading chapter 04 — Portfolio Allocation", "type": "chapter", "group": "carver", "tags": ["systematic-trading", "carver", "chapter-note"], "sections": [["Core idea", "<p>Allocation decisions matter as much as signal generation, but optimization can become another elegant way of overfitting.</p>"], ["Why this chapter matters", "<p>This chapter shifts the unit of thinking from single-rule cleverness to portfolio construction and weight discipline.</p>"], ["Section map from contents", "<ul>\n<li>Optimising gone bad</li>\n<li>Saving optimisation from itself</li>\n<li>Making weights by hand</li>\n<li>Incorporating Sharpe ratios</li>\n</ul>"], ["Key takeaways", "<ul>\n<li>Naive optimization can amplify estimation error rather than improve outcomes.</li>\n<li>Hand-built or constrained weights can outperform overconfident “optimal” weights.</li>\n<li>Sharpe assumptions matter, but they should not be treated as precise truths.</li>\n</ul>"], ["Project implications", "<ul>\n<li>Add simple baseline weighting schemes before any optimizer in the local stack.</li>\n<li>Treat optimizer outputs as suggestions that require stress tests, not as final answers.</li>\n<li>Surface concentration and correlation assumptions in every portfolio notebook.</li>\n</ul>"], ["Navigation", "<ul>\n<li>Parent: [Systematic Trading](../systematic-trading-carver.md)</li>\n<li>Map: [Carver chapter map](../systematic-trading-carver-chapter-map.md)</li>\n<li>Previous: [Chapter 03](carver-st-03-fitting.md)</li>\n<li>Next: [Chapter 05](carver-st-05-framework-overview.md)</li>\n</ul>"], ["Related pages", "<ul>\n<li><a href=\"#page=position-sizing\" class=\"inline-link\">position-sizing</a></li>\n<li><a href=\"#page=volatility-targeting\" class=\"inline-link\">volatility-targeting</a></li>\n<li><a href=\"#page=drawdown-risk\" class=\"inline-link\">drawdown-risk</a></li>\n</ul>"], ["Extraction note", "<p>This note is grounded in the PDF table of contents and the opening pages of the chapter, not yet a full page-by-page digest.</p>"]], "search_text": "Systematic Trading chapter 04 — Portfolio Allocation chapter systematic-trading carver chapter-note Chapter 04 — Portfolio Allocation Core idea Allocation decisions matter as much as signal generation, but optimization can become another elegant way of overfitting. Why this chapter matters This chapter shifts the unit of thinking from single rule cleverness to portfolio construction and weight discipline. Section map from contents Optimising gone bad Saving optimisation from itself Making weights by hand Incorporating Sharpe ratios Key takeaways Naive optimization can amplify estimation error rather than improve outcomes. Hand built or constrained weights can outperform overconfident “optimal” weights. Sharpe assumptions matter, but they should not be treated as precise truths. Project implications Add simple baseline weighting schemes before any optimizer in the local stack. Treat optimizer outputs as suggestions that require stress tests, not as final answers. Surface concentration and correlation assumptions in every portfolio notebook. Navigation Parent: Systematic Trading (../systematic trading carver.md) Map: Carver chapter map (../systematic trading carver chapter map.md) Previous: Chapter 03 (carver st 03 fitting.md) Next: Chapter 05 (carver st 05 framework overview.md) Related pages position sizing volatility targeting drawdown risk Extraction note This note is
